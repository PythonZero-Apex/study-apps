<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI-900 練習問題</title>
<link rel="apple-touch-icon" href="../icon.png">
<link rel="icon" href="../icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AI-900">
<meta name="application-name" content="AI-900">
<style>
  :root{
    --bg:#0f1220; --card:#1a1f33; --card2:#222843; --text:#e8ebf5; --muted:#9aa3c4;
    --accent:#4f8cff; --accent2:#7c5cff; --ok:#2ecc71; --ng:#ff5c72; --warn:#ffb454; --line:#2c3350;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(160deg,#0f1220,#141a30);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.7;padding:16px;min-height:100vh}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:1.4rem;margin:.2em 0}
  .sub{color:var(--muted);font-size:.9rem;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px;margin-bottom:16px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
  .card h2{font-size:1rem;margin:0 0 12px}
  label.field{display:block;color:var(--muted);font-size:.85rem;margin:10px 0 4px}
  select,button{font:inherit}
  select{background:var(--card2);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:11px 12px;width:100%}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;
    border-radius:12px;padding:14px 20px;font-weight:700;cursor:pointer;transition:.15s;width:100%}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.secondary{background:var(--card2);border:1px solid var(--line)}
  .btn.review{background:linear-gradient(135deg,#ff8a3d,#ff5c72)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:var(--muted);margin-bottom:8px}
  .bar{height:7px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.3s}
  .tag{display:inline-block;font-size:.72rem;background:var(--card2);border:1px solid var(--line);
    color:var(--muted);padding:3px 9px;border-radius:99px;margin-bottom:10px}
  .qtext{font-size:1.08rem;font-weight:600;margin:6px 0 16px}
  .opt{display:flex;gap:11px;align-items:flex-start;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.sel{border-color:var(--accent);background:#26305a}
  .opt.correct{border-color:var(--ok);background:rgba(46,204,113,.14)}
  .opt.wrong{border-color:var(--ng);background:rgba(255,92,114,.14)}
  .opt .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--muted);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:.8rem;margin-top:2px}
  .opt.round .box{border-radius:50%}
  .hint{font-size:.78rem;color:var(--muted);margin:-2px 0 12px}
  .explain{background:var(--card2);border-radius:12px;padding:14px 16px;margin-top:6px;font-size:.95rem;border:1px solid var(--line)}
  .explain.ok{background:rgba(46,204,113,.10);border-color:rgba(46,204,113,.4)}
  .explain.ng{background:rgba(255,92,114,.10);border-color:rgba(255,92,114,.4)}
  .explain b{color:var(--text)}
  .center{text-align:center}
  .big{font-size:2.6rem;font-weight:800;margin:6px 0}
  .muted{color:var(--muted)}
  .pill{display:inline-block;font-size:.8rem;padding:4px 10px;border-radius:99px;background:var(--card2);border:1px solid var(--line)}
  .reviewItem{border-left:3px solid var(--ng);padding:6px 0 6px 12px;margin:8px 0;font-size:.9rem}
  .hide{display:none}
  .footer{color:var(--muted);font-size:.78rem;text-align:center;margin-top:10px}
  /* dashboard */
  .stats{display:flex;gap:10px;margin-bottom:8px}
  .stat{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
  .stat .n{font-size:1.5rem;font-weight:800} .stat .l{font-size:.72rem;color:var(--muted)}
  .domrow{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:.82rem}
  .domrow .nm{width:120px;flex:0 0 auto;color:var(--muted)}
  .domrow .track{flex:1;height:9px;background:var(--card2);border-radius:99px;overflow:hidden}
  .domrow .fill{height:100%;border-radius:99px}
  .domrow .pc{width:42px;text-align:right;flex:0 0 auto}
  .trend{font-size:.85rem;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<div class="wrap">

  <!-- START -->
  <div id="start">
    <h1>AI-900 練習問題 🧠</h1>
    <div class="sub">Azure AI Fundamentals ／ 全<span id="qtotal">0</span>問・本番形式・解説付き</div>

    <div class="card" id="dashCard">
      <h2>📊 学習ダッシュボード</h2>
      <div id="dashBody"></div>
    </div>

    <div class="card" id="reviewCard">
      <h2>🔁 復習モード</h2>
      <div id="reviewInfo" class="muted" style="margin-bottom:12px"></div>
      <button class="btn review" id="reviewBtn" onclick="startQuiz('review')">間違えた問題を復習する</button>
    </div>

    <div class="card">
      <h2>📝 通常演習</h2>
      <label class="field">ドメイン（出題分野）</label>
      <select id="selDomain"></select>
      <label class="field">出題数</label>
      <select id="selCount">
        <option value="10">10問（本番ミニ）</option>
        <option value="5">5問（さくっと）</option>
        <option value="20">20問</option>
        <option value="40">40問（本番想定）</option>
        <option value="999">全問</option>
      </select>
      <label class="field">出題順</label>
      <select id="selOrder">
        <option value="random">ランダム</option>
        <option value="seq">順番通り</option>
      </select>
      <div style="height:14px"></div>
      <button class="btn" onclick="startQuiz('normal')">スタート ▶</button>
    </div>
    <div class="footer">合格目安: 正答率70%（本番は700/1000）</div>
    <div class="footer"><a href="#" onclick="resetAll();return false;" style="color:var(--muted)">学習記録をリセット</a></div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hide">
    <div class="meta">
      <span id="qProgress">1 / 10</span>
      <span id="qScore">正解 0</span>
    </div>
    <div class="bar"><i id="qBar"></i></div>
    <div class="card">
      <span class="tag" id="qDomain"></span>
      <div class="qtext" id="qText"></div>
      <div class="hint" id="qHint"></div>
      <div id="qOptions"></div>
      <div id="qExplain"></div>
      <div style="height:8px"></div>
      <button class="btn" id="qAction" onclick="onAction()">解答する</button>
    </div>
    <button class="btn secondary" onclick="showStart()">中断してトップへ</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="hide">
    <div class="card center">
      <div class="muted" id="rMode">結果</div>
      <div class="big" id="rScore">0 / 0</div>
      <div id="rPct" class="pill"></div>
      <div id="rMsg" style="margin-top:14px;font-weight:600"></div>
    </div>
    <div class="card" id="rReviewCard">
      <h2>復習（間違えた問題）</h2>
      <div id="rReview"></div>
    </div>
    <button class="btn review" id="rReviewBtn" onclick="startQuiz('review')" style="margin-bottom:10px">間違いをすぐ復習 🔁</button>
    <button class="btn secondary" onclick="showStart()">トップへ戻る</button>
  </div>

  <div class="footer">MyBrain ／ 30_Resources/Tech/Azure ／ AI-900</div>
</div>

<script>
/* ===== 問題データ（ai-900-questions.json と同期） ===== */
const QUESTIONS = [{"id": 1, "domain": "AIワークロード", "type": "single", "q": "請求書の画像から「請求金額」「請求日」「取引先名」を自動で抽出したい。最も適したAIワークロードはどれか。", "options": ["コンピュータービジョン（画像分類）", "ドキュメント処理", "異常検知", "クラスタリング"], "answer": [1], "explanation": "請求書・領収書などの帳票から『金額』『日付』などの項目を構造化して取り出すのはドキュメント処理。AzureではAzure AI Document Intelligenceが担当します。<br>画像分類は『これは請求書か領収書か』のように画像全体を1つのカテゴリに分けるだけで、項目ごとの抽出はできません。OCR（文字を読む）に意味理解を足したのがドキュメント処理、と捉えると区別しやすいです。"}, {"id": 2, "domain": "AIワークロード", "type": "single", "q": "クレジットカードの利用履歴から、通常と大きく異なる不審な取引を見つけたい。これはどのワークロードか。", "options": ["感情分析", "異常検知", "翻訳", "画像分類"], "answer": [1], "explanation": "通常のパターンから大きく外れた値（外れ値）を見つけるのが異常検知（Anomaly Detection）。クレジットの不正利用検知や、設備・センサーの異常監視が代表例です。<br>感情分析や翻訳は言語、画像分類は画像のワークロードで、いずれも『外れ値を見つける』用途ではありません。『いつもと違うを見つける＝異常検知』と覚えましょう。"}, {"id": 3, "domain": "責任あるAI", "type": "single", "q": "AIの融資審査システムが、特定の性別や人種に対して不利な判定を出さないようにする。これは責任あるAIのどの原則に該当するか。", "options": ["透明性（Transparency）", "公平性（Fairness）", "説明責任（Accountability）", "信頼性と安全性（Reliability & Safety）"], "answer": [1], "explanation": "AIが性別・人種などで不利な判定をしないようにするのは公平性（Fairness）。学習データの偏りが差別的な結果を生まないか点検・是正します。<br>紛らわしいのは包括性（誰もが使えるアクセシビリティ）。公平性＝偏り・差別をなくす、包括性＝誰でも使える、と区別しましょう。"}, {"id": 4, "domain": "責任あるAI", "type": "single", "q": "視覚障害のあるユーザーでもAIサービスを利用できるよう、音声読み上げや字幕に対応する。これはどの原則か。", "options": ["包括性（Inclusiveness）", "公平性（Fairness）", "プライバシーとセキュリティ", "透明性"], "answer": [0], "explanation": "障害の有無や背景に関わらず誰もが使えるようにするのは包括性（Inclusiveness）。音声読み上げ・字幕などのアクセシビリティ対応がこれにあたります。<br>公平性（偏りをなくす）と混同しやすいので注意。『誰でもアクセスできる＝包括性』。"}, {"id": 5, "domain": "責任あるAI", "type": "single", "q": "AIシステムが下した判断について、なぜその結論に至ったかをユーザーが理解できるようにする。これはどの原則か。", "options": ["説明責任（Accountability）", "公平性（Fairness）", "透明性（Transparency）", "信頼性と安全性"], "answer": [2], "explanation": "AIの動作・限界・判断理由を利用者が理解できるようにするのは透明性（Transparency）。<br>似た言葉の説明責任（Accountability）は“結果に人・組織が責任を負う”こと。理由が分かる＝透明性、責任を取る＝説明責任、とペアで覚えます。"}, {"id": 6, "domain": "責任あるAI", "type": "multi", "q": "Microsoftの「責任あるAI」の6原則に含まれるものをすべて選べ。", "options": ["公平性", "収益性", "説明責任", "包括性", "拡張性"], "answer": [0, 2, 3], "explanation": "Microsoftの責任あるAI6原則は『公平性／信頼性と安全性／プライバシーとセキュリティ／包括性／透明性／説明責任』。<br>収益性・拡張性はビジネス/技術の話で6原則には含まれません。6つを一度暗記すれば原則を問う問題はほぼ取れます。"}, {"id": 7, "domain": "機械学習", "type": "single", "q": "過去のデータから来月の売上金額（数値）を予測したい。最も適した機械学習の手法はどれか。", "options": ["分類（Classification）", "回帰（Regression）", "クラスタリング（Clustering）", "強化学習"], "answer": [1], "explanation": "売上・金額・気温などの“連続した数値”を予測するのは回帰（Regression）。<br>カテゴリ（スパムか否か等）を当てるのは分類。“数値を当てる＝回帰、種類を当てる＝分類”が分かれ目です。"}, {"id": 8, "domain": "機械学習", "type": "single", "q": "メールが「スパム」か「スパムでない」かを判定するモデルを作りたい。これはどの手法か。", "options": ["回帰", "二項分類（Binary Classification）", "クラスタリング", "多クラス分類"], "answer": [1], "explanation": "『スパム/非スパム』のように2つのカテゴリへ分けるのは二項分類（Binary Classification）。<br>3つ以上なら多クラス分類、数値予測なら回帰。“2択＝二項分類”。"}, {"id": 9, "domain": "機械学習", "type": "single", "q": "正解ラベルのない顧客データを、購買傾向の似たグループに自動で分けたい。これはどの手法か。", "options": ["分類", "回帰", "クラスタリング", "異常検知"], "answer": [2], "explanation": "正解ラベルなしで、似たもの同士を自動でグループ分けするのはクラスタリング（教師なし学習）。顧客セグメンテーションが代表例。<br>分類はラベルありの教師あり学習なので別物。“ラベルなしでグループ化＝クラスタリング”。"}, {"id": 10, "domain": "機械学習", "type": "single", "q": "住宅価格を予測するモデルで、「広さ」「築年数」「立地」は何にあたるか。", "options": ["ラベル（Label）", "特徴量（Features）", "検証データ", "ハイパーパラメータ"], "answer": [1], "explanation": "予測の“入力”に使う列（広さ・築年数・立地）が特徴量（Features）。予測したい正解（住宅価格）がラベル（Label）。<br>入力＝特徴量、答え＝ラベル、と対で覚えると取り違えません。"}, {"id": 11, "domain": "機械学習", "type": "single", "q": "機械学習の専門知識が少ないユーザーが、複数のアルゴリズムを自動で試して最適なモデルを得たい。Azure MLのどの機能を使うか。", "options": ["Designer", "Automated ML（AutoML）", "Compute Cluster", "Data Labeling"], "answer": [1], "explanation": "アルゴリズムとパラメータを自動で試して最適モデルを見つけるのはAutomated ML（AutoML）。専門知識が少なくても使えます。<br>GUIでパイプラインを組むDesignerとは別機能。“自動でモデル探索＝AutoML”。"}, {"id": 12, "domain": "機械学習", "type": "single", "q": "データセットを「訓練データ」と「検証データ」に分ける主な理由はどれか。", "options": ["訓練を高速化するため", "未知データに対するモデルの精度（汎化性能）を評価するため", "データ容量を節約するため", "ラベルを自動生成するため"], "answer": [1], "explanation": "検証データは学習に使わないデータ。これで評価することで未知データへの精度（汎化性能）を測り、過学習（訓練だけ得意な状態）を検出できます。<br>高速化や容量節約が目的ではない点に注意。"}, {"id": 13, "domain": "コンピュータービジョン", "type": "single", "q": "1枚の写真に写っている複数の物体それぞれの位置（枠）と種類を特定したい。これはどのソリューションか。", "options": ["画像分類", "物体検出（Object Detection）", "OCR", "顔分析"], "answer": [1], "explanation": "複数の物体それぞれの“位置（枠＝バウンディングボックス）”と種類を特定するのは物体検出。<br>画像全体のカテゴリだけ判定するのは画像分類。位置も知りたい→物体検出、ラベルだけ→分類。"}, {"id": 14, "domain": "コンピュータービジョン", "type": "single", "q": "紙のレシートに印刷された文字を読み取ってテキストデータ化したい。使う技術はどれか。", "options": ["OCR（光学文字認識）", "クラスタリング", "感情分析", "セマンティックセグメンテーション"], "answer": [0], "explanation": "画像・文書内の文字を読み取ってテキスト化するのがOCR（光学文字認識）。AzureではVisionのReadやDocument Intelligenceが提供。<br>クラスタリングや感情分析は文字読み取りではありません。"}, {"id": 15, "domain": "コンピュータービジョン", "type": "single", "q": "自社製品の独自画像を使って「良品/不良品」を判定する画像分類モデルを訓練したい。最適なAzureサービスはどれか。", "options": ["Azure AI Face", "Azure AI Custom Vision", "Azure AI Translator", "Azure AI Speech"], "answer": [1], "explanation": "自社の独自画像で良品/不良品などの分類モデルを“訓練”するのはAzure AI Custom Vision。<br>汎用の画像分析は学習済みのAzure AI Vision、顔はFace。“独自データで訓練＝Custom Vision”。"}, {"id": 16, "domain": "コンピュータービジョン", "type": "single", "q": "画像中の人物の顔を検出し、年齢などの属性を分析したい。最も適したサービスはどれか。", "options": ["Azure AI Language", "Azure AI Face", "Azure AI Document Intelligence", "Azure OpenAI Service"], "answer": [1], "explanation": "顔の検出・属性分析・本人確認の専用サービスはAzure AI Face。<br>Languageはテキスト、Document Intelligenceは帳票、OpenAIは生成で、顔分析用ではありません。"}, {"id": 17, "domain": "NLP", "type": "single", "q": "商品レビューの文章が肯定的か否定的かを自動で判定したい。これはどのNLP機能か。", "options": ["キーフレーズ抽出", "感情分析（Sentiment Analysis）", "エンティティ認識", "翻訳"], "answer": [1], "explanation": "文章が肯定的/否定的/中立かを判定するのは感情分析（Sentiment Analysis）。Azure AI Languageが提供。<br>キーフレーズ抽出（要点語句）やエンティティ認識（固有名詞）とは別機能です。"}, {"id": 18, "domain": "NLP", "type": "single", "q": "文章中から「人名」「地名」「組織名」「日付」を識別して分類したい。これはどの機能か。", "options": ["エンティティ認識（NER）", "感情分析", "言語検出", "音声合成"], "answer": [0], "explanation": "人名・地名・組織・日付などの固有表現を識別・分類するのはエンティティ認識（NER）。<br>感情分析（肯定/否定）や言語検出（何語か）とは目的が違います。"}, {"id": 19, "domain": "NLP", "type": "single", "q": "感情分析・キーフレーズ抽出・エンティティ認識・言語検出をまとめて提供するAzureサービスはどれか。", "options": ["Azure AI Speech", "Azure AI Language", "Azure AI Vision", "Azure Machine Learning"], "answer": [1], "explanation": "感情分析・キーフレーズ抽出・エンティティ認識・言語検出などテキスト解析をまとめて提供するのはAzure AI Language。<br>音声系はSpeech、画像系はVision。“テキスト解析の総合＝Language”。"}, {"id": 20, "domain": "NLP", "type": "single", "q": "会議の録音音声を文字起こししたい。使うべきAzureサービスはどれか。", "options": ["Azure AI Speech（Speech-to-Text）", "Azure AI Translator", "Azure AI Language", "Azure AI Custom Vision"], "answer": [0], "explanation": "会議録音の文字起こし（Speech-to-Text）はAzure AI Speech。逆の読み上げ（Text-to-Speech）も同サービス。<br>翻訳はTranslator、テキスト解析はLanguageで別。“音声⇄文字＝Speech”。"}, {"id": 21, "domain": "NLP", "type": "multi", "q": "Azure AI Speech サービスが提供する機能をすべて選べ。", "options": ["音声認識（Speech-to-Text）", "音声合成（Text-to-Speech）", "画像の物体検出", "音声翻訳"], "answer": [0, 1, 3], "explanation": "Azure AI Speechは音声認識（STT）・音声合成（TTS）・音声翻訳・話者認識を提供。<br>画像の物体検出はVisionの機能で含まれません（引っかけ）。"}, {"id": 22, "domain": "生成AI", "type": "single", "q": "OpenAIのGPTモデルを、企業のセキュリティ・コンプライアンス要件を満たしながらAzure上で利用したい。使うべきサービスはどれか。", "options": ["Azure AI Vision", "Azure OpenAI Service", "Azure AI Translator", "Azure Machine Learning Designer"], "answer": [1], "explanation": "GPTやDALL·EなどOpenAIモデルを、企業のセキュリティ・コンプライアンス要件下（データ保護・リージョン管理・コンテンツフィルター付き）で使えるのがAzure OpenAI Service。<br>Vision/Translator/ML Designerは生成用途ではありません。"}, {"id": 23, "domain": "生成AI", "type": "single", "q": "生成AIアプリを設計・構築・評価・デプロイするためのMicrosoftの統合開発プラットフォームはどれか。", "options": ["Azure AI Foundry", "Azure DevOps", "Power BI", "Azure Monitor"], "answer": [0], "explanation": "生成AIアプリの設計・構築・評価・デプロイを一気通貫で行う統合プラットフォームがAzure AI Foundry（旧Azure AI Studio）。プロンプト検証・RAG構築・モデル評価ができます。<br>DevOps/Power BI/Monitorは別用途です。"}, {"id": 24, "domain": "生成AI", "type": "single", "q": "現代の大規模言語モデル（LLM）の基盤となっているニューラルネットワークのアーキテクチャはどれか。", "options": ["畳み込みニューラルネットワーク（CNN）", "Transformer", "決定木", "k近傍法"], "answer": [1], "explanation": "GPTなどLLMの基盤アーキテクチャはTransformer。Attention（自己注意）で単語同士の関係を捉えます。<br>CNNは画像向け、決定木やk近傍は古典的手法。“LLM＝Transformer”。"}, {"id": 25, "domain": "生成AI", "type": "single", "q": "生成AIが、事実に基づかない情報をもっともらしく生成してしまう現象を何と呼ぶか。", "options": ["オーバーフィッティング", "ハルシネーション（Hallucination）", "グラウンディング", "トークン化"], "answer": [1], "explanation": "もっともらしいが事実でない出力をハルシネーション（Hallucination）と呼びます。<br>対策は出力の検証や、信頼できるデータで根拠づけるグラウンディング（RAG）。過学習や正則化とは別概念です。"}, {"id": 26, "domain": "生成AI", "type": "single", "q": "社内文書など最新・独自のデータを検索して回答に反映させ、生成AIの精度を高める手法を何と呼ぶか。", "options": ["ファインチューニングのみ", "RAG（検索拡張生成）/ グラウンディング", "クラスタリング", "正則化"], "answer": [1], "explanation": "社内文書など最新・独自データを検索して回答に反映し精度を上げるのがRAG（検索拡張生成）。モデルを再訓練せず最新情報を扱えるのが利点で、グラウンディングとも呼ばれます。<br>ファインチューニング（再学習）とは別アプローチです。"}, {"id": 27, "domain": "生成AI", "type": "single", "q": "Azure OpenAI Serviceで、暴力・憎悪・性的・自傷などの有害な入出力をブロックする仕組みを何と呼ぶか。", "options": ["コンテンツフィルタリング", "トークン化", "埋め込み（Embedding）", "プロンプトエンジニアリング"], "answer": [0], "explanation": "暴力・憎悪・性的・自傷などの有害な入出力を検知・ブロックするのがコンテンツフィルタリング。Azure OpenAIに標準搭載された責任あるAIの仕組みです。<br>トークン化や埋め込みは別の処理です。"}, {"id": 28, "domain": "生成AI", "type": "single", "q": "OpenAI・Meta（Llama）・Mistralなど多様な基盤モデルを一覧から選んでデプロイできる、Azure AI Foundryの機能はどれか。", "options": ["モデルカタログ（Model Catalog）", "データラベリング", "Compute Cluster", "Bot Framework"], "answer": [0], "explanation": "OpenAI・Llama・Mistralなど多様な基盤モデルを一覧から選んでデプロイできるのはAzure AI Foundryのモデルカタログ。<br>データラベリングやComputeとは役割が違います。"}, {"id": 29, "domain": "横断", "type": "single", "q": "Vision・Language・Speechなど複数のAI機能を、1つのキーとエンドポイントでまとめて利用したい。作成すべきリソースはどれか。", "options": ["各機能ごとの単一サービスリソース", "Azure AI services（マルチサービスリソース）", "Azure Storage アカウント", "Azure Key Vault"], "answer": [1], "explanation": "VisionやLanguageなど複数のAI機能を、1つのキーとエンドポイントでまとめて使えるのがAzure AI services（マルチサービスリソース）。管理と課金を1か所にできるのが利点です。<br>1機能だけでよいなら単一サービスリソースで十分。Storage（データ保管）やKey Vault（鍵管理）はAI機能そのものを提供しません。"}, {"id": 30, "domain": "生成AI", "type": "single", "q": "大規模言語モデルでテキストを処理する際の、課金や入力長制限の基本単位は何か。", "options": ["ピクセル", "トークン（Token）", "エポック", "バイアス"], "answer": [1], "explanation": "LLMはテキストをトークン（単語や単語の一部）単位で処理し、トークン数で課金・入力長上限が決まります。<br>ピクセルは画像、エポックは学習回数の単位で別物です。"}, {"id": 31, "domain": "AIワークロード", "type": "yesno", "q": "次の記述は正しいか。『画像分類は、画像内の個々の物体の位置をバウンディングボックスで特定する。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [1], "explanation": "誤りです。バウンディングボックスで物体の『位置』まで特定するのは物体検出（Object Detection）。<br>画像分類は『この画像は猫』のように画像全体へ1つのラベルを付けるだけで、どこに写っているかは示しません。位置も知りたい→物体検出、ラベルだけ→画像分類、と区別します。"}, {"id": 32, "domain": "NLP", "type": "yesno", "q": "次の記述は正しいか。『Azure AI Translator は主にテキストの翻訳を行うサービスである。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しいです。Azure AI Translatorは多言語間の“テキスト”翻訳サービス。<br>音声の翻訳はAzure AI Speech（音声翻訳）が担当します。“文字＝Translator、音声＝Speech”。"}, {"id": 33, "domain": "AIワークロード", "type": "single", "q": "動画から顔・音声・テキスト・シーンを抽出して検索可能にしたい。最適なAzureサービスは？", "options": ["Azure AI Translator", "Azure AI Video Indexer", "Azure AI Language", "Azure Machine Learning"], "answer": [1], "explanation": "動画から顔・音声（文字起こし）・画面内のテキスト・シーンなどをまとめて抽出し、検索・分析できるのがAzure AI Video Indexer。<br>Translatorは翻訳、Languageはテキスト解析、Machine Learningは汎用のモデル開発基盤で、動画を丸ごと自動分析する用途には向きません。『動画を丸ごとインデックス化＝Video Indexer』。"}, {"id": 34, "domain": "AIワークロード", "type": "single", "q": "カスタマーサポートの問い合わせに自動で応答する対話型ボットを作りたい。これはどのワークロードか。", "options": ["異常検知", "会話型AI（Conversational AI）", "コンピュータービジョン", "回帰"], "answer": [1], "explanation": "人と自然に対話して応答するのは会話型AI（Conversational AI）。AzureではAzure AI Bot Service（ボットの土台）＋Azure AI Language（意図やQ&Aの理解）で作ります。<br>異常検知・コンピュータービジョン・回帰は、それぞれ外れ値・画像・数値予測のワークロードで、対話用途ではありません。"}, {"id": 35, "domain": "責任あるAI", "type": "single", "q": "自動運転車が悪天候など想定外の状況でも安全側に動作するよう設計する。これはどの原則か。", "options": ["公平性", "信頼性と安全性", "プライバシーとセキュリティ", "透明性"], "answer": [1], "explanation": "想定外の状況（悪天候など）でも一貫して安全側に動くよう設計するのは信頼性と安全性（Reliability & Safety）。テストや監視で危険な誤作動を防ぎます。<br>フェイルセーフ＝信頼性と安全性、と結びつけましょう。"}, {"id": 36, "domain": "責任あるAI", "type": "single", "q": "AIが収集した個人データを保護し、不正アクセスを防ぐ。これはどの原則か。", "options": ["包括性", "プライバシーとセキュリティ", "説明責任", "公平性"], "answer": [1], "explanation": "個人データを保護し不正アクセスを防ぐのはプライバシーとセキュリティ（Privacy & Security）。暗号化・アクセス制御・同意取得が該当。<br>“データを守る＝プライバシーとセキュリティ”。"}, {"id": 37, "domain": "責任あるAI", "type": "yesno", "q": "次の記述は正しいか。『説明責任(Accountability)とは、AIシステムの結果に対して人や組織が責任を負うことである。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しいです。説明責任（Accountability）は、AIの結果に対して人間・組織が責任を負い、監督・是正のガバナンス体制を整える原則。<br>“理由を分かるように”の透明性とペアで覚えると混同しません。"}, {"id": 38, "domain": "機械学習", "type": "single", "q": "教師あり学習（ラベル付きデータで学習）に分類される手法はどれか。", "options": ["クラスタリング", "回帰や分類", "主成分分析", "アソシエーション分析"], "answer": [1], "explanation": "回帰・分類は“正解ラベル”を使って学習する教師あり学習。<br>クラスタリング・主成分分析はラベルなしの教師なし学習。ラベルの有無で見分けます。"}, {"id": 39, "domain": "機械学習", "type": "single", "q": "多クラス分類（multiclass classification）の例はどれか。", "options": ["メールがスパムか否か", "画像を犬・猫・鳥のいずれかに分類", "住宅価格の予測", "顧客を未知のグループに分割"], "answer": [1], "explanation": "犬・猫・鳥のように3つ以上のカテゴリへ分けるのが多クラス分類。<br>2択は二項分類、数値予測は回帰、ラベルなしのグループ化はクラスタリング。選択肢の対比で覚えましょう。"}, {"id": 40, "domain": "機械学習", "type": "single", "q": "モデルが訓練データに過剰に適合し、未知データでは精度が落ちる状態を何と呼ぶか。", "options": ["過学習（オーバーフィッティング）", "グラウンディング", "トークン化", "正解率"], "answer": [0], "explanation": "訓練データに合わせすぎて、未知データで精度が落ちる状態が過学習（オーバーフィッティング）。<br>検証データの精度が下がり始めるのがサイン。データを増やす・モデルを単純化するなどが対策。"}, {"id": 41, "domain": "機械学習", "type": "single", "q": "コードを書かずにドラッグ&ドロップでMLパイプラインを視覚的に構築できるAzure MLの機能はどれか。", "options": ["Automated ML", "Designer", "Notebooks", "Endpoints"], "answer": [1], "explanation": "コードを書かずドラッグ&ドロップでMLパイプラインを組むのはDesigner。<br>最適モデルを自動探索するのはAutoML。“GUIで自分で組む＝Designer、自動＝AutoML”。"}, {"id": 42, "domain": "機械学習", "type": "multi", "q": "分類モデルの性能評価に使われる指標をすべて選べ。", "options": ["正解率（Accuracy）", "適合率（Precision）", "平均二乗誤差（MSE）", "再現率（Recall）"], "answer": [0, 1, 3], "explanation": "分類の評価指標は正解率（Accuracy）・適合率（Precision）・再現率（Recall）など。<br>平均二乗誤差（MSE）は“数値のズレ”を測る回帰の指標なので、分類では使いません（引っかけ）。"}, {"id": 43, "domain": "機械学習", "type": "single", "q": "学習には使わず、訓練後のモデル精度を測るために取り分けておくデータを何と呼ぶか。", "options": ["訓練データ", "検証（テスト）データ", "特徴量", "ラベル"], "answer": [1], "explanation": "学習に使わず、訓練後の精度測定に取り分けるのが検証（テスト）データ。これで未知データへの汎化性能を評価します。<br>訓練データ／特徴量／ラベルとは役割が違います。"}, {"id": 44, "domain": "コンピュータービジョン", "type": "single", "q": "請求書や領収書から金額・日付・項目を抽出する専用のAzureサービスはどれか。", "options": ["Azure AI Vision", "Azure AI Document Intelligence", "Azure AI Face", "Azure AI Language"], "answer": [1], "explanation": "請求書・領収書から金額・日付・項目を抽出する専用サービスはAzure AI Document Intelligence（帳票の事前構築モデルを持つ）。<br>汎用画像はVision、テキスト解析はLanguage。“帳票の項目抽出＝Document Intelligence”。"}, {"id": 45, "domain": "コンピュータービジョン", "type": "single", "q": "画像全体が「猫」か「犬」かなど、1枚につき1つのカテゴリを判定するのはどれか。", "options": ["物体検出", "画像分類", "OCR", "セマンティックセグメンテーション"], "answer": [1], "explanation": "1枚につき1つのカテゴリ（猫/犬）を判定するのが画像分類。<br>物体の位置まで特定するのは物体検出。位置情報の有無が分かれ目です。"}, {"id": 46, "domain": "コンピュータービジョン", "type": "single", "q": "写真から顔を検出し、2つの顔が同一人物かどうかを比較したい。最適なサービスは？", "options": ["Azure AI Custom Vision", "Azure AI Face", "Azure AI Translator", "Azure AI Speech"], "answer": [1], "explanation": "顔の検出に加え、2つの顔が同一人物かを比較・認識するのはAzure AI Face。<br>Custom Visionは独自画像の分類/物体検出で、顔の照合専用ではありません。"}, {"id": 47, "domain": "コンピュータービジョン", "type": "yesno", "q": "次の記述は正しいか。『OCRは画像や文書に含まれる印刷・手書きの文字をテキストデータに変換する技術である。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しいです。OCR（光学文字認識）は画像・文書中の“印刷・手書き文字”をテキストデータに変換する技術。<br>AzureではVisionのReadやDocument Intelligenceが担当します。"}, {"id": 48, "domain": "コンピュータービジョン", "type": "single", "q": "Azure AI Vision が提供する機能で「ない」ものはどれか。", "options": ["画像のタグ付け", "OCR（テキスト読み取り）", "音声の文字起こし", "画像キャプション生成"], "answer": [2], "explanation": "音声の文字起こしはAzure AI Speechの機能で、Visionにはありません（これが“ない”もの＝正解）。<br>Visionは画像のタグ付け・OCR・キャプション生成・物体検出などを行います。“音声＝Speech、画像＝Vision”。"}, {"id": 49, "domain": "NLP", "type": "single", "q": "文章から人名・地名・組織名などの固有表現を抽出・分類したい。どの機能か。", "options": ["感情分析", "エンティティ認識（NER）", "翻訳", "キーフレーズ抽出"], "answer": [1], "explanation": "人名・地名・組織名などの固有表現を抽出・分類するのはエンティティ認識（NER）。<br>感情分析（肯定/否定）やキーフレーズ抽出（要点）とは別機能です。"}, {"id": 50, "domain": "NLP", "type": "single", "q": "文章を読み上げて音声に変換（Text-to-Speech）したい。使うAzureサービスは？", "options": ["Azure AI Language", "Azure AI Speech", "Azure AI Translator", "Azure AI Vision"], "answer": [1], "explanation": "文字を音声に変換（Text-to-Speech）も、音声を文字に（Speech-to-Text）もAzure AI Speech。<br>“音声に関わる入出力＝Speech”と覚えると迷いません。"}, {"id": 51, "domain": "NLP", "type": "single", "q": "チャットボットで、ユーザー発話から「意図(Intent)」と「エンティティ」を抽出する機能はどれか。", "options": ["感情分析", "会話言語理解（CLU）", "キーフレーズ抽出", "OCR"], "answer": [1], "explanation": "ユーザー発話から意図（Intent）とエンティティを抽出するのは会話言語理解（CLU）。Azure AI Languageが提供し、チャットボットの“理解”部分を担います。<br>感情分析やキーフレーズ抽出とは目的が違います。"}, {"id": 52, "domain": "NLP", "type": "single", "q": "よくある質問(FAQ)からQ&Aボットの知識ベースを作る、Azure AI Languageの機能はどれか。", "options": ["Question Answering（質問応答）", "物体検出", "異常検知", "翻訳"], "answer": [0], "explanation": "FAQ等からQ&Aの知識ベースを作るのはQuestion Answering（旧QnA Maker）。Azure AI Languageの機能。<br>“FAQからボット＝Question Answering”。"}, {"id": 53, "domain": "NLP", "type": "single", "q": "英語の文章を日本語のテキストに翻訳したい。最適なAzureサービスは？", "options": ["Azure AI Speech", "Azure AI Translator", "Azure AI Vision", "Azure OpenAI Service"], "answer": [1], "explanation": "英→日などのテキスト翻訳はAzure AI Translator。<br>音声の翻訳はSpeech。テキストか音声かで使い分けます。"}, {"id": 54, "domain": "NLP", "type": "multi", "q": "Azure AI Language が提供する機能をすべて選べ。", "options": ["感情分析", "キーフレーズ抽出", "画像の物体検出", "テキスト要約"], "answer": [0, 1, 3], "explanation": "Azure AI Languageは感情分析・キーフレーズ抽出・エンティティ認識・要約・CLU・質問応答などテキスト機能を提供。<br>画像の物体検出はVisionの機能なので含まれません（引っかけ）。"}, {"id": 55, "domain": "生成AI", "type": "single", "q": "大規模言語モデルでテキストを処理する単位で、課金や入力長制限の基準になるものは何か。", "options": ["ピクセル", "トークン", "エポック", "バッチ"], "answer": [1], "explanation": "LLMの処理単位はトークン（単語や単語の一部）。課金額や入力できる長さの上限もトークン数で決まります。<br>ピクセル・エポック・バッチは別の単位です。"}, {"id": 56, "domain": "生成AI", "type": "single", "q": "生成AIに自社の最新文書を検索して回答に反映させ、精度を高める手法はどれか。", "options": ["RAG（検索拡張生成）", "クラスタリング", "OCR", "正則化"], "answer": [0], "explanation": "外部・自社の最新データを検索して回答に反映するのがRAG（検索拡張生成）。再学習なしで独自情報を扱え、グラウンディングとも呼ばれます。<br>クラスタリングやOCRは無関係です。"}, {"id": 57, "domain": "生成AI", "type": "single", "q": "OpenAI・Meta(Llama)・Mistralなど多様な基盤モデルを選んでデプロイできるAzure AI Foundryの機能はどれか。", "options": ["モデルカタログ", "Designer", "Compute Cluster", "迷惑メールフィルター"], "answer": [0], "explanation": "多様な基盤モデルを選んでデプロイできるのはAzure AI Foundryのモデルカタログ。<br>Designer（GUIパイプライン）やComputeとは別機能です。"}, {"id": 58, "domain": "生成AI", "type": "single", "q": "Azure OpenAI Serviceで、暴力・憎悪・性的・自傷などの有害な入出力をブロックする仕組みは何か。", "options": ["トークナイザ", "コンテンツフィルター", "埋め込み（Embedding）", "プロンプト"], "answer": [1], "explanation": "有害な入出力を検知・ブロックするのはコンテンツフィルター。Azure OpenAIに標準搭載。<br>トークナイザ（分割）や埋め込み（ベクトル化）とは役割が違います。"}, {"id": 59, "domain": "生成AI", "type": "single", "q": "業務アプリ（Microsoft 365など）に組み込まれた生成AIアシスタントの総称はどれか。", "options": ["Copilot", "Bot Framework", "Designer", "Translator"], "answer": [0], "explanation": "業務アプリに組み込まれた生成AIアシスタントの総称がCopilot（Microsoft 365 Copilot、GitHub Copilotなど）。<br>Bot Framework（ボット開発基盤）やDesignerとは別です。"}, {"id": 60, "domain": "生成AI", "type": "yesno", "q": "次の記述は正しいか。『ハルシネーションとは、生成AIが事実に基づかない情報をもっともらしく出力する現象である。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しいです。もっともらしいが事実でない出力がハルシネーション。<br>対策は出力検証と、信頼データで根拠づけるRAG（グラウンディング）。生成AIの代表的リスクです。"}, {"id": 61, "domain": "生成AI", "type": "single", "q": "画像を生成できるOpenAIのモデルはどれか。", "options": ["Whisper", "DALL·E", "GPT-3.5", "Embeddings"], "answer": [1], "explanation": "画像を生成するOpenAIモデルはDALL·E。<br>Whisperは音声認識、GPTはテキスト生成、Embeddingsはテキストのベクトル化。役割で区別しましょう。"}, {"id": 62, "domain": "横断", "type": "single", "q": "複数のAI機能（Vision/Language/Speech）を1つのキーとエンドポイントでまとめて使うために作成するリソースはどれか。", "options": ["Azure Key Vault", "Azure AI services（マルチサービスリソース）", "Azure Storage", "Azure Functions"], "answer": [1], "explanation": "複数のAI機能（Vision/Language/Speech）を1つのキーとエンドポイントでまとめて使うのがAzure AI services（マルチサービスリソース）。<br>Key Vaultは鍵・シークレットの保管、Storageはデータ保管、Functionsはコード実行用で、いずれもAI機能そのものは提供しません。"}, {"id": 63, "domain": "AIワークロード", "type": "single", "q": "製造ラインのセンサー値から通常と異なる異常な振動を検知したい。これはどのワークロードか。", "options": ["画像分類", "異常検知", "翻訳", "要約"], "answer": [1], "explanation": "いつもの範囲から外れた値を見つけるのは異常検知。製造設備の振動や温度などの異常から、故障の予兆をつかむ用途で使われます。<br>画像分類・翻訳・要約は、それぞれ画像・言語のワークロードで、数値の外れ値検知ではありません。"}, {"id": 64, "domain": "AIワークロード", "type": "single", "q": "多言語のチャットを相手の言語にリアルタイムで変換する。これはどのAIワークロードに分類されるか。", "options": ["コンピュータービジョン", "自然言語処理", "異常検知", "回帰"], "answer": [1], "explanation": "翻訳は『言語』を扱う処理なので、自然言語処理（NLP）のワークロードに分類されます（AzureではTranslatorやSpeech翻訳）。<br>コンピュータービジョンは画像、異常検知は外れ値、回帰は数値予測。リアルタイムでも“言語を変換している”点に注目すればNLPと分かります。"}, {"id": 65, "domain": "AIワークロード", "type": "single", "q": "棚の写真から特定商品が陳列されているかを自動判定する。これはどのワークロードか。", "options": ["コンピュータービジョン", "自然言語処理", "ドキュメント処理", "生成AI"], "answer": [0], "explanation": "画像から物体や状況を認識するのはコンピュータービジョン（CV）。棚の写真から特定商品の有無を判定するのは画像認識の仕事です。<br>NLPは言語、ドキュメント処理は帳票、生成AIは新規コンテンツ作成で、いずれも『写真を見て判断』ではありません。"}, {"id": 66, "domain": "AIワークロード", "type": "single", "q": "ブログ記事の下書きを自動で作成する。これはどのワークロードか。", "options": ["異常検知", "生成AI", "クラスタリング", "OCR"], "answer": [1], "explanation": "新しい文章・画像などのコンテンツを“作り出す”のが生成AI（Generative AI）。ブログ下書きの自動作成はその典型です。<br>異常検知は外れ値、クラスタリングはグループ分け、OCRは文字読み取りで、いずれも新規生成ではありません。『ゼロから作る＝生成AI』。"}, {"id": 67, "domain": "AIワークロード", "type": "yesno", "q": "次の記述は正しいか。『ドキュメント処理はOCRと自然言語処理を組み合わせ、帳票から構造化データを抽出する。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しいです。ドキュメント処理は、文字を読むOCRと、意味を理解する自然言語処理を組み合わせて、請求書などから項目を構造化抽出します。<br>AzureではAzure AI Document Intelligenceが担当。OCR単体は“文字を読むだけ”で、項目の意味づけまではしない点が違いです。"}, {"id": 68, "domain": "AIワークロード", "type": "single", "q": "問い合わせメールを内容で『請求』『技術』『その他』に自動仕分けする。これはどのワークロードか。", "options": ["自然言語処理", "コンピュータービジョン", "異常検知", "回帰"], "answer": [0], "explanation": "文章を内容で分類するのは自然言語処理（NLP）。AzureのAzure AI Languageの『カスタムテキスト分類』で、独自カテゴリへの自動仕分けが作れます。<br>コンピュータービジョンは画像、異常検知は外れ値、回帰は数値予測で、テキスト分類には使いません。"}, {"id": 69, "domain": "AIワークロード", "type": "single", "q": "監視カメラ映像から人物の動きや混雑を解析する。これはどのワークロードか。", "options": ["コンピュータービジョン", "自然言語処理", "生成AI", "回帰"], "answer": [0], "explanation": "映像（連続した画像）から人物・動き・混雑などを読み取るのはコンピュータービジョン。<br>NLPは言語、生成AIは新規生成、回帰は数値予測。『カメラ映像を見て判断＝コンピュータービジョン』と押さえましょう。"}, {"id": 70, "domain": "責任あるAI", "type": "single", "q": "医療診断AIが誤作動しても患者に害を与えないようフェイルセーフ設計にする。どの原則か。", "options": ["信頼性と安全性", "公平性", "透明性", "包括性"], "answer": [0], "explanation": "医療AIが誤作動しても患者に害を与えないフェイルセーフ設計は、信頼性と安全性（Reliability & Safety）。<br>“万一でも安全に倒れる”設計はこの原則。公平性（偏り）や透明性（説明）とは別物です。"}, {"id": 71, "domain": "責任あるAI", "type": "single", "q": "学習データの利用に利用者の同意を得て、データを暗号化して保護する。どの原則か。", "options": ["プライバシーとセキュリティ", "公平性", "包括性", "説明責任"], "answer": [0], "explanation": "学習データの同意取得・暗号化・保護はプライバシーとセキュリティ。<br>“個人データを守る”系はすべてこの原則、と覚えると判別が速いです。"}, {"id": 72, "domain": "責任あるAI", "type": "single", "q": "AIの判定に異議を申し立てる窓口を設け、最終責任は運営企業が負う。どの原則か。", "options": ["説明責任", "透明性", "包括性", "信頼性と安全性"], "answer": [0], "explanation": "判定への異議申し立て窓口を設け、最終責任を企業が負うのは説明責任（Accountability）。<br>“責任を取る・是正の仕組み”＝説明責任。理由を示す透明性とは役割が違います。"}, {"id": 73, "domain": "責任あるAI", "type": "single", "q": "採用AIが学習データの偏りで特定の属性を優遇していた。主にどの原則の問題か。", "options": ["公平性", "可用性", "透明性", "説明責任"], "answer": [0], "explanation": "学習データの偏りで特定属性を優遇/冷遇するのは公平性（Fairness）の問題。採用・融資など人を選ぶAIで特に重要。<br>可用性（使える状態か）は別概念の引っかけです。"}, {"id": 74, "domain": "責任あるAI", "type": "single", "q": "チャットボットが『私はAIで、できないこともあります』と能力と限界を明示する。どの原則か。", "options": ["透明性", "公平性", "包括性", "信頼性と安全性"], "answer": [0], "explanation": "『私はAIで、できないこともあります』と能力と限界を明示するのは透明性（Transparency）。<br>利用者が“何ができ何ができないか”を理解できる状態にする原則です。"}, {"id": 75, "domain": "責任あるAI", "type": "multi", "q": "責任あるAIの『包括性(Inclusiveness)』に当てはまる取り組みを全て選べ。", "options": ["字幕や音声で多様な利用者に対応", "障害のある人も使えるUI", "収益を最大化する", "多言語に対応する"], "answer": [0, 1, 3], "explanation": "包括性（Inclusiveness）は、障害・言語・背景にかかわらず誰もが使えるようにする原則。字幕・音声対応、アクセシブルなUI、多言語対応が該当します。<br>収益最大化はビジネス目標で、責任あるAIの原則とは無関係（引っかけ）。"}, {"id": 76, "domain": "責任あるAI", "type": "yesno", "q": "次の記述は正しいか。『公平性(Fairness)とは、すべての利用者がサービスにアクセスできることを指す。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [1], "explanation": "誤りです。『誰もがアクセスできる』のは包括性（Inclusiveness）。公平性（Fairness）は偏り・差別をなくすこと。<br>この2つは入れ替えの引っかけが頻出。公平性＝偏りなし、包括性＝誰でも使える、と固定で覚えましょう。"}, {"id": 77, "domain": "機械学習", "type": "single", "q": "気温から電力需要(数値)を予測する。最適な手法は。", "options": ["回帰", "二項分類", "クラスタリング", "多クラス分類"], "answer": [0], "explanation": "電力需要などの連続値の予測は回帰。<br>“数値を当てる＝回帰”。分類（カテゴリ）やクラスタリング（グループ化）とは目的が違います。"}, {"id": 78, "domain": "機械学習", "type": "single", "q": "手書き数字を0〜9のいずれかに判定する。これはどの手法か。", "options": ["二項分類", "多クラス分類", "回帰", "クラスタリング"], "answer": [1], "explanation": "0〜9のいずれかへ判定は、10カテゴリへの多クラス分類。<br>2択なら二項分類、数値予測なら回帰。カテゴリ数で見分けます。"}, {"id": 79, "domain": "機械学習", "type": "single", "q": "閲覧履歴から似た嗜好の顧客群を、正解ラベルなしで発見する。これはどの手法か。", "options": ["クラスタリング", "回帰", "二項分類", "異常検知"], "answer": [0], "explanation": "正解ラベルなしで似た嗜好の顧客群を見つけるのはクラスタリング（教師なし）。<br>分類はラベルありなので別。“ラベルなしでまとめる＝クラスタリング”。"}, {"id": 80, "domain": "機械学習", "type": "single", "q": "画像認識や音声認識で高精度を出す、多層ニューラルネットワークを用いる手法は。", "options": ["ディープラーニング", "線形回帰", "決定木", "k-means"], "answer": [0], "explanation": "多層ニューラルネットワークで高精度を出すのがディープラーニング。画像・音声認識で強みを発揮します。<br>線形回帰・決定木・k-meansは別種の手法。“多層NN＝ディープラーニング”。"}, {"id": 81, "domain": "機械学習", "type": "single", "q": "GPTなどの大規模言語モデルの基盤となるアーキテクチャは。", "options": ["Transformer", "CNN", "RNNのみ", "SVM"], "answer": [0], "explanation": "GPTなど大規模言語モデルの基盤はTransformer。Attention（自己注意）で単語間の関係を捉えます。<br>CNNは画像向け。“LLMの土台＝Transformer”。"}, {"id": 82, "domain": "機械学習", "type": "single", "q": "ラベル付きデータで学習する方式の総称は。", "options": ["教師あり学習", "教師なし学習", "強化学習", "転移学習"], "answer": [0], "explanation": "正解ラベルを使って学ぶのが教師あり学習（回帰・分類が代表）。<br>ラベルなしは教師なし、報酬で学ぶのは強化学習。ラベルの有無で分類します。"}, {"id": 83, "domain": "機械学習", "type": "single", "q": "Azure MLでモデルの学習・推論を実行する計算リソースを何と呼ぶか。", "options": ["コンピューティングターゲット(Compute)", "データストア", "モデルレジストリ", "データセット"], "answer": [0], "explanation": "学習・推論を動かす計算リソースがコンピューティングターゲット（Compute Instance/Cluster）。<br>データストア（保管）やモデルレジストリ（モデル管理）とは役割が別です。"}, {"id": 84, "domain": "機械学習", "type": "single", "q": "学習済みモデルをREST APIのエンドポイントとして公開し推論を提供する操作は。", "options": ["モデルのデプロイ", "データラベリング", "特徴量抽出", "AutoML"], "answer": [0], "explanation": "学習済みモデルをエンドポイント（REST API）として公開し推論を提供する操作がデプロイ。これでアプリから予測を呼び出せます。<br>データラベリングやAutoMLとは工程が違います。"}, {"id": 85, "domain": "機械学習", "type": "single", "q": "分類モデルで『実際に陽性のもののうち、正しく陽性と予測できた割合』を表す指標は。", "options": ["再現率(Recall)", "適合率(Precision)", "平均二乗誤差", "学習率"], "answer": [0], "explanation": "再現率（Recall）＝実際に陽性のうち正しく陽性と当てた割合（TP/(TP+FN)）。“見逃しの少なさ”の指標で、病気の検出など取りこぼしを減らしたい場面で重視します。<br>適合率（誤検出の少なさ）と混同しないこと。"}, {"id": 86, "domain": "機械学習", "type": "single", "q": "分類モデルで『陽性と予測したもののうち、実際に陽性だった割合』を表す指標は。", "options": ["適合率(Precision)", "再現率(Recall)", "平均二乗誤差", "決定係数"], "answer": [0], "explanation": "適合率（Precision）＝陽性と予測したうち実際に陽性だった割合（TP/(TP+FP)）。“誤検出の少なさ”の指標で、陽性判定の正確さを重視する場面で使います。<br>再現率（見逃しの少なさ）と対で覚えましょう。"}, {"id": 87, "domain": "機械学習", "type": "yesno", "q": "次の記述は正しいか。『特徴量(feature)は予測したい目的の値で、ラベル(label)はモデルへの入力である。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [1], "explanation": "誤りです。逆になっています。特徴量（feature）＝モデルへの“入力”、ラベル（label）＝予測したい“正解”。<br>入力＝特徴量、答え＝ラベル、と固定で覚えると取り違えません。"}, {"id": 88, "domain": "機械学習", "type": "single", "q": "反復学習で訓練精度は上がるのに検証精度が下がり始めた。考えられる現象は。", "options": ["過学習", "未学習(underfitting)", "データ拡張", "正規化"], "answer": [0], "explanation": "訓練精度は上がるのに検証精度が下がり始めるのは過学習（オーバーフィッティング）の典型サイン。<br>逆に両方低いままなら未学習。検証データで監視して気づくのがポイントです。"}, {"id": 89, "domain": "コンピュータービジョン", "type": "single", "q": "スキャンした契約書PDFから文字を抽出して検索可能にしたい。使う技術は。", "options": ["OCR", "物体検出", "顔認識", "クラスタリング"], "answer": [0], "explanation": "スキャン文書から文字を抽出して検索可能にするのはOCR。<br>物体検出（位置特定）や顔認識とは目的が違います。“文書の文字を読む＝OCR”。"}, {"id": 90, "domain": "コンピュータービジョン", "type": "single", "q": "SNS画像に何が写っているかをタグ付けし、説明文を生成したい。最適なサービスは。", "options": ["Azure AI Vision", "Azure AI Language", "Azure AI Speech", "Azure Machine Learning"], "answer": [0], "explanation": "画像に何が写るかのタグ付け・説明文（キャプション）生成はAzure AI Vision。<br>Languageはテキスト、Speechは音声。“画像を見て説明＝Vision”。"}, {"id": 91, "domain": "コンピュータービジョン", "type": "single", "q": "工場の製品写真から独自のキズ種類を分類するモデルを自分で訓練したい。最適なサービスは。", "options": ["Azure AI Custom Vision", "Azure AI Vision", "Azure AI Face", "Azure AI Document Intelligence"], "answer": [0], "explanation": "工場の独自キズ種類を“自分で訓練”して分類するのはAzure AI Custom Vision。<br>学習済み汎用のVisionでは独自カテゴリの分類はできません。“独自データで訓練＝Custom Vision”。"}, {"id": 92, "domain": "コンピュータービジョン", "type": "single", "q": "運転免許証やパスポートから記載情報を抽出したい。最適なサービスは。", "options": ["Azure AI Document Intelligence", "Azure AI Face", "Azure AI Translator", "Azure AI Language"], "answer": [0], "explanation": "免許証・パスポートなどのID/帳票から記載情報を抽出するのはAzure AI Document Intelligence（IDの事前構築モデルあり）。<br>Faceは顔、Translatorは翻訳で別用途です。"}, {"id": 93, "domain": "コンピュータービジョン", "type": "single", "q": "画像内の歩行者一人ひとりを枠で囲んで人数を数えたい。これはどの技術か。", "options": ["物体検出", "画像分類", "OCR", "感情分析"], "answer": [0], "explanation": "歩行者一人ひとりを枠で囲んで数えるのは物体検出（位置を特定して個数を数える）。<br>画像分類は全体のカテゴリだけで個数は数えません。"}, {"id": 94, "domain": "コンピュータービジョン", "type": "single", "q": "入退室管理で登録済み社員の顔と照合して本人確認したい。最適なサービスは。", "options": ["Azure AI Face", "Azure AI Custom Vision", "Azure AI Vision", "Azure AI Speech"], "answer": [0], "explanation": "登録済み社員の顔と照合して本人確認するのはAzure AI Face（顔の照合・認証）。<br>Custom Visionは独自分類、Visionは汎用画像で、本人確認専用ではありません。"}, {"id": 95, "domain": "コンピュータービジョン", "type": "multi", "q": "Azure AI Vision で実行できるタスクを全て選べ。", "options": ["画像のキャプション生成", "OCR(テキスト抽出)", "一般的な物体の検出", "音声合成"], "answer": [0, 1, 2], "explanation": "Azure AI Visionは画像のキャプション生成・OCR・一般物体の検出などを提供します。<br>音声合成はSpeechの機能なので含まれません（引っかけ）。“画像系＝Vision、音声系＝Speech”。"}, {"id": 96, "domain": "コンピュータービジョン", "type": "single", "q": "画像を背景・人物・車などピクセル単位で領域分けする手法は。", "options": ["セマンティックセグメンテーション", "画像分類", "OCR", "顔検出"], "answer": [0], "explanation": "画像を背景・人物・車などピクセル単位で領域分けするのはセマンティックセグメンテーション。<br>画像分類（全体1ラベル）や物体検出（枠）より細かい“塗り分け”です。"}, {"id": 97, "domain": "コンピュータービジョン", "type": "yesno", "q": "次の記述は正しいか。『画像分類は1枚に1つのラベルを割り当て、物体検出は複数物体の位置とラベルを返す。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しいです。画像分類＝1枚に1つのラベル、物体検出＝複数物体の“位置＋種類”を返す。<br>ラベルだけか、位置も返すかが両者の違いです。"}, {"id": 98, "domain": "コンピュータービジョン", "type": "single", "q": "レシートから店名・日付・合計金額を抽出する事前構築モデルを持つサービスは。", "options": ["Azure AI Document Intelligence", "Azure AI Vision", "Azure AI Language", "Azure OpenAI Service"], "answer": [0], "explanation": "レシートから店名・日付・合計を抽出する事前構築モデルを持つのはAzure AI Document Intelligence。<br>汎用画像のVisionやテキストのLanguageとは別。“帳票/レシート＝Document Intelligence”。"}, {"id": 99, "domain": "コンピュータービジョン", "type": "single", "q": "動画内の顔・音声・テキスト・シーンを抽出して索引化したい。最適なサービスは。", "options": ["Azure AI Video Indexer", "Azure AI Face", "Azure AI Translator", "Azure Machine Learning"], "answer": [0], "explanation": "動画内の顔・音声・テキスト・シーンを抽出して索引化するのはAzure AI Video Indexer。<br>Faceは静止画の顔、Translatorは翻訳で、動画まるごとの分析には向きません。"}, {"id": 100, "domain": "NLP", "type": "single", "q": "長文ニュースを数行に要約したい。最適なサービスは。", "options": ["Azure AI Language", "Azure AI Speech", "Azure AI Vision", "Azure AI Translator"], "answer": [0], "explanation": "長文の要約はAzure AI Languageの機能（テキスト要約）。<br>音声はSpeech、画像はVision、翻訳はTranslator。“テキスト処理＝Language”。"}, {"id": 101, "domain": "NLP", "type": "single", "q": "会議の英語音声を日本語に翻訳したい(音声の翻訳)。最適なサービスは。", "options": ["Azure AI Speech", "Azure AI Translator", "Azure AI Language", "Azure AI Vision"], "answer": [0], "explanation": "会議“音声”の翻訳はAzure AI Speech（音声翻訳）。<br>テキストの翻訳ならTranslator。入力が音声か文字かで分かれます。"}, {"id": 102, "domain": "NLP", "type": "single", "q": "文章が何語で書かれているかを判定したい。これはどの機能か。", "options": ["言語検出", "感情分析", "キーフレーズ抽出", "音声認識"], "answer": [0], "explanation": "文章が何語かを判定するのは言語検出。Azure AI Languageが提供。<br>感情分析やキーフレーズ抽出とは別機能です。"}, {"id": 103, "domain": "NLP", "type": "single", "q": "コールセンターの音声を文字に起こしたい。文字起こしを担うサービスは。", "options": ["Azure AI Speech", "Azure AI Language", "Azure AI Translator", "Azure AI Vision"], "answer": [0], "explanation": "コールセンター音声の文字起こしはAzure AI Speech（Speech-to-Text）。<br>テキスト解析のLanguageや翻訳のTranslatorとは別。“音声→文字＝Speech”。"}, {"id": 104, "domain": "NLP", "type": "single", "q": "文章から重要な語句(要点)を抜き出したい。これはどの機能か。", "options": ["キーフレーズ抽出", "エンティティ認識", "感情分析", "翻訳"], "answer": [0], "explanation": "文章から重要な語句（要点）を抜き出すのはキーフレーズ抽出。<br>エンティティ認識（固有名詞）や感情分析（肯定/否定）とは目的が違います。"}, {"id": 105, "domain": "NLP", "type": "single", "q": "テキストから電話番号やメールなど個人を特定しうる情報を検出してマスクしたい。これはどの機能か。", "options": ["PII検出", "キーフレーズ抽出", "音声合成", "物体検出"], "answer": [0], "explanation": "電話番号・メールなど個人を特定しうる情報を検出・マスクするのはPII検出（Azure AI Language）。<br>キーフレーズ抽出や物体検出とは別機能。“個人情報の検出＝PII検出”。"}, {"id": 106, "domain": "NLP", "type": "single", "q": "既存のFAQページから自動でQ&Aボットの知識ベースを作りたい。これはどの機能か。", "options": ["Question Answering", "感情分析", "翻訳", "OCR"], "answer": [0], "explanation": "既存FAQからQ&Aボットの知識ベースを自動作成するのはQuestion Answering（Azure AI Language）。<br>感情分析・翻訳・OCRとは用途が違います。"}, {"id": 107, "domain": "NLP", "type": "multi", "q": "Azure AI Speech が提供する機能を全て選べ。", "options": ["音声→テキスト", "テキスト→音声", "音声翻訳", "テキスト要約"], "answer": [0, 1, 2], "explanation": "Azure AI Speechは音声→テキスト・テキスト→音声・音声翻訳・話者認識を提供。<br>テキスト要約はLanguageの機能で含まれません（引っかけ）。"}, {"id": 108, "domain": "NLP", "type": "single", "q": "ボットでユーザー発話の意図を分類し、エンティティ(スロット)を埋める言語理解は。", "options": ["会話言語理解(CLU)", "感情分析", "言語検出", "話者認識"], "answer": [0], "explanation": "ボットでユーザー発話の意図を分類し、エンティティ（スロット）を埋めるのは会話言語理解（CLU）。<br>感情分析や言語検出とは役割が違います。"}, {"id": 109, "domain": "NLP", "type": "single", "q": "話している人が誰かを声で識別したい。これはどの機能か。", "options": ["話者認識", "感情分析", "エンティティ認識", "翻訳"], "answer": [0], "explanation": "声で“誰が話しているか”を識別するのは話者認識（Speaker Recognition、Azure AI Speech）。<br>感情分析やエンティティ認識（テキスト系）とは別です。"}, {"id": 110, "domain": "NLP", "type": "yesno", "q": "次の記述は正しいか。『Azure AI Translator は音声をリアルタイムに文字起こしするサービスである。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [1], "explanation": "誤りです。音声のリアルタイム文字起こしはAzure AI Speech。<br>Azure AI Translatorはテキスト翻訳が役割。“音声＝Speech、文字翻訳＝Translator”。"}, {"id": 111, "domain": "NLP", "type": "single", "q": "多数の商品レビューから肯定/否定の割合を集計したい。中核となる機能は。", "options": ["感情分析", "キーフレーズ抽出", "翻訳", "OCR"], "answer": [0], "explanation": "多数のレビューの肯定/否定を集計する中核は感情分析。<br>キーフレーズ抽出（要点）や翻訳とは目的が違います。"}, {"id": 112, "domain": "生成AI", "type": "single", "q": "社内ナレッジを参照して最新情報を反映する生成AIチャットを作りたい。中核の仕組みは。", "options": ["RAG(グラウンディング)", "ハイパーパラメータ調整", "クラスタリング", "OCR"], "answer": [0], "explanation": "社内ナレッジを参照して最新情報を反映する生成AIチャットの中核はRAG（グラウンディング）。再学習せず外部データを検索して回答に反映します。<br>ハイパーパラメータ調整やOCRとは別物です。"}, {"id": 113, "domain": "生成AI", "type": "single", "q": "GPT-4oやDALL·EをAzureのセキュリティ下で使いたい。最適なサービスは。", "options": ["Azure OpenAI Service", "Azure AI Vision", "Azure Machine Learning Designer", "Azure AI Translator"], "answer": [0], "explanation": "GPT-4oやDALL·EをAzureのセキュリティ・ガバナンス下で使うのはAzure OpenAI Service。<br>Vision/ML Designer/Translatorは生成用途ではありません。"}, {"id": 114, "domain": "生成AI", "type": "single", "q": "生成AIアプリの構築・評価・デプロイを行う統合プラットフォームは。", "options": ["Azure AI Foundry", "Power Automate", "Azure Monitor", "Azure DevOps"], "answer": [0], "explanation": "生成AIアプリの構築・評価・デプロイを行う統合プラットフォームはAzure AI Foundry。<br>Power Automate/Monitor/DevOpsは別用途です。"}, {"id": 115, "domain": "生成AI", "type": "single", "q": "生成AIモデルに与える指示文を何と呼ぶか。", "options": ["プロンプト", "トークン", "ラベル", "埋め込み"], "answer": [0], "explanation": "生成AIに与える“指示文”がプロンプト。<br>トークンは処理単位、ラベルは学習の正解、埋め込みはベクトル化で別概念です。"}, {"id": 116, "domain": "生成AI", "type": "single", "q": "望む出力を得るために指示文を工夫する作業を何と呼ぶか。", "options": ["プロンプトエンジニアリング", "ファインチューニング", "正規化", "クラスタリング"], "answer": [0], "explanation": "望む出力を引き出すために指示文（プロンプト）を工夫する作業がプロンプトエンジニアリング。<br>ファインチューニング（再学習）とは違い、モデルを変えずに入力で調整します。"}, {"id": 117, "domain": "生成AI", "type": "single", "q": "テキストを数値ベクトルに変換し意味の近さを測る技術(検索やRAGで利用)は。", "options": ["埋め込み(Embeddings)", "トークン化", "コンテンツフィルター", "プロンプト"], "answer": [0], "explanation": "テキストを数値ベクトルに変換し意味の近さを測るのが埋め込み（Embeddings）。類似検索やRAGの基盤技術です。<br>トークン化（分割）やプロンプトとは役割が違います。"}, {"id": 118, "domain": "生成AI", "type": "single", "q": "生成AIが有害・不適切な出力を返さないようにする標準機能は。", "options": ["コンテンツフィルター", "オートスケール", "ロードバランサ", "埋め込み"], "answer": [0], "explanation": "有害・不適切な出力を防ぐ標準機能はコンテンツフィルター。Azure OpenAIに搭載。<br>オートスケールやロードバランサはインフラの話で別です。"}, {"id": 119, "domain": "生成AI", "type": "single", "q": "多様な基盤モデル(Llama・Mistral・OpenAI等)を比較・選択してデプロイできる場所は。", "options": ["モデルカタログ", "データストア", "Compute", "メトリック"], "answer": [0], "explanation": "Llama・Mistral・OpenAIなど多様な基盤モデルを比較・選択・デプロイできるのはモデルカタログ（Azure AI Foundry）。<br>データストアやComputeとは役割が違います。"}, {"id": 120, "domain": "生成AI", "type": "single", "q": "既存モデルを自社データで追加学習し特定タスクに最適化する手法は。", "options": ["ファインチューニング", "クラスタリング", "OCR", "異常検知"], "answer": [0], "explanation": "既存モデルを自社データで追加学習し特定タスクに最適化するのがファインチューニング。<br>外部データを“検索して使う”RAGとは別アプローチ（RAGは再学習しない）。"}, {"id": 121, "domain": "生成AI", "type": "single", "q": "LLMが応答として生成する出力テキストを何と呼ぶか。", "options": ["補完(Completion)", "プロンプト", "ラベル", "特徴量"], "answer": [0], "explanation": "LLMが生成する出力テキストを補完（Completion）と呼びます（入力がプロンプト、出力が補完）。<br>ラベルや特徴量は機械学習の用語で別物です。"}, {"id": 122, "domain": "生成AI", "type": "single", "q": "GitHub上でコード補完を提供する生成AIアシスタントは。", "options": ["GitHub Copilot", "Azure Monitor", "Power BI", "Azure AI Translator"], "answer": [0], "explanation": "GitHub上でコード補完を提供する生成AIアシスタントはGitHub Copilot。<br>Monitor/Power BI/Translatorは別サービスです。"}, {"id": 123, "domain": "生成AI", "type": "single", "q": "生成AIの責任あるAIで特に注意すべき、誤情報をもっともらしく生成するリスクは。", "options": ["ハルシネーション", "過学習", "データ欠損", "レイテンシ"], "answer": [0], "explanation": "誤情報をもっともらしく生成するリスクがハルシネーション。生成AIの責任あるAIで特に注意すべき点です。<br>過学習やレイテンシは別概念。対策はRAGや出力検証。"}, {"id": 124, "domain": "生成AI", "type": "multi", "q": "生成AIの一般的な活用シナリオを全て選べ。", "options": ["文章の要約・草案作成", "チャットボット応答", "画像生成", "物理的な配線作業"], "answer": [0, 1, 2], "explanation": "生成AIは文章の要約・草案作成、チャットボット応答、画像生成などに活用できます。<br>物理的な配線作業は生成AIの対象外（引っかけ）。"}, {"id": 125, "domain": "生成AI", "type": "single", "q": "LLMの入力長上限や課金の基準となる単位は。", "options": ["トークン", "ピクセル", "エポック", "ノード"], "answer": [0], "explanation": "LLMの入力長上限や課金の基準はトークン。<br>ピクセル（画像）・エポック（学習回数）・ノードは別の単位です。"}, {"id": 126, "domain": "生成AI", "type": "single", "q": "生成AIに役割や口調を指示する『あなたは丁寧なサポート担当です』のような前提指示を何と呼ぶか。", "options": ["システムプロンプト", "ラベル", "ハイパーパラメータ", "埋め込み"], "answer": [0], "explanation": "役割や口調を定める前提指示はシステムプロンプト（システムメッセージ）。<br>ユーザーの個別質問（ユーザープロンプト）より上位で、会話全体の振る舞いを決めます。"}, {"id": 127, "domain": "生成AI", "type": "yesno", "q": "次の記述は正しいか。『RAGはモデルを再学習せずに外部データを検索して回答に反映できる。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しいです。RAGはモデルを再学 し、データの収集・使用・保管に関する管理手段と情報を提供し、利用者が自分のデータの扱いを選択・管理できるようにする。これは責任あるAIのどの原則の例か。", "options": ["プライバシーとセキュリティ（Privacy & Security）", "説明責任（Accountability）", "公平性（Fairness）", "情報管理"], "answer": [0], "explanation": "データの<b>収集・使用・保管</b>に透明性を確保し、利用者が自分のデータの扱いを選択・管理できる仕組みを提供するのは<b>プライバシーとセキュリティ（Privacy & Security）</b>。<br>『情報管理』は責任あるAIの6原則には存在しないダミー選択肢です。6原則＝公平性／信頼性と安全性／プライバシーとセキュリティ／包括性／透明性／説明責任、をまず暗記しましょう。"}, {"id": 144, "domain": "責任あるAI", "type": "single", "q": "自動運転用のAIシステムを開発する際、システム障害や誤作動が起きても予測可能で一貫した安全な動作を保証する必要がある。適用すべき責任あるAIの原則はどれか。", "options": ["動作保証", "信頼性と安全性（Reliability & Safety）", "プライバシーとセキュリティ（Privacy & Security）", "説明責任（Accountability）"], "answer": [1], "explanation": "自動運転のような重要システムで、<b>障害・誤作動時でも予測可能で安全に動作する</b>ことを求めるのは<b>信頼性と安全性（Reliability & Safety）</b>。想定外の状況や悪意ある操作にも安定して機能することを重視します。<br>『動作保証』は6原則に存在しないダミー。安全に関わる重要システムの一貫動作＝信頼性と安全性、と結びつけます。"}];
const LSKEY='ai900_state_v2';

/* ===== 永続化（localStorage／不可時はメモリにフォールバック） ===== */
let mem=null;
function blankState(){return {v:2,q:{},wrong:[],dom:{},sessions:[],best:0};}
function loadRaw(){
  try{const s=localStorage.getItem(LSKEY);if(s)return JSON.parse(s);}catch(e){}
  return mem;
}
function getState(){
  let s=loadRaw();
  if(!s||s.v!==2) s=blankState();
  s.q=s.q||{}; s.wrong=s.wrong||[]; s.dom=s.dom||{}; s.sessions=s.sessions||[]; s.best=s.best||0;
  return s;
}
function saveState(s){ mem=s; try{localStorage.setItem(LSKEY,JSON.stringify(s));}catch(e){} }

/* ===== 純粋ロジック（DOM非依存・テスト対象） ===== */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function arrEq(a,b){a=a.slice().sort((x,y)=>x-y);b=b.slice().sort((x,y)=>x-y);return a.length===b.length&&a.every((v,i)=>v===b[i]);}
function applyAnswer(s,q,isOK){
  const st=s.q[q.id]||(s.q[q.id]={seen:0,wrong:0,lastOK:false});
  st.seen++; if(!isOK)st.wrong++; st.lastOK=isOK;
  const i=s.wrong.indexOf(q.id);
  if(isOK){ if(i>=0)s.wrong.splice(i,1); } else { if(i<0)s.wrong.push(q.id); }
  const d=s.dom[q.domain]||(s.dom[q.domain]={c:0,t:0});
  d.t++; if(isOK)d.c++;
}
function buildPool(all,opts,s){
  let base;
  if(opts.mode==='review'){
    const w=new Set(s.wrong);
    base=all.filter(q=>w.has(q.id));
    if(opts.domain&&opts.domain!=='ALL') base=base.filter(q=>q.domain===opts.domain);
  }else{
    base=(opts.domain&&opts.domain!=='ALL')?all.filter(q=>q.domain===opts.domain):all.slice();
  }
  base=(opts.order==='seq')?base.slice():shuffle(base);
  const n=(opts.count&&opts.count>0)?opts.count:base.length;
  return base.slice(0,n);
}
function recordSession(s,total,correct,mode){
  const pct=total?Math.round(correct/total*100):0;
  s.sessions.push({date:new Date().toISOString().slice(0,10),total,correct,pct,mode});
  if(s.sessions.length>30)s.sessions=s.sessions.slice(-30);
  if(pct>s.best)s.best=pct;
  return pct;
}
function domainAccuracy(s){
  return Object.keys(s.dom).map(k=>{const d=s.dom[k];return{domain:k,c:d.c,t:d.t,pct:d.t?Math.round(d.c/d.t*100):0};})
    .sort((a,b)=>a.pct-b.pct);
}

  $('reviewBtn').disabled = wn===0;

  // dashboard body
  const body=$('dashBody');
  if(S.sessions.length===0){
    body.innerHTML='<div class="muted">まだ記録がありません。まずは10問やってみましょう。</div>';

  }
  const totalAns=Object.values(S.dom).reduce((a,d)=>a+d.t,0);
  const totalCor=Object.values(S.dom).reduce((a,d)=>a+d.c,0);
  const overall=totalAns?Math.round(totalCor/totalAns*100):0;
  let html='<div class="stats">'+
    `<div class="stat"><div class="n">${S.sessions.length}</div><div class="l">セッション</div></div>`+

    `<div class="stat"><div class="n">${S.best}%</div><div class="l">ベスト</div></div>`+
    '</div>';
  const last=S.sessions.slice(-6).map(x=>x.pct+'%');
  html+=`<div class="trend">直近の正答率: ${last.join(' → ')}</div>`;
  html+='<div style="height:10px"></div><div class="muted" style="font-size:.8rem;margin-bottom:4px">ドメイン別正答率（弱い順）</div>';
  domainAccuracy(S).forEach(d=>{
    const col = d.pct>=70?'var(--ok)':(d.pct>=50?'var(--warn)':'var(--ng)');
    html+=`<div class="domrow"><div class="nm">${d.domain}</div>`+
      `<div class="track"><div class="fill" style="width:${d.pct}%;background:${col}"></div></div>`+
      `<div class="pc" style="color:${col}">${d.pct}%</div></div>`;
  });
  body.innerHTML=html;
}

function populateDomains(){
  const domains=[...new Set(QUESTIONS.map(q=>q.domain))];
  $('selDomain').innerHTML='<option value="ALL">すべて（全'+QUESTIONS.length+'問）</option>'+
    domains.map(d=>`<option value="${d}">${d}（${QUESTIONS.filter(q=>q.domain===d).length}問）</option>`).join('');
}

function startQuiz(mode){
  S=getState();
  curMode=mode;
  const dom=$('selDomain').value;
  const cnt=parseInt($('selCount').value,10);
  const order=$('selOrder').value;
  const opts = mode==='review'
    ? {mode:'review',domain:'ALL',count:0,order:'random'}   // 復習は全要復習をランダムに
    : {mode:'normal',domain:dom,count:cnt,order:order};
  pool=buildPool(QUESTIONS,opts,S);
  if(pool.length===0){
    alert(mode==='review'?'復習する問題がありません。':'該当する問題がありません。');
    return;
  }
  idx=0;score=0;results=[];
  show('quiz');
  renderQ();
}

function renderQ(){
  answered=false;sel=new Set();
  const q=pool[idx];
  const multi=q.type==='multi';
  $('qProgress').textContent=(idx+1)+' / '+pool.length+(curMode==='review'?'（復習）':'');
  $('qScore').textContent='正解 '+score;
  $('qBar').style.width=(idx/pool.length*100)+'%';
  $('qDomain').textContent=q.domain+(multi?'・複数選択':'');
  $('qText').textContent=q.q;
  $('qHint').textContent=multi?'※ 当てはまるものを全て選択':'';
  $('qExplain').innerHTML='';
  const oc=$('qOptions');oc.innerHTML='';
  const order=shuffle(q.options.map((_,i)=>i)); // 選択肢の並びを毎回シャッフル（元indexは保持）
  order.forEach(i=>{
    const d=document.createElement('div');
    d.className='opt'+(multi?'':' round');
    d.dataset.i=i;
    d.innerHTML='<div class="box"></div><div>'+q.options[i]+'</div>';
    d.onclick=()=>toggle(i,multi,d);
    oc.appendChild(d);
  });
  const a=$('qAction');a.textContent='解答する';
}

function toggle(i,multi,el){
  if(answered)return;
  if(multi){
    if(sel.has(i)){sel.delete(i);el.classList.remove('sel');el.querySelector('.box').textContent='';}
    else{sel.add(i);el.classList.add('sel');el.querySelector('.box').textContent='✓';}
  }else{
    sel.clear();
    document.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel');o.querySelector('.box').textContent='';});
    sel.add(i);el.classList.add('sel');el.querySelector('.box').textContent='●';
  }
}

function onAction(){ if(!answered){ if(sel.size===0)return; grade(); } else { next(); } }

function grade(){
  answered=true;
  const q=pool[idx];
  const correct=q.answer;
  const isOK=arrEq([...sel],correct);
  if(isOK)score++;
  results.push({q,isOK});
  // 状態更新＆即保存（中断しても記録が残る）
  applyAnswer(S,q,isOK);
  saveState(S);
  document.querySelectorAll('.opt').forEach(o=>{
    const i=parseInt(o.dataset.i,10);
    if(correct.includes(i))o.classList.add('correct');
    else if(sel.has(i))o.classList.add('wrong');
  });
  $('qExplain').innerHTML='<div class="explain '+(isOK?'ok':'ng')+'"><b>'+(isOK?'⭕ 正解':'❌ 不正解')+'</b><br>'+q.explanation+'</div>';
  $('qScore').textContent='正解 '+score;
  $('qAction').textContent=(idx+1<pool.length)?'次の問題 →':'結果を見る 🎯';
}

function next(){ idx++; if(idx<pool.length)renderQ(); else showResult(); }

function showResult(){
  const pct=recordSession(S,pool.length,score,curMode);
  saveState(S);
  show('result');
  $('rMode').textContent=(curMode==='review'?'復習モードの結果':'結果');
  $('rScore').textContent=score+' / '+pool.length;
  $('rPct').textContent='正答率 '+pct+'%';
  const msg=$('rMsg');
  if(pct>=70){msg.textContent='🎉 合格ライン！この調子で本番へ';msg.style.color='var(--ok)';}
  else{msg.textContent='💪 あと少し。間違えた問題を復習しよう';msg.style.color='var(--ng)';}
  const wrong=results.filter(x=>!x.isOK);
  const rc=$('rReviewCard'), rb=$('rReviewBtn');
  if(wrong.length===0){
    rc.classList.add('hide'); rb.classList.add('hide');
  }else{
    rc.classList.remove('hide'); rb.classList.remove('hide');
    rb.textContent='間違いをすぐ復習（'+S.wrong.length+'問）🔁';
    $('rReview').innerHTML=wrong.map(x=>{
      const ca=x.q.answer.map(i=>x.q.options[i]).join(' / ');
      return '<div class="reviewItem"><b>Q.</b> '+x.q.q+'<br><span class="muted">正解: '+ca+'</span><br><span class="muted">'+x.q.explanation+'</span></div>';
    }).join('');
  }
}

function showStart(){ renderDashboard(); show('start'); }

function resetAll(){
  if(!confirm('学習記録（正答率・復習リスト・履歴）を全て消去します。よろしいですか？'))return;
  mem=null; try{localStorage.removeItem(LSKEY);}catch(e){}
  renderDashboard();
}

/* ===== 起動（ブラウザのみ） ===== */
function boot(){ populateDomains(); renderDashboard(); show('start'); }
if(typeof document!=='undefined'){ document.addEventListener('DOMContentLoaded',boot); }
</script>
</body>
</html>
