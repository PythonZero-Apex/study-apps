<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI-900 練習問題</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AI-900">
<meta name="application-name" content="AI-900">
<style>
  :root{
    --bg:#0f1220; --card:#1a1f33; --card2:#222843; --text:#e8ebf5; --muted:#9aa3c4;
    --accent:#4f8cff; --accent2:#7c5cff; --ok:#2ecc71; --ng:#ff5c72; --warn:#ffb454; --line:#2c3350;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(160deg,#0f1220,#141a30);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.7;padding:16px;min-height:100vh}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:1.4rem;margin:.2em 0}
  .sub{color:var(--muted);font-size:.9rem;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px;margin-bottom:16px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
  .card h2{font-size:1rem;margin:0 0 12px}
  label.field{display:block;color:var(--muted);font-size:.85rem;margin:10px 0 4px}
  select,button{font:inherit}
  select{background:var(--card2);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:11px 12px;width:100%}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;
    border-radius:12px;padding:14px 20px;font-weight:700;cursor:pointer;transition:.15s;width:100%}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.secondary{background:var(--card2);border:1px solid var(--line)}
  .btn.review{background:linear-gradient(135deg,#ff8a3d,#ff5c72)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:var(--muted);margin-bottom:8px}
  .bar{height:7px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.3s}
  .tag{display:inline-block;font-size:.72rem;background:var(--card2);border:1px solid var(--line);
    color:var(--muted);padding:3px 9px;border-radius:99px;margin-bottom:10px}
  .qtext{font-size:1.08rem;font-weight:600;margin:6px 0 16px}
  .opt{display:flex;gap:11px;align-items:flex-start;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.sel{border-color:var(--accent);background:#26305a}
  .opt.correct{border-color:var(--ok);background:rgba(46,204,113,.14)}
  .opt.wrong{border-color:var(--ng);background:rgba(255,92,114,.14)}
  .opt .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--muted);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:.8rem;margin-top:2px}
  .opt.round .box{border-radius:50%}
  .hint{font-size:.78rem;color:var(--muted);margin:-2px 0 12px}
  .explain{background:var(--card2);border-radius:12px;padding:14px 16px;margin-top:6px;font-size:.95rem;border:1px solid var(--line)}
  .explain.ok{background:rgba(46,204,113,.10);border-color:rgba(46,204,113,.4)}
  .explain.ng{background:rgba(255,92,114,.10);border-color:rgba(255,92,114,.4)}
  .explain b{color:var(--text)}
  .center{text-align:center}
  .big{font-size:2.6rem;font-weight:800;margin:6px 0}
  .muted{color:var(--muted)}
  .pill{display:inline-block;font-size:.8rem;padding:4px 10px;border-radius:99px;background:var(--card2);border:1px solid var(--line)}
  .reviewItem{border-left:3px solid var(--ng);padding:6px 0 6px 12px;margin:8px 0;font-size:.9rem}
  .hide{display:none}
  .footer{color:var(--muted);font-size:.78rem;text-align:center;margin-top:10px}
  /* dashboard */
  .stats{display:flex;gap:10px;margin-bottom:8px}
  .stat{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
  .stat .n{font-size:1.5rem;font-weight:800} .stat .l{font-size:.72rem;color:var(--muted)}
  .domrow{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:.82rem}
  .domrow .nm{width:120px;flex:0 0 auto;color:var(--muted)}
  .domrow .track{flex:1;height:9px;background:var(--card2);border-radius:99px;overflow:hidden}
  .domrow .fill{height:100%;border-radius:99px}
  .domrow .pc{width:42px;text-align:right;flex:0 0 auto}
  .trend{font-size:.85rem;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<div class="wrap">

  <!-- START -->
  <div id="start">
    <h1>AI-900 練習問題 🧠</h1>
    <div class="sub">Azure AI Fundamentals ／ 全<span id="qtotal">0</span>問・本番形式・解説付き</div>

    <div class="card" id="dashCard">
      <h2>📊 学習ダッシュボード</h2>
      <div id="dashBody"></div>
    </div>

    <div class="card" id="reviewCard">
      <h2>🔁 復習モード</h2>
      <div id="reviewInfo" class="muted" style="margin-bottom:12px"></div>
      <button class="btn review" id="reviewBtn" onclick="startQuiz('review')">間違えた問題を復習する</button>
    </div>

    <div class="card">
      <h2>📝 通常演習</h2>
      <label class="field">ドメイン（出題分野）</label>
      <select id="selDomain"></select>
      <label class="field">出題数</label>
      <select id="selCount">
        <option value="10">10問（本番ミニ）</option>
        <option value="5">5問（さくっと）</option>
        <option value="20">20問</option>
        <option value="40">40問（本番想定）</option>
        <option value="999">全問</option>
      </select>
      <label class="field">出題順</label>
      <select id="selOrder">
        <option value="random">ランダム</option>
        <option value="seq">順番通り</option>
      </select>
      <div style="height:14px"></div>
      <button class="btn" onclick="startQuiz('normal')">スタート ▶</button>
    </div>
    <div class="footer">合格目安: 正答率70%（本番は700/1000）</div>
    <div class="footer"><a href="#" onclick="resetAll();return false;" style="color:var(--muted)">学習記録をリセット</a></div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hide">
    <div class="meta">
      <span id="qProgress">1 / 10</span>
      <span id="qScore">正解 0</span>
    </div>
    <div class="bar"><i id="qBar"></i></div>
    <div class="card">
      <span class="tag" id="qDomain"></span>
      <div class="qtext" id="qText"></div>
      <div class="hint" id="qHint"></div>
      <div id="qOptions"></div>
      <div id="qExplain"></div>
      <div style="height:8px"></div>
      <button class="btn" id="qAction" onclick="onAction()">解答する</button>
    </div>
    <button class="btn secondary" onclick="showStart()">中断してトップへ</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="hide">
    <div class="card center">
      <div class="muted" id="rMode">結果</div>
      <div class="big" id="rScore">0 / 0</div>
      <div id="rPct" class="pill"></div>
      <div id="rMsg" style="margin-top:14px;font-weight:600"></div>
    </div>
    <div class="card" id="rReviewCard">
      <h2>復習（間違えた問題）</h2>
      <div id="rReview"></div>
    </div>
    <button class="btn review" id="rReviewBtn" onclick="startQuiz('review')" style="margin-bottom:10px">間違いをすぐ復習 🔁</button>
    <button class="btn secondary" onclick="showStart()">トップへ戻る</button>
  </div>

  <div class="footer">MyBrain ／ 30_Resources/Tech/Azure ／ AI-900</div>
</div>

<script>
/* ===== 問題データ（ai-900-questions.json と同期） ===== */
const QUESTIONS = [{"id": 1, "domain": "AIワークロード", "type": "single", "q": "請求書の画像から「請求金額」「請求日」「取引先名」を自動で抽出したい。最も適したAIワークロードはどれか。", "options": ["コンピュータービジョン（画像分類）", "ドキュメント処理", "異常検知", "クラスタリング"], "answer": [1], "explanation": "請求書・領収書などの帳票から構造化フィールドを抽出するのはドキュメント処理。AzureではAzure AI Document Intelligenceが担当する。単なる画像分類ではフィールド単位の抽出はできない。"}, {"id": 2, "domain": "AIワークロード", "type": "single", "q": "クレジットカードの利用履歴から、通常と大きく異なる不審な取引を見つけたい。これはどのワークロードか。", "options": ["感情分析", "異常検知", "翻訳", "画像分類"], "answer": [1], "explanation": "通常パターンから外れたデータ（外れ値）を検出するのは異常検知（Anomaly Detection）。不正検知やセンサー異常監視に使われる。"}, {"id": 3, "domain": "責任あるAI", "type": "single", "q": "AIの融資審査システムが、特定の性別や人種に対して不利な判定を出さないようにする。これは責任あるAIのどの原則に該当するか。", "options": ["透明性（Transparency）", "公平性（Fairness）", "説明責任（Accountability）", "信頼性と安全性（Reliability & Safety）"], "answer": [1], "explanation": "特定の集団を差別せず、偏りのない扱いをするのは公平性（Fairness）。包括性（誰もがアクセスできる）と混同しないこと。"}, {"id": 4, "domain": "責任あるAI", "type": "single", "q": "視覚障害のあるユーザーでもAIサービスを利用できるよう、音声読み上げや字幕に対応する。これはどの原則か。", "options": ["包括性（Inclusiveness）", "公平性（Fairness）", "プライバシーとセキュリティ", "透明性"], "answer": [0], "explanation": "障害の有無や背景に関わらず、誰もが使えるようにするのは包括性（Inclusiveness）。アクセシビリティ対応はこの原則。"}, {"id": 5, "domain": "責任あるAI", "type": "single", "q": "AIシステムが下した判断について、なぜその結論に至ったかをユーザーが理解できるようにする。これはどの原則か。", "options": ["説明責任（Accountability）", "公平性（Fairness）", "透明性（Transparency）", "信頼性と安全性"], "answer": [2], "explanation": "AIの動作・限界・判断理由を理解できるようにするのは透明性（Transparency）。一方、結果に対して人間・組織が責任を負うのは説明責任（Accountability）。"}, {"id": 6, "domain": "責任あるAI", "type": "multi", "q": "Microsoftの「責任あるAI」の6原則に含まれるものをすべて選べ。", "options": ["公平性", "収益性", "説明責任", "包括性", "拡張性"], "answer": [0, 2, 3], "explanation": "6原則は 公平性 / 信頼性と安全性 / プライバシーとセキュリティ / 包括性 / 透明性 / 説明責任。収益性・拡張性は含まれない。"}, {"id": 7, "domain": "機械学習", "type": "single", "q": "過去のデータから来月の売上金額（数値）を予測したい。最も適した機械学習の手法はどれか。", "options": ["分類（Classification）", "回帰（Regression）", "クラスタリング（Clustering）", "強化学習"], "answer": [1], "explanation": "連続した数値を予測するのは回帰（Regression）。金額・気温・売上などが対象。カテゴリを当てるのは分類。"}, {"id": 8, "domain": "機械学習", "type": "single", "q": "メールが「スパム」か「スパムでない」かを判定するモデルを作りたい。これはどの手法か。", "options": ["回帰", "二項分類（Binary Classification）", "クラスタリング", "多クラス分類"], "answer": [1], "explanation": "2つのカテゴリ（スパム/非スパム）に分けるのは二項分類。3つ以上なら多クラス分類。"}, {"id": 9, "domain": "機械学習", "type": "single", "q": "正解ラベルのない顧客データを、購買傾向の似たグループに自動で分けたい。これはどの手法か。", "options": ["分類", "回帰", "クラスタリング", "異常検知"], "answer": [2], "explanation": "ラベルなしでデータを類似グループに分けるのはクラスタリング（教師なし学習）。顧客セグメンテーションが代表例。"}, {"id": 10, "domain": "機械学習", "type": "single", "q": "住宅価格を予測するモデルで、「広さ」「築年数」「立地」は何にあたるか。", "options": ["ラベル（Label）", "特徴量（Features）", "検証データ", "ハイパーパラメータ"], "answer": [1], "explanation": "予測に使う入力データの列が特徴量（Features）。予測したい正解（住宅価格）がラベル（Label）。"}, {"id": 11, "domain": "機械学習", "type": "single", "q": "機械学習の専門知識が少ないユーザーが、複数のアルゴリズムを自動で試して最適なモデルを得たい。Azure MLのどの機能を使うか。", "options": ["Designer", "Automated ML（AutoML）", "Compute Cluster", "Data Labeling"], "answer": [1], "explanation": "アルゴリズムとパラメータを自動探索して最適モデルを見つけるのはAutomated ML。コード不要で視覚的にパイプラインを組むのはDesigner。"}, {"id": 12, "domain": "機械学習", "type": "single", "q": "データセットを「訓練データ」と「検証データ」に分ける主な理由はどれか。", "options": ["訓練を高速化するため", "未知データに対するモデルの精度（汎化性能）を評価するため", "データ容量を節約するため", "ラベルを自動生成するため"], "answer": [1], "explanation": "学習に使っていない検証データで評価することで、未知データへの汎化性能を測り、過学習を検出できる。"}, {"id": 13, "domain": "コンピュータービジョン", "type": "single", "q": "1枚の写真に写っている複数の物体それぞれの位置（枠）と種類を特定したい。これはどのソリューションか。", "options": ["画像分類", "物体検出（Object Detection）", "OCR", "顔分析"], "answer": [1], "explanation": "個々の物体の位置（バウンディングボックス）と種類を特定するのは物体検出。画像全体のカテゴリだけを判定するのが画像分類。"}, {"id": 14, "domain": "コンピュータービジョン", "type": "single", "q": "紙のレシートに印刷された文字を読み取ってテキストデータ化したい。使う技術はどれか。", "options": ["OCR（光学文字認識）", "クラスタリング", "感情分析", "セマンティックセグメンテーション"], "answer": [0], "explanation": "画像・文書内の文字を読み取りテキスト化するのはOCR（Optical Character Recognition）。AzureではAzure AI VisionのReadや Document Intelligenceが提供。"}, {"id": 15, "domain": "コンピュータービジョン", "type": "single", "q": "自社製品の独自画像を使って「良品/不良品」を判定する画像分類モデルを訓練したい。最適なAzureサービスはどれか。", "options": ["Azure AI Face", "Azure AI Custom Vision", "Azure AI Translator", "Azure AI Speech"], "answer": [1], "explanation": "独自画像で画像分類・物体検出モデルを訓練できるのはAzure AI Custom Vision。汎用の分析はAzure AI Vision。"}, {"id": 16, "domain": "コンピュータービジョン", "type": "single", "q": "画像中の人物の顔を検出し、年齢などの属性を分析したい。最も適したサービスはどれか。", "options": ["Azure AI Language", "Azure AI Face", "Azure AI Document Intelligence", "Azure OpenAI Service"], "answer": [1], "explanation": "顔の検出・認識・属性分析の専用サービスはAzure AI Face。"}, {"id": 17, "domain": "NLP", "type": "single", "q": "商品レビューの文章が肯定的か否定的かを自動で判定したい。これはどのNLP機能か。", "options": ["キーフレーズ抽出", "感情分析（Sentiment Analysis）", "エンティティ認識", "翻訳"], "answer": [1], "explanation": "テキストの肯定/否定/中立を判定するのは感情分析。Azure AI Languageが提供。"}, {"id": 18, "domain": "NLP", "type": "single", "q": "文章中から「人名」「地名」「組織名」「日付」を識別して分類したい。これはどの機能か。", "options": ["エンティティ認識（NER）", "感情分析", "言語検出", "音声合成"], "answer": [0], "explanation": "テキスト中の固有表現（人名・地名・組織・日付など）を識別・分類するのはエンティティ認識（Named Entity Recognition）。"}, {"id": 19, "domain": "NLP", "type": "single", "q": "感情分析・キーフレーズ抽出・エンティティ認識・言語検出をまとめて提供するAzureサービスはどれか。", "options": ["Azure AI Speech", "Azure AI Language", "Azure AI Vision", "Azure Machine Learning"], "answer": [1], "explanation": "テキスト分析機能を統合提供するのはAzure AI Language。音声系はAzure AI Speech。"}, {"id": 20, "domain": "NLP", "type": "single", "q": "会議の録音音声を文字起こししたい。使うべきAzureサービスはどれか。", "options": ["Azure AI Speech（Speech-to-Text）", "Azure AI Translator", "Azure AI Language", "Azure AI Custom Vision"], "answer": [0], "explanation": "音声をテキストに変換（Speech-to-Text）するのはAzure AI Speech。逆に文字を音声化するText-to-Speechも同サービス。"}, {"id": 21, "domain": "NLP", "type": "multi", "q": "Azure AI Speech サービスが提供する機能をすべて選べ。", "options": ["音声認識（Speech-to-Text）", "音声合成（Text-to-Speech）", "画像の物体検出", "音声翻訳"], "answer": [0, 1, 3], "explanation": "Azure AI Speechは音声認識・音声合成・音声翻訳・話者認識を提供。画像の物体検出はAzure AI Visionの機能。"}, {"id": 22, "domain": "生成AI", "type": "single", "q": "OpenAIのGPTモデルを、企業のセキュリティ・コンプライアンス要件を満たしながらAzure上で利用したい。使うべきサービスはどれか。", "options": ["Azure AI Vision", "Azure OpenAI Service", "Azure AI Translator", "Azure Machine Learning Designer"], "answer": [1], "explanation": "GPT・DALL·EなどOpenAIモデルをAzureのガバナンス下で利用できるのはAzure OpenAI Service。データ保護・リージョン管理・コンテンツフィルターを備える。"}, {"id": 23, "domain": "生成AI", "type": "single", "q": "生成AIアプリを設計・構築・評価・デプロイするためのMicrosoftの統合開発プラットフォームはどれか。", "options": ["Azure AI Foundry", "Azure DevOps", "Power BI", "Azure Monitor"], "answer": [0], "explanation": "生成AIアプリの統合開発環境はAzure AI Foundry（旧Azure AI Studio）。プロンプトのテスト、RAG構築、モデル評価などを行う。"}, {"id": 24, "domain": "生成AI", "type": "single", "q": "現代の大規模言語モデル（LLM）の基盤となっているニューラルネットワークのアーキテクチャはどれか。", "options": ["畳み込みニューラルネットワーク（CNN）", "Transformer", "決定木", "k近傍法"], "answer": [1], "explanation": "GPTなどLLMの基盤はTransformerアーキテクチャ。Attention（自己注意）機構で単語間の関係を捉える。CNNは主に画像向け。"}, {"id": 25, "domain": "生成AI", "type": "single", "q": "生成AIが、事実に基づかない情報をもっともらしく生成してしまう現象を何と呼ぶか。", "options": ["オーバーフィッティング", "ハルシネーション（Hallucination）", "グラウンディング", "トークン化"], "answer": [1], "explanation": "もっともらしいが事実でない出力をハルシネーションと呼ぶ。出力の検証や、信頼できるデータでのグラウンディング（RAG）が対策になる。"}, {"id": 26, "domain": "生成AI", "type": "single", "q": "社内文書など最新・独自のデータを検索して回答に反映させ、生成AIの精度を高める手法を何と呼ぶか。", "options": ["ファインチューニングのみ", "RAG（検索拡張生成）/ グラウンディング", "クラスタリング", "正則化"], "answer": [1], "explanation": "外部データを検索して生成に反映する手法がRAG（Retrieval-Augmented Generation）。モデルを再訓練せず最新情報を扱える。グラウンディングとも呼ばれる。"}, {"id": 27, "domain": "生成AI", "type": "single", "q": "Azure OpenAI Serviceで、暴力・憎悪・性的・自傷などの有害な入出力をブロックする仕組みを何と呼ぶか。", "options": ["コンテンツフィルタリング", "トークン化", "埋め込み（Embedding）", "プロンプトエンジニアリング"], "answer": [0], "explanation": "有害カテゴリの入出力を検知・ブロックするのはコンテンツフィルタリング。Azure OpenAIに標準搭載されている責任あるAIの仕組み。"}, {"id": 28, "domain": "生成AI", "type": "single", "q": "OpenAI・Meta（Llama）・Mistralなど多様な基盤モデルを一覧から選んでデプロイできる、Azure AI Foundryの機能はどれか。", "options": ["モデルカタログ（Model Catalog）", "データラベリング", "Compute Cluster", "Bot Framework"], "answer": [0], "explanation": "多様な基盤モデルを選択・デプロイできるのはAzure AI Foundryのモデルカタログ（Model Catalog）。"}, {"id": 29, "domain": "横断", "type": "single", "q": "Vision・Language・Speechなど複数のAI機能を、1つのキーとエンドポイントでまとめて利用したい。作成すべきリソースはどれか。", "options": ["各機能ごとの単一サービスリソース", "Azure AI services（マルチサービスリソース）", "Azure Storage アカウント", "Azure Key Vault"], "answer": [1], "explanation": "複数AI機能を単一キー・エンドポイントで使えるのはAzure AI services（マルチサービスリソース）。1機能だけなら単一サービスリソースでよい。"}, {"id": 30, "domain": "生成AI", "type": "single", "q": "大規模言語モデルでテキストを処理する際の、課金や入力長制限の基本単位は何か。", "options": ["ピクセル", "トークン（Token）", "エポック", "バイアス"], "answer": [1], "explanation": "LLMはテキストをトークン（単語や単語の一部）単位で処理し、トークン数で課金・入力上限が決まる。"}, {"id": 31, "domain": "AIワークロード", "type": "yesno", "q": "次の記述は正しいか。『画像分類は、画像内の個々の物体の位置をバウンディングボックスで特定する。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [1], "explanation": "誤り。位置をバウンディングボックスで特定するのは物体検出。画像分類は画像全体のカテゴリを判定するだけで、位置は特定しない。"}, {"id": 32, "domain": "NLP", "type": "yesno", "q": "次の記述は正しいか。『Azure AI Translator は主にテキストの翻訳を行うサービスである。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しい。Azure AI Translatorは多言語間のテキスト翻訳サービス。音声の翻訳はAzure AI Speech（音声翻訳）が担う。"}, {"id": 33, "domain": "AIワークロード", "type": "single", "q": "動画から顔・音声・テキスト・シーンを抽出して検索可能にしたい。最適なAzureサービスは？", "options": ["Azure AI Translator", "Azure AI Video Indexer", "Azure AI Language", "Azure Machine Learning"], "answer": [1], "explanation": "動画コンテンツから顔・音声(文字起こし)・テキスト・シーンなどを抽出し検索/分析できるのはAzure AI Video Indexer。"}, {"id": 34, "domain": "AIワークロード", "type": "single", "q": "カスタマーサポートの問い合わせに自動で応答する対話型ボットを作りたい。これはどのワークロードか。", "options": ["異常検知", "会話型AI（Conversational AI）", "コンピュータービジョン", "回帰"], "answer": [1], "explanation": "ボットやアシスタントが人と対話するのは会話型AI。AzureではAzure AI Bot Service + Azure AI Languageで構築する。"}, {"id": 35, "domain": "責任あるAI", "type": "single", "q": "自動運転車が悪天候など想定外の状況でも安全側に動作するよう設計する。これはどの原則か。", "options": ["公平性", "信頼性と安全性", "プライバシーとセキュリティ", "透明性"], "answer": [1], "explanation": "想定外の状況でも一貫して安全に動作することを保証するのは信頼性と安全性（Reliability & Safety）。"}, {"id": 36, "domain": "責任あるAI", "type": "single", "q": "AIが収集した個人データを保護し、不正アクセスを防ぐ。これはどの原則か。", "options": ["包括性", "プライバシーとセキュリティ", "説明責任", "公平性"], "answer": [1], "explanation": "個人データの保護と不正利用防止はプライバシーとセキュリティ（Privacy & Security）。"}, {"id": 37, "domain": "責任あるAI", "type": "yesno", "q": "次の記述は正しいか。『説明責任(Accountability)とは、AIシステムの結果に対して人や組織が責任を負うことである。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しい。説明責任はAIの結果に対し人間・組織が責任を持ち、ガバナンス体制を整える原則。"}, {"id": 38, "domain": "機械学習", "type": "single", "q": "教師あり学習（ラベル付きデータで学習）に分類される手法はどれか。", "options": ["クラスタリング", "回帰や分類", "主成分分析", "アソシエーション分析"], "answer": [1], "explanation": "回帰・分類は正解ラベルを使う教師あり学習。クラスタリングはラベルなしの教師なし学習。"}, {"id": 39, "domain": "機械学習", "type": "single", "q": "多クラス分類（multiclass classification）の例はどれか。", "options": ["メールがスパムか否か", "画像を犬・猫・鳥のいずれかに分類", "住宅価格の予測", "顧客を未知のグループに分割"], "answer": [1], "explanation": "3つ以上のカテゴリへ分類するのが多クラス分類。2択は二項分類、数値予測は回帰、ラベルなしのグループ化はクラスタリング。"}, {"id": 40, "domain": "機械学習", "type": "single", "q": "モデルが訓練データに過剰に適合し、未知データでは精度が落ちる状態を何と呼ぶか。", "options": ["過学習（オーバーフィッティング）", "グラウンディング", "トークン化", "正解率"], "answer": [0], "explanation": "訓練データに過剰適合して汎化性能が下がる状態が過学習。検証データでの評価により検出できる。"}, {"id": 41, "domain": "機械学習", "type": "single", "q": "コードを書かずにドラッグ&ドロップでMLパイプラインを視覚的に構築できるAzure MLの機能はどれか。", "options": ["Automated ML", "Designer", "Notebooks", "Endpoints"], "answer": [1], "explanation": "GUIで視覚的にパイプラインを組むのはDesigner。最適モデルを自動探索するのはAutomated ML。"}, {"id": 42, "domain": "機械学習", "type": "multi", "q": "分類モデルの性能評価に使われる指標をすべて選べ。", "options": ["正解率（Accuracy）", "適合率（Precision）", "平均二乗誤差（MSE）", "再現率（Recall）"], "answer": [0, 1, 3], "explanation": "分類の評価指標は正解率・適合率・再現率など。平均二乗誤差(MSE)は回帰の指標。"}, {"id": 43, "domain": "機械学習", "type": "single", "q": "学習には使わず、訓練後のモデル精度を測るために取り分けておくデータを何と呼ぶか。", "options": ["訓練データ", "検証（テスト）データ", "特徴量", "ラベル"], "answer": [1], "explanation": "学習に使わず評価に使うのが検証(テスト)データ。未知データへの汎化性能を測れる。"}, {"id": 44, "domain": "コンピュータービジョン", "type": "single", "q": "請求書や領収書から金額・日付・項目を抽出する専用のAzureサービスはどれか。", "options": ["Azure AI Vision", "Azure AI Document Intelligence", "Azure AI Face", "Azure AI Language"], "answer": [1], "explanation": "帳票から構造化フィールドを抽出する専用サービスはAzure AI Document Intelligence（請求書・領収書・IDなどの事前構築モデルを持つ）。"}, {"id": 45, "domain": "コンピュータービジョン", "type": "single", "q": "画像全体が「猫」か「犬」かなど、1枚につき1つのカテゴリを判定するのはどれか。", "options": ["物体検出", "画像分類", "OCR", "セマンティックセグメンテーション"], "answer": [1], "explanation": "画像全体のカテゴリを判定するのは画像分類。物体の位置まで特定するのは物体検出。"}, {"id": 46, "domain": "コンピュータービジョン", "type": "single", "q": "写真から顔を検出し、2つの顔が同一人物かどうかを比較したい。最適なサービスは？", "options": ["Azure AI Custom Vision", "Azure AI Face", "Azure AI Translator", "Azure AI Speech"], "answer": [1], "explanation": "顔の検出・比較・認識はAzure AI Faceの役割。"}, {"id": 47, "domain": "コンピュータービジョン", "type": "yesno", "q": "次の記述は正しいか。『OCRは画像や文書に含まれる印刷・手書きの文字をテキストデータに変換する技術である。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しい。OCR(光学文字認識)は画像/文書中の文字をテキスト化する。AzureではVisionのReadやDocument Intelligenceが提供。"}, {"id": 48, "domain": "コンピュータービジョン", "type": "single", "q": "Azure AI Vision が提供する機能で「ない」ものはどれか。", "options": ["画像のタグ付け", "OCR（テキスト読み取り）", "音声の文字起こし", "画像キャプション生成"], "answer": [2], "explanation": "音声の文字起こしはAzure AI Speechの機能。Visionは画像のタグ付け・OCR・キャプション生成・物体検出などを行う。"}, {"id": 49, "domain": "NLP", "type": "single", "q": "文章から人名・地名・組織名などの固有表現を抽出・分類したい。どの機能か。", "options": ["感情分析", "エンティティ認識（NER）", "翻訳", "キーフレーズ抽出"], "answer": [1], "explanation": "固有表現（人名・地名・組織・日付など）の抽出はエンティティ認識（Named Entity Recognition）。"}, {"id": 50, "domain": "NLP", "type": "single", "q": "文章を読み上げて音声に変換（Text-to-Speech）したい。使うAzureサービスは？", "options": ["Azure AI Language", "Azure AI Speech", "Azure AI Translator", "Azure AI Vision"], "answer": [1], "explanation": "文字→音声(Text-to-Speech)も音声→文字(Speech-to-Text)もAzure AI Speechが提供。"}, {"id": 51, "domain": "NLP", "type": "single", "q": "チャットボットで、ユーザー発話から「意図(Intent)」と「エンティティ」を抽出する機能はどれか。", "options": ["感情分析", "会話言語理解（CLU）", "キーフレーズ抽出", "OCR"], "answer": [1], "explanation": "発話の意図とエンティティを抽出するのは会話言語理解（Conversational Language Understanding）。Azure AI Languageが提供。"}, {"id": 52, "domain": "NLP", "type": "single", "q": "よくある質問(FAQ)からQ&Aボットの知識ベースを作る、Azure AI Languageの機能はどれか。", "options": ["Question Answering（質問応答）", "物体検出", "異常検知", "翻訳"], "answer": [0], "explanation": "FAQ等からQ&Aの知識ベースを作るのはQuestion Answering（旧QnA Maker）。Azure AI Languageの機能。"}, {"id": 53, "domain": "NLP", "type": "single", "q": "英語の文章を日本語のテキストに翻訳したい。最適なAzureサービスは？", "options": ["Azure AI Speech", "Azure AI Translator", "Azure AI Vision", "Azure OpenAI Service"], "answer": [1], "explanation": "多言語間のテキスト翻訳はAzure AI Translator。音声の翻訳はAzure AI Speechの音声翻訳。"}, {"id": 54, "domain": "NLP", "type": "multi", "q": "Azure AI Language が提供する機能をすべて選べ。", "options": ["感情分析", "キーフレーズ抽出", "画像の物体検出", "テキスト要約"], "answer": [0, 1, 3], "explanation": "Azure AI Languageは感情分析・キーフレーズ抽出・エンティティ認識・要約・CLU・質問応答などを提供。画像の物体検出はVisionの機能。"}, {"id": 55, "domain": "生成AI", "type": "single", "q": "大規模言語モデルでテキストを処理する単位で、課金や入力長制限の基準になるものは何か。", "options": ["ピクセル", "トークン", "エポック", "バッチ"], "answer": [1], "explanation": "LLMはトークン(単語や単語の一部)単位で処理し、トークン数で課金・入力上限が決まる。"}, {"id": 56, "domain": "生成AI", "type": "single", "q": "生成AIに自社の最新文書を検索して回答に反映させ、精度を高める手法はどれか。", "options": ["RAG（検索拡張生成）", "クラスタリング", "OCR", "正則化"], "answer": [0], "explanation": "外部データを検索して生成に反映するのがRAG。モデル再訓練なしで最新・独自情報を扱える（グラウンディング）。"}, {"id": 57, "domain": "生成AI", "type": "single", "q": "OpenAI・Meta(Llama)・Mistralなど多様な基盤モデルを選んでデプロイできるAzure AI Foundryの機能はどれか。", "options": ["モデルカタログ", "Designer", "Compute Cluster", "迷惑メールフィルター"], "answer": [0], "explanation": "多様な基盤モデルを選択・デプロイできるのはAzure AI Foundryのモデルカタログ。"}, {"id": 58, "domain": "生成AI", "type": "single", "q": "Azure OpenAI Serviceで、暴力・憎悪・性的・自傷などの有害な入出力をブロックする仕組みは何か。", "options": ["トークナイザ", "コンテンツフィルター", "埋め込み（Embedding）", "プロンプト"], "answer": [1], "explanation": "有害カテゴリの入出力を検知・ブロックするのはコンテンツフィルター。Azure OpenAIに標準搭載。"}, {"id": 59, "domain": "生成AI", "type": "single", "q": "業務アプリ（Microsoft 365など）に組み込まれた生成AIアシスタントの総称はどれか。", "options": ["Copilot", "Bot Framework", "Designer", "Translator"], "answer": [0], "explanation": "アプリに組み込まれた生成AIアシスタントの総称がCopilot（例: Microsoft 365 Copilot, GitHub Copilot）。"}, {"id": 60, "domain": "生成AI", "type": "yesno", "q": "次の記述は正しいか。『ハルシネーションとは、生成AIが事実に基づかない情報をもっともらしく出力する現象である。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しい。もっともらしいが事実でない出力をハルシネーションと呼ぶ。検証やRAGによるグラウンディングが対策。"}, {"id": 61, "domain": "生成AI", "type": "single", "q": "画像を生成できるOpenAIのモデルはどれか。", "options": ["Whisper", "DALL·E", "GPT-3.5", "Embeddings"], "answer": [1], "explanation": "画像生成モデルはDALL·E。Whisperは音声認識、GPTはテキスト生成、Embeddingsはテキストのベクトル化。"}, {"id": 62, "domain": "横断", "type": "single", "q": "複数のAI機能（Vision/Language/Speech）を1つのキーとエンドポイントでまとめて使うために作成するリソースはどれか。", "options": ["Azure Key Vault", "Azure AI services（マルチサービスリソース）", "Azure Storage", "Azure Functions"], "answer": [1], "explanation": "複数AI機能を単一キー・エンドポイントで使えるのはAzure AI services（マルチサービスリソース）。"}, {"id": 63, "domain": "AIワークロード", "type": "single", "q": "製造ラインのセンサー値から通常と異なる異常な振動を検知したい。これはどのワークロードか。", "options": ["画像分類", "異常検知", "翻訳", "要約"], "answer": [1], "explanation": "通常パターンから外れた値を見つけるのは異常検知。設備の故障予兆検知などに使う。"}, {"id": 64, "domain": "AIワークロード", "type": "single", "q": "多言語のチャットを相手の言語にリアルタイムで変換する。これはどのAIワークロードに分類されるか。", "options": ["コンピュータービジョン", "自然言語処理", "異常検知", "回帰"], "answer": [1], "explanation": "翻訳は言語を扱う処理なので自然言語処理(NLP)のワークロード。"}, {"id": 65, "domain": "AIワークロード", "type": "single", "q": "棚の写真から特定商品が陳列されているかを自動判定する。これはどのワークロードか。", "options": ["コンピュータービジョン", "自然言語処理", "ドキュメント処理", "生成AI"], "answer": [0], "explanation": "画像から物体を認識するのはコンピュータービジョン。"}, {"id": 66, "domain": "AIワークロード", "type": "single", "q": "ブログ記事の下書きを自動で作成する。これはどのワークロードか。", "options": ["異常検知", "生成AI", "クラスタリング", "OCR"], "answer": [1], "explanation": "新しい文章コンテンツを作るのは生成AI。"}, {"id": 67, "domain": "AIワークロード", "type": "yesno", "q": "次の記述は正しいか。『ドキュメント処理はOCRと自然言語処理を組み合わせ、帳票から構造化データを抽出する。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しい。文字認識(OCR)＋言語理解で請求書等からフィールドを抽出する。Azure AI Document Int xplanation": "追加学習で特化させるのがファインチューニング。"}, {"id": 121, "domain": "生成AI", "type": "single", "q": "LLMが応答として生成する出力テキストを何と呼ぶか。", "options": ["補完(Completion)", "プロンプト", "ラベル", "特徴量"], "answer": [0], "explanation": "モデルの生成出力は補完(Completion)。"}, {"id": 122, "domain": "生成AI", "type": "single", "q": "GitHub上でコード補完を提供する生成AIアシスタントは。", "options": ["GitHub Copilot", "Azure Monitor", "Power BI", "Azure AI Translator"], "answer": [0], "explanation": "コード補完の生成AIアシスタントはGitHub Copilot。"}, {"id": 123, "domain": "生成AI", "type": "single", "q": "生成AIの責任あるAIで特に注意すべき、誤情報をもっともらしく生成するリスクは。", "options": ["ハルシネーション", "過学習", "データ欠損", "レイテンシ"], "answer": [0], "explanation": "事実でない出力をもっともらしく作るのがハルシネーション。"}, {"id": 124, "domain": "生成AI", "type": "multi", "q": "生成AIの一般的な活用シナリオを全て選べ。", "options": ["文章の要約・草案作成", "チャットボット応答", "画像生成", "物理的な配線作業"], "answer": [0, 1, 2], "explanation": "生成AIは文章生成・要約・チャット・画像生成などに使う。物理作業は対象外。"}, {"id": 125, "domain": "生成AI", "type": "single", "q": "LLMの入力長上限や課金の基準となる単位は。", "options": ["トークン", "ピクセル", "エポック", "ノード"], "answer": [0], "explanation": "テキスト処理の単位はトークン。課金・入力上限の基準。"}, {"id": 126, "domain": "生成AI", "type": "single", "q": "生成AIに役割や口調を指示する『あなたは丁寧なサポート担当です』のような前提指示を何と呼ぶか。", "options": ["システムプロンプト", "ラベル", "ハイパーパラメータ", "埋め込み"], "answer": [0], "explanation": "モデルの振る舞いを定める前提指示はシステムプロンプト(システムメッセージ)。"}, {"id": 127, "domain": "生成AI", "type": "yesno", "q": "次の記述は正しいか。『RAGはモデルを再学習せずに外部データを検索して回答に反映できる。』", "options": ["はい（正しい）", "いいえ（誤り）"], "answer": [0], "explanation": "正しい。RAGは再学習なしで最新/独自データを参照できる。"}, {"id": 128, "domain": "生成AI", "type": "single", "q": "Azure OpenAIで利用できる、音声をテキストに変換するモデルは。", "options": ["Whisper", "DALL·E", "Ada(埋め込み)", "GPT"], "answer": [0], "explanation": "音声認識モデルはWhisper。DALL·Eは画像生成、Adaは埋め込み、GPTはテキスト生成。"}, {"id": 129, "domain": "横断", "type": "single", "q": "Vision・Language・Speechを1つのリソースキーとエンドポイントでまとめて使いたい。作るべきは。", "options": ["Azure AI services(マルチサービスリソース)", "個別リソースを3つ作る", "Azure Key Vault", "Azure Storage"], "answer": [0], "explanation": "複数AI機能を単一キーで使うのはAzure AI services(マルチサービス)リソース。"}, {"id": 130, "domain": "横断", "type": "single", "q": "『請求書から金額を抽出』に最適なサービスは。", "options": ["Azure AI Document Intelligence", "Azure AI Vision", "Azure AI Language", "Azure AI Translator"], "answer": [0], "explanation": "帳票フィールド抽出はDocument Intelligence。"}, {"id": 131, "domain": "横断", "type": "single", "q": "『英語→日本語のテキスト翻訳』に最適なサービスは。", "options": ["Azure AI Translator", "Azure AI Speech", "Azure AI Language", "Azure AI Vision"], "answer": [0], "explanation": "テキスト翻訳はTranslator。"}, {"id": 132, "domain": "横断", "type": "single", "q": "『音声の文字起こし』に最適なサービスは。", "options": ["Azure AI Speech", "Azure AI Language", "Azure AI Translator", "Azure AI Vision"], "answer": [0], "explanation": "音声→テキストはSpeech。"}, {"id": 133, "domain": "横断", "type": "single", "q": "『独自画像で分類モデルを訓練』に最適なサービスは。", "options": ["Azure AI Custom Vision", "Azure AI Vision", "Azure AI Face", "Azure OpenAI Service"], "answer": [0], "explanation": "独自画像のモデル訓練はCustom Vision。"}, {"id": 134, "domain": "横断", "type": "single", "q": "『GPTで文章を生成』に最適なサービスは。", "options": ["Azure OpenAI Service", "Azure AI Language", "Azure Machine Learning", "Azure AI Vision"], "answer": [0], "explanation": "GPTによる文章生成はAzure OpenAI Service。"}];
const LSKEY='ai900_state_v2';

/* ===== 永続化（localStorage／不可時はメモリにフォールバック） ===== */
let mem=null;
function blankState(){return {v:2,q:{},wrong:[],dom:{},sessions:[],best:0};}
function loadRaw(){
  try{const s=localStorage.getItem(LSKEY);if(s)return JSON.parse(s);}catch(e){}
  return mem;
}
function getState(){
  let s=loadRaw();
  if(!s||s.v!==2) s=blankState();
  s.q=s.q||{}; s.wrong=s.wrong||[]; s.dom=s.dom||{}; s.sessions=s.sessions||[]; s.best=s.best||0;
  return s;
}
function saveState(s){ mem=s; try{localStorage.setItem(LSKEY,JSON.stringify(s));}catch(e){} }

/* ===== 純粋ロジック（DOM非依存・テスト対象） ===== */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function arrEq(a,b){a=a.slice().sort((x,y)=>x-y);b=b.slice().sort((x,y)=>x-y);return a.length===b.length&&a.every((v,i)=>v===b[i]);}
function applyAnswer(s,q,isOK){
  const st=s.q[q.id]||(s.q[q.id]={seen:0,wrong:0,lastOK:false});
  st.seen++; if(!isOK)st.wrong++; st.lastOK=isOK;
  const i=s.wrong.indexOf(q.id);
  if(isOK){ if(i>=0)s.wrong.splice(i,1); } else { if(i<0)s.wrong.push(q.id); }
  const d=s.dom[q.domain]||(s.dom[q.domain]={c:0,t:0});
  d.t++; if(isOK)d.c++;
}
function buildPool(all,opts,s){
  let base;
  if(opts.mode==='review'){
    const w=new Set(s.wrong);
    base=all.filter(q=>w.has(q.id));
    if(opts.domain&&opts.domain!=='ALL') base=base.filter(q=>q.domain===opts.domain);
  }else{
    base=(opts.domain&&opts.domain!=='ALL')?all.filter(q=>q.domain===opts.domain):all.slice();
  }
  base=(opts.order==='seq')?base.slice():shuffle(base);
  const n=(opts.count&&opts.count>0)?opts.count:base.length;
  return base.slice(0,n);
}
function recordSession(s,total,correct,mode){
  const pct=total?Math.round(correct/total*100):0;
  s.sessions.push({date:new Date().toISOString().slice(0,10),total,correct,pct,mode});
  if(s.sessions.length>30)s.sessions=s.sessions.slice(-30);
  if(pct>s.best)s.best=pct;
  return pct;
}
function domainAccuracy(s){
  return Object.keys(s.dom).map(k=>{const d=s.dom[k];return{domain:k,c:d.c,t:d.t,pct:d.t?Math.round(d.c/d.t*100):0};})
    .sort((a,b)=>a.pct-b.pct);
}

/* ===== 実行時状態 ===== */
let pool=[],idx=0,score=0,answered=false,sel=new Set(),results=[],curMode='normal',S=null;

/* ===== UI ===== */
function $(id){return document.getElementById(id);}
function show(view){['start','quiz','result'].forEach(v=>$(v).classList.toggle('hide',v!==view));}

function renderDashboard(){
  S=getState();
  $('qtotal').textContent=QUESTIONS.length;
  // review card
  const wn=S.wrong.length;
  $('reviewInfo').textContent= wn>0 ? `要復習（前回までに間違えた問題）: ${wn}問` : 'まだ要復習の問題はありません。通常演習で間違えると、ここに溜まります。';
  $('reviewBtn').disabled = wn===0;
  $('reviewBtn').textContent = wn>0 ? `間違えた${wn}問を復習する` : '要復習の問題はありません';
  // dashboard body
  const body=$('dashBody');
  if(S.sessions.length===0){
    body.innerHTML='<div class="muted">まだ記録がありません。まずは10問やってみましょう。</div>';
    return;
  }
  const totalAns=Object.values(S.dom).reduce((a,d)=>a+d.t,0);
  const totalCor=Object.values(S.dom).reduce((a,d)=>a+d.c,0);
  const overall=totalAns?Math.round(totalCor/totalAns*100):0;
  let html='<div class="stats">'+
    `<div class="stat"><div class="n">${S.sessions.length}</div><div class="l">セッション</div></div>`+
    `<div class="stat"><div class="n">${overall}%</div><div class="l">累計正答率</div></div>`+
    `<div class="stat"><div class="n">${S.best}%</div><div class="l">ベスト</div></div>`+
    '</div>';
  const last=S.sessions.slice(-6).map(x=>x.pct+'%');
  html+=`<div class="trend">直近の正答率: ${last.join(' → ')}</div>`;
  html+='<div style="height:10px"></div><div class="muted" style="font-size:.8rem;margin-bottom:4px">ドメイン別正答率（弱い順）</div>';
  domainAccuracy(S).forEach(d=>{
    const col = d.pct>=70?'var(--ok)':(d.pct>=50?'var(--warn)':'var(--ng)');
    html+=`<div class="domrow"><div class="nm">${d.domain}</div>`+
      `<div class="track"><div class="fill" style="width:${d.pct}%;background:${col}"></div></div>`+
      `<div class="pc" style="color:${col}">${d.pct}%</div></div>`;
  });
  body.innerHTML=html;
}

function populateDomains(){
  const domains=[...new Set(QUESTIONS.map(q=>q.domain))];
  $('selDomain').innerHTML='<option value="ALL">すべて（全'+QUESTIONS.length+'問）</option>'+
    domains.map(d=>`<option value="${d}">${d}（${QUESTIONS.filter(q=>q.domain===d).length}問）</option>`).join('');
}

function startQuiz(mode){
  S=getState();
  curMode=mode;
  const dom=$('selDomain').value;
  const cnt=parseInt($('selCount').value,10);
  const order=$('selOrder').value;
  const opts = mode==='review'
    ? {mode:'review',domain:'ALL',count:0,order:'random'}   // 復習は全要復習をランダムに
    : {mode:'normal',domain:dom,count:cnt,order:order};
  pool=buildPool(QUESTIONS,opts,S);
  if(pool.length===0){
    alert(mode==='review'?'復習する問題がありません。':'該当する問題がありません。');
    return;
  }
  idx=0;score=0;results=[];
  show('quiz');
  renderQ();
}

function renderQ(){
  answered=false;sel=new Set();
  const q=pool[idx];
  const multi=q.type==='multi';
  $('qProgress').textContent=(idx+1)+' / '+pool.length+(curMode==='review'?'（復習）':'');
  $('qScore').textContent='正解 '+score;
  $('qBar').style.width=(idx/pool.length*100)+'%';
  $('qDomain').textContent=q.domain+(multi?'・複数選択':'');
  $('qText').textContent=q.q;
  $('qHint').textContent=multi?'※ 当てはまるものを全て選択':'';
  $('qExplain').innerHTML='';
  const oc=$('qOptions');oc.innerHTML='';
  const order=shuffle(q.options.map((_,i)=>i)); // 選択肢の並びを毎回シャッフル（元indexは保持）
  order.forEach(i=>{
    const d=document.createElement('div');
    d.className='opt'+(multi?'':' round');
    d.dataset.i=i;
    d.innerHTML='<div class="box"></div><div>'+q.options[i]+'</div>';
    d.onclick=()=>toggle(i,multi,d);
    oc.appendChild(d);
  });
  const a=$('qAction');a.textContent='解答する';
}

function toggle(i,multi,el){
  if(answered)return;
  if(multi){
    if(sel.has(i)){sel.delete(i);el.classList.remove('sel');el.querySelector('.box').textContent='';}
    else{sel.add(i);el.classList.add('sel');el.querySelector('.box').textContent='✓';}
  }else{
    sel.clear();
    document.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel');o.querySelector('.box').textContent='';});
    sel.add(i);el.classList.add('sel');el.querySelector('.box').textContent='●';
  }
}

function onAction(){ if(!answered){ if(sel.size===0)return; grade(); } else { next(); } }

function grade(){
  answered=true;
  const q=pool[idx];
  const correct=q.answer;
  const isOK=arrEq([...sel],correct);
  if(isOK)score++;
  results.push({q,isOK});
  // 状態更新＆即保存（中断しても記録が残る）
  applyAnswer(S,q,isOK);
  saveState(S);
  document.querySelectorAll('.opt').forEach(o=>{
    const i=parseInt(o.dataset.i,10);
    if(correct.includes(i))o.classList.add('correct');
    else if(sel.has(i))o.classList.add('wrong');
  });
  $('qExplain').innerHTML='<div class="explain '+(isOK?'ok':'ng')+'"><b>'+(isOK?'⭕ 正解':'❌ 不正解')+'</b><br>'+q.explanation+'</div>';
  $('qScore').textContent='正解 '+score;
  $('qAction').textContent=(idx+1<pool.length)?'次の問題 →':'結果を見る 🎯';
}

function next(){ idx++; if(idx<pool.length)renderQ(); else showResult(); }

function showResult(){
  const pct=recordSession(S,pool.length,score,curMode);
  saveState(S);
  show('result');
  $('rMode').textContent=(curMode==='review'?'復習モードの結果':'結果');
  $('rScore').textContent=score+' / '+pool.length;
  $('rPct').textContent='正答率 '+pct+'%';
  const msg=$('rMsg');
  if(pct>=70){msg.textContent='🎉 合格ライン！この調子で本番へ';msg.style.color='var(--ok)';}
  else{msg.textContent='💪 あと少し。間違えた問題を復習しよう';msg.style.color='var(--ng)';}
  const wrong=results.filter(x=>!x.isOK);
  const rc=$('rReviewCard'), rb=$('rReviewBtn');
  if(wrong.length===0){
    rc.classList.add('hide'); rb.classList.add('hide');
  }else{
    rc.classList.remove('hide'); rb.classList.remove('hide');
    rb.textContent='間違いをすぐ復習（'+S.wrong.length+'問）🔁';
    $('rReview').innerHTML=wrong.map(x=>{
      const ca=x.q.answer.map(i=>x.q.options[i]).join(' / ');
      return '<div class="reviewItem"><b>Q.</b> '+x.q.q+'<br><span class="muted">正解: '+ca+'</span><br><span class="muted">'+x.q.explanation+'</span></div>';
    }).join('');
  }
}

function showStart(){ renderDashboard(); show('start'); }

function resetAll(){
  if(!confirm('学習記録（正答率・復習リスト・履歴）を全て消去します。よろしいですか？'))return;
  mem=null; try{localStorage.removeItem(LSKEY);}catch(e){}
  renderDashboard();
}

/* ===== 起動（ブラウザのみ） ===== */
function boot(){ populateDomains(); renderDashboard(); show('start'); }
if(typeof document!=='undefined'){ document.addEventListener('DOMContentLoaded',boot); }
</script>
