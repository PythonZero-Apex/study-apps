<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>統計検定2級 練習問題</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="anonymous" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1f2430; --muted:#5d6471; --line:#e3e6ec;
    --accent:#4b5bd4; --accent-d:#37419b; --ok:#1d9e75; --okbg:#e1f5ee; --ng:#d8453f; --ngbg:#fbeaea;
    --chip:#eef0f6; --bar:#7f77dd; --bar-d:#534ab7; --pt:#37419b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;line-height:1.7;-webkit-text-size-adjust:100%}
  .wrap{max-width:680px;margin:0 auto;padding:16px 14px 60px}
  h1{font-size:20px;margin:6px 0 2px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:12px 0}
  .row{display:flex;flex-wrap:wrap;gap:8px}
  label.fld{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px}
  select,button{font-size:15px;font-family:inherit}
  select{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink);padding:11px 14px;border-radius:10px;cursor:pointer}
  .btn:hover{background:#f0f2f8}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-d)}
  .btn.block{width:100%;text-align:center}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12px;background:var(--chip);color:var(--muted);border-radius:999px;padding:3px 10px}
  .qmeta{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:8px}
  .qtext{font-size:16px;margin:0 0 12px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:11px;padding:12px;margin:8px 0;cursor:pointer;transition:.05s}
  .opt:hover{background:#f3f5fb}
  .opt.sel{border-color:var(--accent);background:#eef0fb}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.wrong{border-color:var(--ng);background:var(--ngbg)}
  .opt .mk{font-weight:600;margin-right:6px}
  .expl{background:#f4f6fb;border-radius:11px;padding:12px;margin-top:10px;font-size:14px;display:none}
  .expl.show{display:block}
  .expl .tag{font-weight:600}
  .expl .tag.ok{color:var(--ok)} .expl .tag.ng{color:var(--ng)}
  .bar-prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:4px 0 12px}
  .bar-prog>i{display:block;height:100%;background:var(--accent)}
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .stat{background:#f4f6fb;border-radius:11px;padding:12px}
  .stat .n{font-size:22px;font-weight:600}
  .stat .l{font-size:12px;color:var(--muted)}
  .dom{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px}
  .dom .nm{flex:0 0 38%}
  .dom .tr{flex:1;height:8px;background:var(--line);border-radius:999px;overflow:hidden}
  .dom .tr>i{display:block;height:100%}
  .dom .pc{flex:0 0 46px;text-align:right;color:var(--muted)}
  .center{text-align:center}
  .muted{color:var(--muted)}
  .figure{margin:6px 0 12px;text-align:center}
  .figure svg{max-width:100%;height:auto}
  .sptrend{display:flex;align-items:flex-end;gap:3px;height:40px;margin-top:6px}
  .sptrend>i{flex:1;background:var(--accent);border-radius:2px 2px 0 0;min-height:2px}
  .footer{font-size:12px;color:var(--muted);text-align:center;margin-top:24px}
  .hide{display:none}
  a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <h1>統計検定2級 練習問題</h1>
  <p class="sub">記述統計・確率・確率分布／ オリジナル問題・難易度別・復習モード・進捗保存つき</p>

  <!-- ホーム -->
  <div id="home">
    <div class="card" id="dash"></div>
    <div class="card">
      <label class="fld">分野</label>
      <select id="selDomain"></select>
      <label class="fld">出題数</label>
      <select id="selCount">
        <option value="5">5問</option>
        <option value="10" selected>10問</option>
        <option value="20">20問</option>
        <option value="0">全部</option>
      </select>
      <label class="fld">難易度</label>
      <select id="selDiff">
        <option value="__all" selected>すべて</option>
        <option value="基礎">基礎</option>
        <option value="標準">標準</option>
        <option value="応用">応用</option>
      </select>
      <label class="fld">出題順</label>
      <select id="selOrder">
        <option value="random" selected>ランダム</option>
        <option value="seq">番号順</option>
      </select>
      <div style="height:12px"></div>
      <button class="btn primary block" id="btnStart">演習を始める</button>
      <div style="height:8px"></div>
      <button class="btn block" id="btnReview">復習モード（間違えた問題だけ）<span id="reviewCount" class="muted"></span></button>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center">
        <span class="muted" style="font-size:13px">学習記録</span>
        <button class="btn" id="btnReset" style="font-size:13px;padding:6px 10px">記録をリセット</button>
      </div>
    </div>
  </div>

  <!-- クイズ -->
  <div id="quiz" class="hide">
    <div class="bar-prog"><i id="prog"></i></div>
    <div class="card">
      <div class="qmeta"><span id="qpos"></span><span><span id="qdiff" class="chip"></span> <span id="qdom" class="chip"></span></span></div>
      <div class="figure" id="qfig"></div>
      <div class="qtext" id="qtext"></div>
      <div id="opts"></div>
      <div class="expl" id="expl"></div>
      <div style="height:12px"></div>
      <button class="btn primary block hide" id="btnCheck">解答する</button>
      <button class="btn primary block hide" id="btnNext">次へ</button>
      <div style="height:8px"></div>
      <button class="btn block" id="btnQuit" style="font-size:13px">中断してホームへ</button>
    </div>
  </div>

  <!-- 結果 -->
  <div id="result" class="hide">
    <div class="card center">
      <div class="muted" style="font-size:13px">今回の結果</div>
      <div style="font-size:34px;font-weight:700;margin:6px 0" id="rScore"></div>
      <div class="muted" id="rDetail"></div>
      <div style="height:14px"></div>
      <button class="btn primary block" id="btnAgain">もう一度</button>
      <div style="height:8px"></div>
      <button class="btn block" id="btnReviewWrong">この回の間違いを復習</button>
      <div style="height:8px"></div>
      <button class="btn block" id="btnHome">ホームへ</button>
    </div>
  </div>

  <div class="footer">出題はすべてオリジナル問題（過去問の複製ではありません）。進捗はこの端末内にのみ保存されます。</div>
</div>

<script>
const QUESTIONS = [{"id": 1, "domain": "1変数データ", "difficulty": "基礎", "type": "single", "q": "次の5個のデータの中央値（メジアン）はいくらか。 $\\{4,\\ 8,\\ 6,\\ 10,\\ 7\\}$", "options": ["6", "7", "7.5", "8"], "answer": [1], "explanation": "「中央値」は、全員を小さい順に並べたときの“ちょうど真ん中の人”の値です。<br>手順は2つだけ。①小さい順に並べる：4,6,7,8,10。②5個（奇数）なので真ん中の3番目＝7。（偶数個なら真ん中2つの平均をとります）<br>中央値の長所は、端に変な値が混じっても真ん中はあまり動かないこと。<br>よくある誤り：並べ替えずに元の真ん中(6)を選ぶ／平均と混同する（今回は平均も7で偶然そろっただけ）。<br>合言葉：『中央値＝並べて真ん中』。"}, {"id": 2, "domain": "1変数データ", "difficulty": "基礎", "type": "single", "q": "あるデータに1つだけ極端に大きい外れ値が混じっている。外れ値の影響を最も受けにくい代表値はどれか。", "options": ["平均値", "中央値", "範囲", "標準偏差"], "answer": [1], "explanation": "ポイントは「外れ値（極端に大きい・小さい値）に強いか弱いか」です。<br>中央値は順番で真ん中を見るだけなので、端に変な値が1つ入っても動きにくい（＝外れ値に強い）。<br>平均は全部を合計するので、大きな値にグイッと引っ張られます。範囲（最大−最小）と標準偏差は“散らばり”の指標で、端の値で決まる・大きく膨らむため外れ値に特に弱い。<br>たとえ：テストで1人だけ1000点がいると、平均は跳ね上がるけれど、真ん中の人（中央値）はほぼ変わりません。<br>合言葉：『中央値はブレに強い、平均は引っ張られる』。"}, {"id": 3, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "下のヒストグラム（ある50人のテスト得点）について、平均値と中央値の大小関係として最も適切なものはどれか。", "options": ["平均値 < 中央値", "平均値 ≒ 中央値", "平均値 > 中央値", "判断できない"], "answer": [2], "explanation": "まず図の形を読みます。山が左寄り（50〜60点）にあって、右へ長いしっぽ＝「右に裾が長い」形です。<br>なぜ平均＞中央値？ 平均は大きい値に引っ張られる性質があり、右のしっぽにいる少数の高得点者が平均を上へ押し上げます。中央値は人数で真ん中を見るだけなので、しっぽに鈍感です。<br>だから平均＞中央値（くわしくは 平均＞中央値＞最頻値）。左に裾が長いときは全部逆になります。<br>合言葉：『平均はしっぽのある方へ動く（右しっぽ→平均が大きい）』。", "figure": {"type": "histogram", "edges": [30, 40, 50, 60, 70, 80, 90, 100], "freqs": [2, 8, 14, 12, 7, 4, 3], "xlabel": "得点", "ylabel": "度数"}}, {"id": 4, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "次の7個のデータの四分位範囲（IQR）はいくらか。ただし四分位数は、中央値を除いた下位・上位それぞれの中央値とする。 $\\{1,3,5,7,9,11,13\\}$", "options": ["6", "7", "8", "10"], "answer": [2], "explanation": "IQR（四分位範囲）は“真ん中50%の幅”のことです。<br>①まず全体の真ん中（中央値）：7個の4番目＝7。②それを除いて下半分 1,3,5 と上半分 9,11,13 に分ける。③各半分の真ん中が四分位数：Q1=3、Q3=11。④IQR＝Q3−Q1＝11−3＝8。<br>注意：範囲（最大−最小＝12）と混同しないこと。IQRは“箱の幅”のイメージ。<br>合言葉：『IQR＝Q3−Q1＝真ん中半分の幅』。"}, {"id": 5, "domain": "1変数データ", "difficulty": "基礎", "type": "single", "q": "下の箱ひげ図について、中央値と四分位範囲（IQR）の組として正しいものはどれか。", "options": ["中央値 35・IQR 30", "中央値 50・IQR 30", "中央値 50・IQR 45", "中央値 65・IQR 50"], "answer": [1], "explanation": "箱ひげ図は部品を1つずつ読みます。<br>箱の中の線＝中央値＝50。箱の左端＝Q1＝35、右端＝Q3＝65。ひげの両端＝最小20・最大90。<br>IQRは“箱の横幅”なので Q3−Q1＝65−35＝30。<br>ひっかけ：ひげの端を使う『範囲』(90−20＝70) はIQRではありません。<br>合言葉：『箱の中線＝中央値、箱の横幅＝IQR』。", "figure": {"type": "boxplot", "min": 20, "q1": 35, "med": 50, "q3": 65, "max": 90, "xlabel": "点数"}}, {"id": 6, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "次の4個のデータについて、偏差平方和を $n$ で割って求める分散（標本分散）はいくらか。 $\\{1,3,5,7\\}$", "options": ["5", "6.67", "$\\sqrt5$", "20"], "answer": [0], "explanation": "分散は“平均からのズレ（偏差）を2乗して平均したもの”＝散らばりの大きさです。<br>①平均＝(1+3+5+7)÷4＝4。②偏差＝−3,−1,1,3。③2乗＝9,1,1,9、合計20。④nで割る（標本分散）：20÷4＝5。<br>大事な区別：n−1＝3で割る「不偏分散」は20÷3≈6.67で別物です。問題が「nで割る標本分散」か「n−1の不偏分散」かを必ず確認。<br>合言葉：『分散＝偏差を2乗して平均（n か n−1 かに注意）』。"}, {"id": 7, "domain": "1変数データ", "difficulty": "基礎", "type": "single", "q": "あるデータの全ての値に同じ定数 $c$ を足した。このとき変化しない統計量はどれか。", "options": ["平均値", "中央値", "標準偏差", "最大値"], "answer": [2], "explanation": "全データに同じ数 c を足すのは、グラフをそのまま横へ平行移動するイメージです。<br>位置を表す量（平均・中央値・最大・最小）はぜんぶ +c ずれますが、データ同士の“間隔（散らばり）”は変わりません。だから標準偏差・分散・範囲・IQRは不変。<br>例：2,4,6 に +10 した 12,14,16 も、間隔は2ずつで同じ。<br>発展：c倍したら平均はc倍、標準偏差は|c|倍、分散はc²倍（かけ算は散らばりも変える）。<br>合言葉：『足し算は位置だけ動かす、散らばりは変えない』。"}, {"id": 8, "domain": "1変数データ", "difficulty": "基礎", "type": "single", "q": "平均が大きく異なる2グループの「相対的なばらつき」を比較したい。最も適切な指標はどれか。", "options": ["分散", "標準偏差", "変動係数", "範囲"], "answer": [2], "explanation": "標準偏差は“単位つきの絶対的なばらつき”です。平均の大きさがまるで違う2つを、標準偏差だけで比べると不公平になります。<br>そこで平均で割った「変動係数 CV＝標準偏差÷平均」を使うと、単位や水準が違っても“相対的なばらつき”を比べられます。<br>例：身長(平均170・SD5・CV≈0.03)と体重(平均60・SD6・CV=0.10)。SDは体重が大きいですが、相対的にも体重のほうがばらついている、と正しく言えます。<br>合言葉：『水準が違うばらつき比べは CV（標準偏差÷平均）』。"}, {"id": 9, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "平均 $70$、標準偏差 $5$ のテストで $80$ 点をとった。この得点を標準化（z得点に変換）するといくらか。", "options": ["0.5", "2", "10", "16"], "answer": [1], "explanation": "標準化（z得点）は“平均から標準偏差いくつ分だけ離れているか”を表す変換です。<br>式：z＝(値−平均)÷標準偏差。代入：(80−70)÷5＝2。つまり平均より標準偏差2個分だけ上。<br>標準化すると平均0・標準偏差1のものさしに揃うので、平均も散らばりも違うテスト同士を公平に比べられます（次の問題で実際に使います）。<br>合言葉：『z＝(値−平均)÷標準偏差＝平均から何σ分』。"}, {"id": 10, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "平均 $\\bar{x}$ からの偏差 $x_i-\\bar{x}$ について、常に成り立つものはどれか。", "options": ["偏差の総和は0", "偏差の総和は正", "偏差の平方和は0", "偏差の平均は1"], "answer": [0], "explanation": "偏差（平均からのズレ）を全部足すと、必ず0になります。<br>理由：プラスのズレとマイナスのズレがちょうど打ち消し合うから。式でも Σ(値−平均)＝(合計)−(個数×平均)＝0。<br>だから“散らばり”を測るとき、ただ足すと0で消えてしまうので、2乗してから足します（これが分散）。<br>合言葉：『偏差の合計はいつも0（だから2乗して測る）』。"}, {"id": 11, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "下の度数分布（ヒストグラム）について、各階級は階級値（区間の中央の値）で代表させる。このデータの平均値はいくらか。", "options": ["15", "18", "20", "25"], "answer": [1], "explanation": "元データが分からないときは、各階級を“真ん中の値（階級値）”で代表して平均を出します。<br>①階級値＝5,15,25。②度数＝2,3,5（合計10）。③(階級値×度数)の合計＝5×2+15×3+25×5＝10+45+125＝180。④総度数で割る：180÷10＝18。<br>合言葉：『度数分布の平均＝(階級値×度数)の合計÷総度数』。", "figure": {"type": "histogram", "edges": [0, 10, 20, 30], "freqs": [2, 3, 5], "xlabel": "値", "ylabel": "度数"}}, {"id": 12, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "あるデータで $Q_1=10,\\ Q_3=30$ であった。箱ひげ図で外れ値とみなす一般的な基準（$1.5\\times\\mathrm{IQR}$ ルール）では、上側はいくらを超える値が外れ値か。", "options": ["45", "50", "60", "90"], "answer": [2], "explanation": "外れ値の代表的な基準が「1.5×IQRルール」です。<br>①IQR＝Q3−Q1＝30−10＝20。②上の境界＝Q3+1.5×IQR＝30+1.5×20＝60。これより大きい値が外れ値。<br>（参考：下の境界は Q1−1.5×IQR＝10−30＝−20 で、これより小さい値も外れ値）<br>合言葉：『外れ値の上限＝Q3＋1.5×IQR』。"}, {"id": 13, "domain": "1変数データ", "difficulty": "標準", "type": "multi", "q": "「左に裾が長い（負に歪んだ）」分布について正しい記述をすべて選べ。", "options": ["平均値 < 中央値 となる傾向", "平均値 > 中央値 となる傾向", "左側（小さい値）に長い裾がある", "右側（大きい値）に長い裾がある"], "answer": [0, 2], "explanation": "「左に裾が長い（負の歪み）」とは、小さい値の側に少数の極端なデータがあって、そこへしっぽが伸びる形です。<br>平均はその小さい値に引っ張られて下がるので、平均＜中央値 になります（右に裾なら逆）。<br>だから正しいのは「平均＜中央値」と「左側に長い裾」の2つ。<br>合言葉：『平均はしっぽのある方へ動く（左しっぽ→平均が小さい）』。"}, {"id": 14, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "ヒストグラムと箱ひげ図の使い分けについて、最も適切な記述はどれか。", "options": ["ヒストグラムは分布の形（山の数や歪み）を把握しやすい", "箱ひげ図は分布が二峰性かどうかを必ず判別できる", "箱ひげ図は個々の度数の高さを表示できる", "ヒストグラムは複数群の中央値比較に箱ひげ図より常に優れる"], "answer": [0], "explanation": "ヒストグラムと箱ひげ図は、得意・不得意で使い分けます。<br>ヒストグラム：棒の高さで“分布の形（山が1つか2つか、左右の偏り）”が直感的に見える。<br>箱ひげ図：5つの数（最小・Q1・中央値・Q3・最大）に要約した図で、複数グループの並べ比べが得意。ただし情報を絞るので“山が2つ（二峰性）”は見えず、度数の高さも出ません。<br>だから正しいのは「ヒストグラムは形を把握しやすい」。<br>合言葉：『形を見るならヒストグラム、要約・比較なら箱ひげ図』。"}, {"id": 15, "domain": "2変数データ", "difficulty": "基礎", "type": "single", "q": "相関係数 $r$ について正しい記述はどれか。", "options": ["$r$ は $-1 \\le r \\le 1$ の範囲をとる", "$r$ は $0 \\le r \\le 1$ の範囲をとる", "$r=0$ なら2変数は必ず独立である", "$r$ は測定単位を変えると値も変わる"], "answer": [0], "explanation": "「相関係数 r」は、2つの量の“まっすぐな関係”の強さと向きを表す数字です。<br>範囲は −1〜+1。+1は完全な右上がりの直線、−1は完全な右下がり、0はまっすぐな関係なし。1に近いほど点が直線に集まります。<br>注意2つ。①r=0でも放物線のような“曲がった関係”はあり得るので、独立とは限らない。②cm→mのように単位を変えてもrは変わりません（無次元だから）。<br>合言葉：『rは−1〜+1。0でも独立とは限らない』。"}, {"id": 16, "domain": "2変数データ", "difficulty": "基礎", "type": "single", "q": "下の散布図から読み取れる2変数の相関として最も適切なものはどれか。", "options": ["強い正の相関", "弱い正の相関", "ほぼ無相関", "負の相関"], "answer": [3], "explanation": "散布図は“点の並ぶ向き”で読みます。点が右下がり（xが増えるとyが減る）に並んでいるので、負の相関。<br>見分け方：右上がり＝正、右下がり＝負、ばらばら＝無相関。直線にそろうほど相関は強い。<br>合言葉：『右上がり＝正、右下がり＝負』。", "figure": {"type": "scatter", "points": [[1, 9], [2, 8.2], [3, 7], [4, 6.5], [5, 5.2], [6, 4], [7, 3.4], [8, 2]], "xlabel": "x", "ylabel": "y"}}, {"id": 17, "domain": "2変数データ", "difficulty": "標準", "type": "single", "q": "身長(cm)と体重(kg)の相関係数を求めた。身長の単位をcmからm（1/100倍）に変えると、相関係数はどうなるか。", "options": ["1/100倍になる", "100倍になる", "変わらない", "0になる"], "answer": [2], "explanation": "相関係数は“単位のない（無次元の）”数字です。身長をcmからm（1/100倍）に変えても、計算の途中で分子と分母が同じだけ縮んで打ち消し合うので、値は変わりません。<br>一般に、各変数を定数倍・定数加算しても相関係数は不変。共分散は単位で値が変わるのと対照的です。<br>合言葉：『相関係数は単位を変えても不変（無次元）』。"}, {"id": 18, "domain": "2変数データ", "difficulty": "基礎", "type": "single", "q": "2変数 $x,\\ y$ の共分散が負であった。このことから言えるのはどれか。", "options": ["$x$ が大きいほど $y$ も大きい傾向", "$x$ が大きいほど $y$ は小さい傾向", "2変数は無関係", "回帰直線は水平になる"], "answer": [1], "explanation": "共分散は、各データの“xのズレ×yのズレ”を平均したものです。<br>これが負ということは、「xが平均より大きいとき、yは平均より小さい」という組が多いという意味＝逆向きの関係（負の相関）。<br>符号の対応：プラスなら同じ向き、マイナスなら逆向き、0に近いと直線関係が弱い。相関係数の符号も共分散と同じになります。<br>合言葉：『共分散マイナス＝逆向きの関係』。"}, {"id": 19, "domain": "2変数データ", "difficulty": "標準", "type": "single", "q": "最小二乗法で求めた単回帰直線 $\\hat{y}=a+bx$ について、必ず成り立つものはどれか。", "options": ["原点 $(0,0)$ を必ず通る", "点 $(\\bar{x},\\ \\bar{y})$ を必ず通る", "すべての観測点を通る", "傾き $b$ は必ず正"], "answer": [1], "explanation": "最小二乗法で引いた回帰直線は、必ずデータの“重心”（xの平均, yの平均）を通ります。<br>理由：切片が a＝(yの平均)−b×(xの平均) で決まるので、x＝(xの平均)を入れると y＝(yの平均) になるから。<br>注意：原点(0,0)を通るとは限らず、全部の点を通るのは完全な直線関係のときだけ。傾きは負にもなり得ます。<br>合言葉：『回帰直線は必ず重心(平均,平均)を通る』。"}, {"id": 20, "domain": "2変数データ", "difficulty": "標準", "type": "single", "q": "相関係数 $r=0.8$、$x$ の標準偏差 $s_x=2$、$y$ の標準偏差 $s_y=5$ のとき、$y$ を $x$ で説明する回帰直線の傾き $b$ はいくらか。", "options": ["0.32", "0.8", "2.0", "3.2"], "answer": [2], "explanation": "回帰直線の傾きは「相関係数 × 標準偏差の比」で出せます：b＝r×(yの標準偏差÷xの標準偏差)。<br>代入：b＝0.8×(5÷2)＝0.8×2.5＝2.0。<br>意味：xが1増えると予測yは平均2.0増える。相関係数rそのものは傾きではなく、標準偏差の比をかけて初めてyの単位の傾きになります。<br>合言葉：『傾き＝r×(yのSD÷xのSD)』。"}, {"id": 21, "domain": "2変数データ", "difficulty": "標準", "type": "single", "q": "単回帰で相関係数が $r=0.6$ であった。決定係数 $R^2$ はいくらか。", "options": ["0.16", "0.36", "0.6", "0.77"], "answer": [1], "explanation": "単回帰では、決定係数は相関係数の2乗：R²＝r²＝0.6²＝0.36。<br>意味：yのばらつき（全変動）のうち36%が回帰（x）で説明でき、残り64%は説明できない。<br>ひっかけ：r=0.6をそのまま“当てはまりの良さ”と思って0.6を選ばない。当てはまりはr²のほうです。<br>合言葉：『当てはまりは R²＝rの2乗』。"}, {"id": 22, "domain": "2変数データ", "difficulty": "基礎", "type": "single", "q": "「アイスの売上」と「水難事故件数」に強い正の相関が見られた。最も適切な解釈はどれか。", "options": ["アイスを食べると水難事故が増える", "水難事故が増えるとアイスが売れる", "気温という共通要因（交絡）で両方が増える可能性がある", "相関が強いので因果関係が証明された"], "answer": [2], "explanation": "相関があっても因果があるとは限りません（相関≠因果）。<br>アイスの売上と水難事故が同時に増えるのは、「気温が高い」という共通の原因が両方を押し上げているから。この“裏の共通原因”を交絡といいます。<br>2つの結果が同じ原因で連動すると、直接の因果がなくても強い相関が出ます（疑似相関）。相関の強さは因果の証拠になりません。<br>合言葉：『相関≠因果。裏の共通原因（交絡）を疑う』。"}, {"id": 23, "domain": "2変数データ", "difficulty": "基礎", "type": "single", "q": "下の散布図に当てはめた回帰直線は $\\hat{y}=2+1.5x$ である。$x=4$ のときの $y$ の予測値はいくらか。", "options": ["6", "8", "9.5", "11"], "answer": [1], "explanation": "予測は回帰式にxの値を入れるだけ。ŷ＝2+1.5×4＝2+6＝8。<br>2は切片（x=0のときの予測）、1.5は傾き（xが1増えるとŷが1.5増える）。<br>注意：データのある範囲の外で予測する“外挿”は当たる保証が下がります（今回のx=4は範囲内なので安心）。<br>合言葉：『予測は回帰式にxを代入するだけ』。", "figure": {"type": "scatter", "points": [[1, 3.2], [2, 5.1], [3, 6.4], [4, 8.3], [5, 9.4], [6, 11.2]], "line": {"a": 2, "b": 1.5}, "xlabel": "x", "ylabel": "y"}}, {"id": 24, "domain": "2変数データ", "difficulty": "標準", "type": "single", "q": "ある調査で、喫煙者100人中30人が咳あり、非喫煙者200人中20人が咳ありだった。喫煙者の「咳あり」の割合（条件付き割合）はいくらか。", "options": ["10%", "20%", "30%", "50%"], "answer": [2], "explanation": "条件付き割合は“どの集団の中での割合か”を意識します。ここは「喫煙者の中で」咳ありの割合なので、分母は喫煙者100人。<br>30÷100＝0.30＝30%。<br>比較：非喫煙者は20÷200＝10%。喫煙者30% と 非喫煙者10% で差があり、関連がうかがえます。クロス集計は“どの行・列を分母にするか”で意味が変わるので、必ず分母を確認。<br>合言葉：『条件付き割合＝その条件の人数を分母にする』。"}, {"id": 25, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "次の5個のデータについて、不偏分散（偏差平方和を $n-1$ で割る）はいくらか。 $\\{2,4,4,6,9\\}$", "options": ["5.6", "7", "$\\sqrt7$", "28"], "answer": [1], "explanation": "①平均＝(2+4+4+6+9)÷5＝25÷5＝5。②偏差＝−3,−1,−1,1,4。③2乗＝9,1,1,1,16、合計28。④不偏分散は n−1＝4 で割る：28÷4＝7。<br>区別：nで割る標本分散なら 28÷5＝5.6。母集団のばらつきを“推定”する場面では n−1 で割る不偏分散を使います。<br>合言葉：『不偏分散は n−1 で割る（母集団推定用）』。"}, {"id": 26, "domain": "1変数データ", "difficulty": "応用", "type": "single", "q": "クラスA（20人）の平均点は60点、クラスB（30人）の平均点は80点だった。両クラスを合わせた50人全体の平均点はいくらか。", "options": ["70点", "72点", "75点", "判断できない"], "answer": [1], "explanation": "平均同士を単純に (60+80)÷2＝70 としてはいけません。人数が違うので“合計を作り直す”加重平均にします。<br>①各クラスの合計点：A＝60×20＝1200、B＝80×30＝2400。②全体合計＝3600。③全人数50で割る：3600÷50＝72。<br>人数が多いB(80点)寄りに引っ張られて72になります。<br>合言葉：『人数が違う平均は、合計÷総人数（加重平均）』。"}, {"id": 27, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "国語は平均60・標準偏差10のテストで75点、数学は平均70・標準偏差5のテストで78点だった。集団内での相対的な位置がより上位なのはどちらか。", "options": ["国語", "数学", "同じ", "判断できない"], "answer": [1], "explanation": "素点(75 と 78)では平均も散らばりも違うので、そのままでは比べられません。z得点 z＝(値−平均)÷標準偏差 で同じものさしに直します。<br>国語：z＝(75−60)÷10＝1.5。数学：z＝(78−70)÷5＝1.6。<br>zが大きいほど集団の中で上位なので、1.6＞1.5 で数学のほうが相対的に上です。<br>合言葉：『点数でなく z（平均から何σ分）で比べる』。"}, {"id": 28, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "商品Aは平均価格50・標準偏差10、商品Bは平均価格200・標準偏差20であった。相対的なばらつき（変動係数）が小さいのはどちらか。", "options": ["商品A", "商品B", "同じ", "標準偏差だけでは比較できる"], "answer": [1], "explanation": "標準偏差だけ見るとB(20)が大きいですが、平均の水準が4倍も違うので不公平です。相対的なばらつきは 変動係数 CV＝標準偏差÷平均 で比べます。<br>A＝10÷50＝0.20、B＝20÷200＝0.10。CVが小さいBのほうが、平均に対するばらつきは相対的に小さい。<br>「標準偏差が大きい＝ばらつきが大きい」とは限らない好例です。<br>合言葉：『相対ばらつきは CV、小さいほど安定』。"}, {"id": 29, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "ある変数 $x$ の平均は10、標準偏差は4である。$y=2x+3$ と変換したとき、$y$ の標準偏差はいくらか。", "options": ["4", "8", "11", "23"], "answer": [1], "explanation": "y＝ax+b の形に変えたときの、平均と標準偏差の変わり方を使います。<br>平均：(yの平均)＝a×(xの平均)+b。標準偏差：s_y＝|a|×s_x（足す定数bは散らばりに影響しません）。<br>今回 y＝2x+3 なので、標準偏差＝|2|×4＝8。（平均は2×10+3＝23、分散は2²×16＝64）<br>合言葉：『足すbは散らばりに無関係、かけるaは|a|倍（分散はa²倍）』。"}, {"id": 30, "domain": "1変数データ", "difficulty": "応用", "type": "single", "q": "次の10個のデータの四分位範囲（IQR）はいくらか。四分位数は下位5個・上位5個それぞれの中央値とする。 $\\{3,5,6,8,9,11,12,14,15,20\\}$", "options": ["6", "8", "9", "11"], "answer": [1], "explanation": "データが偶数個(10)のときの手順です。<br>①下5個 3,5,6,8,9 と上5個 11,12,14,15,20 に半分こ。②各半分の真ん中(3番目)が四分位数：Q1＝6、Q3＝14。③IQR＝14−6＝8。<br>（全体の中央値は(9+11)÷2＝10）。範囲(20−3＝17)と混同しないこと。<br>合言葉：『IQR＝Q3−Q1＝真ん中半分の幅』。"}, {"id": 31, "domain": "1変数データ", "difficulty": "応用", "type": "single", "q": "次の5個のデータについて、公式 $s^2=\\overline{x^2}-(\\bar{x})^2$（2乗の平均 引く 平均の2乗）を用いて分散（標本分散）を求めよ。 $\\{1,2,3,4,5\\}$", "options": ["2", "2.5", "10", "11"], "answer": [0], "explanation": "分散は、偏差を1つずつ出さなくても「2乗の平均 −（平均）²」で速く出せます。<br>①平均＝(1+2+3+4+5)÷5＝3 → (平均)²＝9。②2乗の平均＝(1+4+9+16+25)÷5＝55÷5＝11。③分散＝11−9＝2。<br>検算（定義どおり）：偏差−2,−1,0,1,2、2乗4,1,0,1,4、合計10、÷5＝2で一致。<br>合言葉：『分散＝(2乗の平均)−(平均の2乗)』。"}, {"id": 32, "domain": "1変数データ", "difficulty": "応用", "type": "single", "q": "下の度数分布（合計30人）について、中央値が含まれる階級はどれか。", "options": ["[10,20)", "[20,30)", "[30,40)", "[40,50)"], "answer": [1], "explanation": "中央値の“位置”を、累積度数（小さい方から足した人数）で探します。<br>30人なので中央値は15番目と16番目の間。累積：[0,10)で4人、[10,20)で4+6＝10人、[20,30)で10+10＝20人。<br>15・16番目はどちらも“10人を超え20人まで”の範囲＝[20,30)の階級に入ります。<br>合言葉：『度数分布の中央値は、累積が n/2 を超える階級にある』。", "figure": {"type": "histogram", "edges": [0, 10, 20, 30, 40, 50], "freqs": [4, 6, 10, 5, 5], "xlabel": "値", "ylabel": "度数"}}, {"id": 33, "domain": "1変数データ", "difficulty": "応用", "type": "single", "q": "データ $\\{8,10,11,12,13,15,30\\}$ について、1.5×IQRルールで外れ値となる値はどれか。四分位数は中央値を除いた下位・上位の中央値とする。", "options": ["8", "15", "30", "外れ値はない"], "answer": [2], "explanation": "境界を作って、各値が外にあるか調べます。<br>①中央値(4番目)＝12。下 8,10,11→Q1＝10、上 13,15,30→Q3＝15。②IQR＝5。③上の境界＝15+1.5×5＝22.5、下の境界＝10−1.5×5＝2.5。④30は22.5より大きい＝外れ値。ほかは2.5〜22.5の中。<br>合言葉：『境界(Q3＋1.5IQR／Q1−1.5IQR)の外が外れ値』。"}, {"id": 34, "domain": "2変数データ", "difficulty": "応用", "type": "single", "q": "5組のデータについて次の偏差積和・偏差平方和が得られた：$S_{xy}=\\sum(x-\\bar{x})(y-\\bar{y})=6$、$S_{xx}=\\sum(x-\\bar{x})^2=10$、$S_{yy}=\\sum(y-\\bar{y})^2=6$。相関係数 $r$ に最も近いものはどれか。", "options": ["0.60", "0.77", "0.85", "0.97"], "answer": [1], "explanation": "相関係数は、偏差積和・偏差平方和から r＝Sxy÷√(Sxx×Syy) で出せます（合計のままでも比は同じ）。<br>代入：r＝6÷√(10×6)＝6÷√60。√60≈7.75 なので r≈6÷7.75≈0.77。<br>−1〜+1の範囲に収まる正の相関。試験ではこの“合計の形”でよく与えられるので公式を覚えておく。<br>合言葉：『r＝Sxy÷√(Sxx×Syy)』。"}, {"id": 35, "domain": "2変数データ", "difficulty": "応用", "type": "single", "q": "問題34と同じデータ（$S_{xy}=6,\\ S_{xx}=10$、$\\bar{x}=3,\\ \\bar{y}=4$）について回帰直線 $\\hat{y}=a+bx$ を求め、$x=6$ のときの予測値を答えよ。", "options": ["5.0", "5.2", "5.8", "6.2"], "answer": [2], "explanation": "手順は「傾き→切片→代入」。<br>①傾き b＝Sxy÷Sxx＝6÷10＝0.6。②切片 a＝(yの平均)−b×(xの平均)＝4−0.6×3＝4−1.8＝2.2。③式 ŷ＝2.2+0.6x に x=6：ŷ＝2.2+3.6＝5.8。<br>注意：傾きの分母は“xの平方和 Sxx”。Syyは使いません。<br>合言葉：『傾き＝Sxy÷Sxx、切片は平均から逆算』。"}, {"id": 36, "domain": "2変数データ", "difficulty": "標準", "type": "single", "q": "5組のデータで偏差積和が $\\sum(x-\\bar{x})(y-\\bar{y})=6$ であった。共分散 $s_{xy}$（$n$ で割る定義）はいくらか。", "options": ["1.2", "1.5", "6", "30"], "answer": [0], "explanation": "共分散は“偏差積和を n で割ったもの”：s_xy＝6÷5＝1.2。<br>プラスなので、xとyは同じ向きに動く関係。<br>注意：偏差積和 Sxy=6 そのものは“合計”であって共分散ではありません。nで割って初めて共分散。相関係数はさらにそれを標準偏差で割って標準化したものです。<br>合言葉：『共分散＝偏差積和÷n』。"}, {"id": 37, "domain": "2変数データ", "difficulty": "標準", "type": "single", "q": "ある単回帰分析で相関係数が $r=-0.7$ であった。決定係数 $R^2$ と、その意味として正しい組はどれか。", "options": ["$R^2=0.49$：$y$ の変動の約49%が回帰で説明できる", "$R^2=-0.49$：負の相関なので決定係数も負", "$R^2=0.70$：$y$ の変動の70%が説明できる", "$R^2=0.84$：相関が強いので84%説明できる"], "answer": [0], "explanation": "決定係数は相関係数の2乗：R²＝r²＝(−0.7)²＝0.49。2乗するので符号は必ずプラス（マイナスにはならない）。<br>意味：yのばらつきの約49%が回帰で説明でき、残り約51%は説明できない。<br>よくある誤り：|r|=0.7をそのまま“70%説明”と読む。説明割合はrではなくr²です。<br>合言葉：『R²＝rの2乗、必ず0〜1のプラス』。"}, {"id": 38, "domain": "2変数データ", "difficulty": "応用", "type": "single", "q": "おおむね無相関に見える散布図に、右上に1点だけ極端に離れた点（高x・高y）を加えた。相関係数 $r$ はどう変化しやすいか。", "options": ["ほとんど変わらない", "見かけ上、正の方向に大きくなりやすい", "必ず0のまま", "必ず負になる"], "answer": [1], "explanation": "相関係数は外れ値にとても弱いです。<br>右上（xもyも大きい）に1点だけ離れた点があると、その点の“xのズレ×yのズレ”が大きなプラスになり、共分散を押し上げます。<br>その結果、もとは無相関でも見かけ上、正の相関が強く出やすい（右下に離れた点なら負へ引っ張る）。<br>教訓：相関係数だけ信じず、必ず散布図で外れ値を確認。1点で結論が変わることがあります。<br>合言葉：『外れ値1個で相関は化ける。散布図を見る』。"}, {"id": 39, "domain": "1変数データ", "difficulty": "応用", "type": "single", "q": "ある投資の価値が1年目に1.2倍、2年目に0.8倍になった。2年間を通じた1年あたりの平均成長率（幾何平均）に最も近いものはどれか。", "options": ["1.00倍（変化なし）", "0.98倍（約2%減）", "1.04倍（約4%増）", "0.96倍（約4%減）"], "answer": [1], "explanation": "倍率（かけ算で効く数）の平均は、足して割るのではなく“かけて累乗根”をとる幾何平均を使います。<br>2年分の総合倍率＝1.2×0.8＝0.96。1年あたりはその平方根 √0.96≈0.98＝年あたり約2%減。<br>算術平均 (1.2+0.8)÷2＝1.0（変化なし）と思いがちですが誤り。実際 1.2×0.8＝0.96＜1 で、2年で元本は目減りしています。<br>合言葉：『倍率・成長率の平均は幾何平均（かけてルート）』。"}, {"id": 40, "domain": "確率", "difficulty": "基礎", "type": "single", "q": "サイコロを2回振るとき、少なくとも1回は6が出る確率はいくらか。", "options": ["$\\frac{1}{3}$", "$\\frac{11}{36}$", "$\\frac{1}{6}$", "$\\frac{2}{6}$"], "answer": [1], "explanation": "「少なくとも1回」は“余事象（1回も出ない）”で考えると速いです。<br>①1回も6が出ない：各回 5/6、2回とも出ないので (5/6)²＝25/36。②求める確率＝1−25/36＝11/36。<br>合言葉：『「少なくとも1つ」は 1−(全部ダメ)』。"}, {"id": 41, "domain": "確率", "difficulty": "基礎", "type": "single", "q": "$P(A)=0.5,\\ P(B)=0.4,\\ P(A\\cap B)=0.2$ のとき、$P(A\\cup B)$ はいくらか。", "options": ["0.7", "0.9", "0.6", "1.1"], "answer": [0], "explanation": "和事象は加法定理：P(A∪B)＝P(A)+P(B)−P(A∩B)。<br>代入：0.5+0.4−0.2＝0.7。<br>重なり P(A∩B) を引くのは、AとBの共通部分を二重に数えないため。引き忘れて0.9にしないこと。<br>合言葉：『P(A∪B)＝足して、重なりを引く』。"}, {"id": 42, "domain": "確率", "difficulty": "基礎", "type": "single", "q": "事象 $A,\\ B$ が独立で $P(A)=0.3,\\ P(B)=0.5$ のとき、$P(A\\cap B)$ はいくらか。", "options": ["0.15", "0.8", "0.2", "0.65"], "answer": [0], "explanation": "独立なら“かけ算の法則”がそのまま使えます：P(A∩B)＝P(A)×P(B)＝0.3×0.5＝0.15。<br>独立とは「片方の結果が、もう片方の確率に影響しない」こと。独立でないときは条件付き確率が必要です。<br>合言葉：『独立なら同時確率はかけ算』。"}, {"id": 43, "domain": "確率", "difficulty": "標準", "type": "single", "q": "$P(A\\cap B)=0.2,\\ P(B)=0.4$ のとき、条件付き確率 $P(A\\mid B)$ はいくらか。", "options": ["0.2", "0.5", "0.8", "0.08"], "answer": [1], "explanation": "条件付き確率の定義：P(A|B)＝P(A∩B)÷P(B)。<br>代入：0.2÷0.4＝0.5。<br>意味は「Bが起きた、と分かった世界（分母をBに限定）でのAの割合」。分母を全体ではなくBにするのがポイントです。<br>合言葉：『P(A|B)＝(A∩B)÷B、分母をBに絞る』。"}, {"id": 44, "domain": "確率", "difficulty": "標準", "type": "single", "q": "$P(A)=0.6,\\ P(B)=0.5,\\ P(A\\cap B)=0.3$ のとき、$A$ と $B$ の関係として正しいものはどれか。", "options": ["独立である", "排反（互いに排反）である", "従属（独立でない）である", "判断できない"], "answer": [0], "explanation": "独立かどうかは「P(A∩B)＝P(A)×P(B) が成り立つか」で判定します。<br>右辺：0.6×0.5＝0.30。実際のP(A∩B)＝0.3。ぴったり一致するので独立。<br>補足：排反なら P(A∩B)＝0 のはずですが今回は0.3なので排反ではない。“排反”と“独立”は別物です。<br>合言葉：『独立判定は P(A∩B)＝P(A)×P(B) か』。"}, {"id": 45, "domain": "確率", "difficulty": "応用", "type": "single", "q": "ある病気の有病率は1%。検査は、病気の人を99%陽性と判定し（感度99%）、健康な人を5%誤って陽性と判定する。検査で陽性だった人が実際に病気である確率に最も近いものはどれか。", "options": ["約17%", "約50%", "約83%", "約99%"], "answer": [0], "explanation": "ベイズの問題。病気をD、陽性を+とします。P(D)=0.01、P(+|D)=0.99、P(+|健康)=0.05。<br>①陽性になる確率（全部）＝0.01×0.99+0.99×0.05＝0.0099+0.0495＝0.0594。②求めるのは P(D|+)＝0.0099÷0.0594≈0.167＝約17%。<br>陽性でも本当に病気なのは約17%。もともと病気の人が少ない（1%）ので、健康な人からの偽陽性（人数が多い）が効いて低くなります（基準率の錯誤）。<br>合言葉：『分子＝注目の経路、分母＝全部の経路の和』。"}, {"id": 46, "domain": "確率", "difficulty": "標準", "type": "single", "q": "あるゲームの賞金は、確率0.2で500円、確率0.5で100円、確率0.3で0円である。賞金の期待値はいくらか。", "options": ["100円", "150円", "200円", "300円"], "answer": [1], "explanation": "期待値は「値×その確率」を全部足したもの：E＝500×0.2+100×0.5+0×0.3＝100+50+0＝150（円）。<br>意味：1回あたり長い目で見て平均いくらもらえるか。参加費が150円より高ければ平均的に損、安ければ得、の判断に使えます。<br>合言葉：『期待値＝(値×確率)の合計』。"}, {"id": 47, "domain": "確率", "difficulty": "応用", "type": "single", "q": "当たり2本を含む5本のくじから、戻さずに続けて2本引く。2本とも当たりである確率はいくらか。", "options": ["$\\frac{1}{10}$", "$\\frac{4}{25}$", "$\\frac{2}{5}$", "$\\frac{1}{20}$"], "answer": [0], "explanation": "「戻さない（非復元）」ので、2本目の確率は1本目の結果で変わります。乗法定理 P(A∩B)＝P(A)×P(B|A) を使います。<br>①1本目が当たり：2/5。②引いた後、残り4本中当たり1本なので2本目：1/4。③かける：2/5×1/4＝2/20＝1/10。<br>もし戻す（復元）なら2本目も2/5で4/25。戻すか戻さないかを必ず確認。<br>合言葉：『非復元は“引いた後の残り”で次を計算』。"}, {"id": 48, "domain": "確率", "difficulty": "基礎", "type": "single", "q": "確率が正である2つの事象 $A,\\ B$ が「互いに排反」であるとき、正しい記述はどれか。", "options": ["同時には起こらない（$P(A\\cap B)=0$）", "必ず独立である", "$P(A\\cup B)=P(A)\\,P(B)$ となる", "片方が起きると他方も必ず起きる"], "answer": [0], "explanation": "「排反（互いに排反）」とは“同時には起こらない”こと、つまり P(A∩B)＝0。<br>注意：排反と独立は別物です。独立なら P(A∩B)＝P(A)P(B)＞0 のはずですが、排反だと0になってしまう。だから確率が正の排反事象は独立になれません。<br>和は P(A∪B)＝P(A)+P(B)（重なり0だから）。<br>合言葉：『排反＝同時に起きない(P(A∩B)=0)。独立とは別』。"}, {"id": 49, "domain": "確率", "difficulty": "標準", "type": "single", "q": "袋Aと袋Bがあり、どちらかを等確率（各1/2）で選ぶ。袋Aの当たり率は0.3、袋Bは0.1である。選んだ袋から1個引くとき、当たりを引く確率はいくらか。", "options": ["0.1", "0.2", "0.3", "0.4"], "answer": [1], "explanation": "全確率の定理：原因（どの袋か）で場合分けして、各道すじの確率をかけて足します。<br>当たりを引く確率＝P(A)×P(当たり|A)+P(B)×P(当たり|B)＝0.5×0.3+0.5×0.1＝0.15+0.05＝0.2。<br>「原因で場合分け→各経路をかけて足す」がコツ。ベイズの定理の分母もこの形です。<br>合言葉：『全確率＝経路ごとに(確率×確率)を足す』。"}, {"id": 50, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "離散確率変数 $X$ の分布が下の表（棒グラフ）の通りである。期待値 $E[X]$ はいくらか。 $P(X{=}0){=}0.2,\\ P(X{=}1){=}0.5,\\ P(X{=}2){=}0.3$", "options": ["1.0", "1.1", "1.5", "0.3"], "answer": [1], "explanation": "期待値は「値×その確率」を全部足したもの（分布の“重心”のイメージ）。<br>E[X]=0×0.2+1×0.5+2×0.3=0+0.5+0.6=1.1。<br>確認：確率の合計 0.2+0.5+0.3=1 になっている（これが確率分布の条件）。<br>合言葉：『期待値＝(値×確率)の合計』。", "figure": {"type": "bar", "labels": ["0", "1", "2"], "values": [0.2, 0.5, 0.3], "xlabel": "X の値", "ylabel": "確率"}}, {"id": 51, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "問題50と同じ分布（$P(0){=}0.2,\\ P(1){=}0.5,\\ P(2){=}0.3$、$E[X]{=}1.1$）について、分散 $V[X]$ はいくらか。", "options": ["0.49", "0.7", "1.1", "1.7"], "answer": [0], "explanation": "分散は“2乗の期待値 −（期待値）²”で速く出せます。<br>①E[X²]=0²×0.2+1²×0.5+2²×0.3=0+0.5+1.2=1.7。②(E[X])²=1.1²=1.21。③分散=1.7−1.21=0.49。（標準偏差は√0.49=0.7）<br>合言葉：『分散＝(2乗の期待値)−(期待値の2乗)』。"}, {"id": 52, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "確率変数 $X$ の期待値が $E[X]=1.1$ のとき、$E[2X+3]$ はいくらか。", "options": ["2.2", "5.2", "4.1", "3.2"], "answer": [1], "explanation": "期待値には“線形性”があり、E[aX+b]=a×E[X]+b。<br>E[2X+3]=2×1.1+3=2.2+3=5.2。<br>かける数はそのままかかり、足す数はそのまま足される。これは独立かどうかに関係なく、いつも成り立ちます。<br>合言葉：『E[aX+b]＝a×E[X]＋b』。"}, {"id": 53, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "確率変数 $X$ の分散が $V[X]=0.49$ のとき、$V[2X+3]$ はいくらか。", "options": ["0.98", "1.96", "1.49", "0.49"], "answer": [1], "explanation": "分散の変換は V[aX+b]=a²×V[X]。かける数は2乗で効き、足す数は分散に影響しません。<br>V[2X+3]=2²×0.49=4×0.49=1.96。<br>期待値は“そのままa倍”、分散は“a²倍”と効き方が違うのがポイント（標準偏差なら|a|倍で√1.96=1.4）。<br>合言葉：『足すbは分散に無関係、かけるaはa²倍』。"}, {"id": 54, "domain": "確率分布", "difficulty": "基礎", "type": "single", "q": "二項分布 $B(n,p)$ で $n=10,\\ p=0.3$ のとき、期待値 $E[X]$ はいくらか。", "options": ["0.3", "3", "7", "10"], "answer": [1], "explanation": "二項分布 B(n,p) の期待値は E[X]=n×p。<br>E[X]=10×0.3=3。<br>意味：成功確率0.3の試行を10回やれば、平均3回成功する。二項分布は“成功/失敗の独立試行をn回くり返したときの成功回数”の分布です。<br>合言葉：『二項の期待値＝n×p』。"}, {"id": 55, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "二項分布 $B(n,p)$ で $n=10,\\ p=0.3$ のとき、分散 $V[X]$ はいくらか。", "options": ["2.1", "3", "0.21", "7"], "answer": [0], "explanation": "二項分布の分散は V[X]=n×p×(1−p)。<br>V[X]=10×0.3×0.7=2.1。<br>期待値 n×p=3 と混同しないこと。分散は失敗確率(1−p)もかけます。<br>合言葉：『二項の分散＝n×p×(1−p)』。"}, {"id": 56, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "コインを5回投げるとき、表がちょうど2回出る確率はいくらか（表の出る確率は0.5）。", "options": ["$\\frac{5}{32}$", "$\\frac{10}{32}$", "$\\frac{1}{2}$", "$\\frac{2}{5}$"], "answer": [1], "explanation": "二項分布 B(5,0.5) で“ちょうど2回”の確率。公式は P(X=k)=C(n,k)×p^k×(1−p)^(n−k)。<br>①組合せ C(5,2)=(5×4)÷(2×1)=10（5回のうちどの2回が成功かの選び方）。②確率部分 0.5²×0.5³=0.5⁵=1/32。③かける：10×(1/32)=10/32=0.3125。<br>合言葉：『二項＝(場合の数)×(各並びの確率)』。"}, {"id": 57, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "ポアソン分布 $\\mathrm{Po}(\\lambda)$ で $\\lambda=3$ のとき、分散 $V[X]$ はいくらか。", "options": ["1.7", "3", "9", "$\\sqrt3$"], "answer": [1], "explanation": "ポアソン分布の大きな特徴は“期待値も分散も同じλ”であること。<br>だからλ=3なら分散も3。<br>ポアソン分布は「一定の時間・空間で平均λ回起こるまれな出来事の回数」（来店数・事故件数など）。平均=分散がポアソンの目印です。<br>合言葉：『ポアソンは 期待値＝分散＝λ』。"}, {"id": 58, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "ある窓口に1分間に平均2人が到着する（ポアソン分布、$\\lambda=2$）。ある1分間に1人も到着しない確率に最も近いものはどれか。", "options": ["約0.05", "約0.14", "約0.27", "約0.50"], "answer": [1], "explanation": "ポアソンの確率は P(X=k)=λ^k×e^(−λ)÷k!。<br>k=0のとき λ⁰=1、0!=1 なので P(X=0)=e^(−λ)=e^(−2)。<br>e^(−2)≈0.135、つまり約0.14。<br>「1件も起きない確率は e^(−λ)」と覚えると速い（e^(−2)≈0.135は概数で暗記）。<br>合言葉：『1件も起きない確率＝e^(−λ)』。"}, {"id": 59, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "$X$ が正規分布 $N(50,\\ 10^2)$（平均50・標準偏差10）に従うとき、$P(X<60)$ に最も近いものはどれか。", "options": ["0.50", "0.68", "0.84", "0.95"], "answer": [2], "explanation": "まず標準化して標準正規分布Zに直します：z=(値−平均)÷標準偏差=(60−50)÷10=1。<br>求めるのは P(Z<1)。標準正規分布で P(Z<1)≈0.84。<br>図でいうと、平均より標準偏差1個分右まで（左側ぜんぶ）の面積。P(Z<0)=0.5 に、0〜1の面積 約0.34 を足して約0.84、と分けて考えてもOK。<br>合言葉：『まず標準化→標準正規の面積を読む』。", "figure": {"type": "normal", "mean": 50, "sd": 10, "shadeTo": 60, "marks": [60], "xlabel": "X"}}, {"id": 60, "domain": "確率分布", "difficulty": "基礎", "type": "single", "q": "正規分布で、平均 $\\mu$ から標準偏差1個ぶんの範囲 $\\mu-\\sigma < X < \\mu+\\sigma$ に入る確率に最も近いものはどれか。", "options": ["約50%", "約68%", "約95%", "約99.7%"], "answer": [1], "explanation": "正規分布の“68−95−99.7ルール”です。平均から標準偏差±1個で約68%、±2個で約95%、±3個で約99.7%が入ります。<br>だから μ±σ は約68%。この3つの数字を覚えておくと、正規分布の確率をざっくり暗算でき、検算にも使えます。<br>合言葉：『±1σ=68%、±2σ=95%、±3σ=99.7%』。"}, {"id": 61, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "$X$ が正規分布 $N(50,\\ 10^2)$ に従うとき、$P(40<X<60)$ に最も近いものはどれか。", "options": ["約34%", "約50%", "約68%", "約95%"], "answer": [2], "explanation": "両端を標準化します：z=(40−50)÷10=−1、z=(60−50)÷10=1。求めるのは P(−1<Z<1)。<br>これはちょうど平均±標準偏差1個分なので、68−95−99.7ルールより約68%。<br>標準化して“±何σか”に直すと、暗記した割合で素早く答えられます。<br>合言葉：『標準化して±何σか→68/95/99.7で読む』。", "figure": {"type": "normal", "mean": 50, "sd": 10, "shadeFrom": 40, "shadeTo": 60, "marks": [40, 60], "xlabel": "X"}}, {"id": 62, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "標準正規分布 $Z\\sim N(0,1)$ について、$P(Z>1.96)$ に最も近いものはどれか。", "options": ["0.025", "0.05", "0.16", "0.475"], "answer": [0], "explanation": "1.96 は正規分布でとても重要な値。P(−1.96<Z<1.96)≈0.95（真ん中95%）。<br>残りの5%が両側のしっぽに均等に分かれるので、片側は 5%÷2=2.5%。よって P(Z>1.96)≈0.025。<br>この値は区間推定・仮説検定（有意水準5%・95%信頼区間）で何度も出てきます。<br>合言葉：『1.96 ↔ 片側2.5%／両側5%』。"}, {"id": 63, "domain": "確率分布", "difficulty": "基礎", "type": "single", "q": "連続型確率変数の確率密度関数（pdf）について、正しい記述はどれか。", "options": ["ある区間の確率は、その区間での密度曲線の下の面積に等しい", "ある1点 $X=a$ ちょうどの確率は密度の値そのものに等しい", "密度の値は必ず1以下である", "曲線の下の全面積は0である"], "answer": [0], "explanation": "連続型では“確率＝面積”で考えます。区間 a<X<b の確率は、その範囲で密度曲線とx軸に挟まれた面積。<br>注意：①1点ちょうど（X=a）の確率は0（幅0の面積）なので、密度の値＝確率ではない。②密度の値自体は1を超えることもある（狭い区間なら高くなり得る）。③全区間の面積は必ず1。<br>合言葉：『確率は面積、全部で1、1点の確率は0』。"}, {"id": 64, "domain": "標本分布", "difficulty": "基礎", "type": "single", "q": "母標準偏差が $\\sigma=10$ の母集団から、大きさ $n=25$ の標本を取る。標本平均 $\\bar{X}$ の標準誤差（standard error）はいくらか。", "options": ["0.4", "2", "10", "50"], "answer": [1], "explanation": "「標準誤差」は、標本ごとに変わる“標本平均そのもののばらつき”のこと。元データのばらつきσとは別物です。<br>公式：標準誤差＝σ÷√n。代入：10÷√25=10÷5=2。<br>個々のデータは標準偏差10でばらつくけれど、25個を平均すると打ち消し合って2まで小さくなる＝たくさん測って平均すると安定する。割るのは√n（nではない）。<br>合言葉：『標準誤差＝σ÷√n』。"}, {"id": 65, "domain": "標本分布", "difficulty": "標準", "type": "single", "q": "中心極限定理（CLT）について、最も適切な記述はどれか。", "options": ["標本サイズ $n$ が大きいとき、母集団の分布の形によらず標本平均はおおよそ正規分布に従う", "母集団が正規分布のときだけ、標本平均は正規分布に従う", "$n$ を大きくすると母集団そのものが正規分布に近づく", "$n$ を大きくすると標本平均のばらつきが大きくなる"], "answer": [0], "explanation": "中心極限定理（CLT）は推測統計の土台です。<br>主張：元の母集団がどんな形（偏っていても）でも、標本サイズnを大きくすれば、標本平均の分布はおおよそ正規分布になる。<br>だから母集団の形を知らなくても、標本平均について正規分布を使った推定・検定ができます。<br>イメージ：サイコロ1個の目はガタガタだけど、100個振った平均はきれいな釣鐘型に。<br>合言葉：『標本平均は、形を問わず正規分布に近づく（CLT）』。"}, {"id": 66, "domain": "標本分布", "difficulty": "標準", "type": "single", "q": "母平均 $\\mu$、母分散 $\\sigma^2$ の母集団から大きさ $n$ の無作為標本をとる。標本平均 $\\bar{X}$ の期待値と分散の組として正しいものはどれか。", "options": ["$E[\\bar{X}]=\\mu,\\quad V[\\bar{X}]=\\dfrac{\\sigma^2}{n}$", "$E[\\bar{X}]=\\dfrac{\\mu}{n},\\quad V[\\bar{X}]=\\sigma^2$", "$E[\\bar{X}]=\\mu,\\quad V[\\bar{X}]=\\sigma^2$", "$E[\\bar{X}]=n\\mu,\\quad V[\\bar{X}]=n\\sigma^2$"], "answer": [0], "explanation": "標本平均 X̄ の性質を、期待値と分散で押さえます。<br>期待値：E[X̄]=μ（平均的には母平均そのもの＝だから不偏）。分散：V[X̄]=σ²÷n。<br>つまり期待値は母平均のまま動かないのに、分散は1/nに縮む。これが“標本を増やすほど平均が安定する”ことの数式の根拠。標準誤差はこの分散の平方根 σ/√n。<br>合言葉：『E[X̄]＝μ、V[X̄]＝σ²÷n』。"}, {"id": 67, "domain": "標本分布", "difficulty": "応用", "type": "single", "q": "標本平均の標準誤差を現在の半分にしたい。標本サイズ $n$ をどうすればよいか。", "options": ["2倍にする", "4倍にする", "半分にする", "変えなくてよい"], "answer": [1], "explanation": "標準誤差は σ÷√n で、nの平方根に反比例します。<br>標準誤差を半分にするには分母 √n を2倍にすればよく、√n が2倍 → n は2²=4倍。<br>つまり誤差を半分（精度2倍）にするには標本を4倍も集める必要がある。精度は√nでしか上がらない＝労力のわりに伸びにくい、と覚える。<br>合言葉：『誤差を半分にするには n を4倍』。"}, {"id": 68, "domain": "標本分布", "difficulty": "標準", "type": "single", "q": "母分散が未知で、標本サイズも小さい場合に、母平均の区間推定で標準正規分布の代わりに用いる分布はどれか。", "options": ["t分布", "カイ二乗分布", "F分布", "二項分布"], "answer": [0], "explanation": "母平均の推定では本来 (標本平均−μ)÷(σ/√n) が標準正規分布に従いますが、これは母標準偏差σを知っている前提。<br>現実はσが不明なことが多く、標本から計算した不偏標準偏差sで代用します。すると統計量は“自由度n−1のt分布”に従います。<br>t分布は正規分布より裾が重い（sという推定値を使うぶん不確かさが増える）。nが大きいとt分布は正規分布に近づきます。<br>合言葉：『母分散未知・小標本の平均は t分布（自由度n−1）』。"}, {"id": 69, "domain": "推定", "difficulty": "基礎", "type": "single", "q": "母平均を1つの値で推定（点推定）するとき、最も標準的に用いる推定量はどれか。", "options": ["標本平均", "標本の最大値", "標本の中央値", "標本の範囲"], "answer": [0], "explanation": "点推定とは、母数（母平均など）を1つの数値でズバリ当てること。<br>母平均は標本平均で推定します。理由は標本平均が“不偏推定量”だから——平均すると母平均にぴったり当たり、系統的なズレ（かたより）がないからです。<br>補足：母分散は不偏分散（n−1で割る）、母比率は標本比率で推定。中央値や範囲は母平均の推定には使いません。<br>合言葉：『母平均の点推定は標本平均（かたよりなし）』。"}, {"id": 70, "domain": "推定", "difficulty": "標準", "type": "single", "q": "母標準偏差 $\\sigma=10$ が既知の母集団から $n=25$ の標本をとり、標本平均が $\\bar{x}=50$ だった。母平均 $\\mu$ の95%信頼区間として最も近いものはどれか（$z_{0.025}=1.96$）。", "options": ["[48.0, 52.0]", "[46.1, 53.9]", "[30.4, 69.6]", "[49.6, 50.4]"], "answer": [1], "explanation": "母分散が分かっているときの母平均の信頼区間は「標本平均 ± 1.96×標準誤差」。<br>①標準誤差＝σ÷√n＝10÷√25＝10÷5＝2。②誤差の幅＝1.96×2＝3.92。③区間＝50±3.92＝[46.1, 53.9]。<br>意味：この作り方なら95%の確率で母平均を捕まえられる。<br>よくある誤り：σをそのまま使って 50±1.96×10 とする。割って“標準誤差”にするのが正解。<br>合言葉：『区間＝標本平均 ± 1.96×(σ÷√n)』。"}, {"id": 71, "domain": "推定", "difficulty": "標準", "type": "single", "q": "母平均の信頼区間について、標本サイズ $n$ を大きくしたとき（他は同じ）、区間の幅はどうなるか。", "options": ["狭くなる", "広くなる", "変わらない", "n に依存しない"], "answer": [0], "explanation": "信頼区間の幅は 2×1.96×(σ÷√n) で決まります。nは分母の√nにあるので、nを大きくすると幅は狭くなります。<br>直感：たくさん測るほど標本平均が安定し、母平均のありかを狭く絞れる＝精度が上がる。<br>関連：信頼水準を上げる(95→99)と幅は広がり、σが大きいと幅も広がる。<br>合言葉：『nを増やすと区間は狭くなる（精度UP）』。"}, {"id": 72, "domain": "推定", "difficulty": "標準", "type": "single", "q": "「母平均の95%信頼区間が [46, 54] だった」の解釈として最も適切なものはどれか。", "options": ["同じ方法で標本抽出と区間作成を繰り返すと、作られる区間の約95%が母平均を含む", "母平均が46〜54の範囲にある確率が95%である", "標本の95%がこの区間に入る", "次に取るデータの95%がこの区間に入る"], "answer": [0], "explanation": "信頼区間の意味は誤解しやすいので丁寧に。母平均は“決まっている未知の数”で、確率変数ではありません。ランダムなのは標本（から作る区間）のほうです。<br>正しい解釈：「同じ手順で標本を取って区間を作るのを繰り返すと、できる区間の約95%が母平均を含む」。つまり“作り方の的中率”。<br>誤り：「母平均がこの区間に入る確率95%」と、母平均を確率変数のように扱うのは不適切。<br>合言葉：『95%は“区間の作り方の的中率”、目の前の1本の確率ではない』。"}, {"id": 73, "domain": "推定", "difficulty": "応用", "type": "single", "q": "母標準偏差 $\\sigma=10$。母平均を95%信頼区間で推定し、その限界誤差（区間の半分の幅）を2以下にしたい。必要な最小の標本サイズ $n$ はいくらか（$z_{0.025}=1.96$）。", "options": ["25", "49", "97", "385"], "answer": [2], "explanation": "限界誤差（区間の半分の幅）E＝1.96×(σ÷√n) を E≤2 にするnを求めます。<br>①式を変形：n≥(1.96×σ÷E)²。②代入：n≥(1.96×10÷2)²＝(19.6÷2)²＝9.8²＝96.04。③標本は整数で不等式を満たす必要があるので切り上げて n＝97。<br>注意：必要標本数は必ず“切り上げ”。96では誤差がわずかに2を超えます。<br>合言葉：『必要数 n＝(1.96σ÷E)²、切り上げ』。"}, {"id": 74, "domain": "推定", "difficulty": "応用", "type": "single", "q": "ある調査で100人中40人が「はい」と答えた（標本比率 $\\hat{p}=0.40$）。母比率の95%信頼区間の限界誤差（区間の半分の幅）に最も近いものはどれか（$z_{0.025}=1.96$）。", "options": ["約0.05", "約0.10", "約0.24", "約0.49"], "answer": [1], "explanation": "母比率の信頼区間は 標本比率 ± 1.96×√(p̂(1−p̂)÷n)。<br>①標準誤差＝√(0.4×0.6÷100)＝√(0.24÷100)＝√0.0024≈0.049。②限界誤差＝1.96×0.049≈0.096≈0.10。<br>つまり区間はおよそ 0.40±0.10＝[0.30, 0.50]。世論調査の「±◯ポイント」はこの限界誤差のことです。<br>合言葉：『比率の誤差＝1.96×√(p̂(1−p̂)÷n)』。"}, {"id": 75, "domain": "推定", "difficulty": "基礎", "type": "single", "q": "他の条件を同じにして、信頼水準を95%から99%に上げると、信頼区間の幅はどうなるか。", "options": ["広くなる", "狭くなる", "変わらない", "ゼロになる"], "answer": [0], "explanation": "信頼水準を上げる＝“もっと高い確率で母数を捕まえたい”ということ。確実に捕まえるには網を大きくする必要があるので、区間は広くなります。<br>数式では、幅は 2×z×標準誤差 で、95%なら z=1.96、99%なら z≈2.58 と大きくなるため幅も広がる。<br>トレードオフ：確実さ（信頼水準）と狭さ（精度）は両立しにくい。狭くて確実にしたいなら n を増やすしかない。<br>合言葉：『信頼水準を上げると区間は広がる』。"}, {"id": 76, "domain": "推定", "difficulty": "標準", "type": "single", "q": "不偏推定量についての説明として正しいものはどれか。", "options": ["推定量の期待値が、推定したい母数に等しいこと", "推定量の分散が最小であること", "標本サイズが大きいほど真値に近づくこと", "必ず母数とぴったり一致すること"], "answer": [0], "explanation": "不偏性とは「推定量の“期待値”＝母数」が成り立つこと。つまり何度も推定を繰り返すと、平均的には的の中心（母数）に当たり、系統的なズレ（バイアス）がない、ということ。<br>例：標本平均は E[標本平均]=μ なので母平均の不偏推定量。分散は n−1 で割る不偏分散にすると母分散の不偏推定量。<br>注意：不偏は“平均的に当たる”であって“毎回ぴったり当たる”ではありません。<br>合言葉：『不偏＝期待値が母数（平均すると当たる）』。"}, {"id": 77, "domain": "仮説検定", "difficulty": "基礎", "type": "single", "q": "仮説検定における帰無仮説 $H_0$ と対立仮説 $H_1$ の関係として、最も適切な記述はどれか。", "options": ["帰無仮説は『差がない・効果がない』とする仮説で、検定で否定（棄却）できるか調べる対象である", "帰無仮説は『差がある』とする仮説である", "対立仮説はデータに関わらず常に正しい", "帰無仮説と対立仮説は同時に成り立つ"], "answer": [0], "explanation": "仮説検定の枠組み。帰無仮説 H0 は「差がない・効果がない・偶然の範囲」という、否定したい側の主張。対立仮説 H1 は「差がある・効果がある」という、本当は示したい主張です。<br>論理は背理法に近い：まずH0が正しいと仮定し、その下で観測データが“めったに起きないほど極端”なら、H0が間違っていたとして棄却し、H1を採用します。等号を含む側がH0。<br>合言葉：『H0＝差がない（否定したい側）。極端なら棄却』。"}, {"id": 78, "domain": "仮説検定", "difficulty": "標準", "type": "single", "q": "有意水準 $\\alpha=0.05$ の意味として最も適切なものはどれか。", "options": ["帰無仮説が正しいのに誤って棄却してしまう確率（第一種の過誤）を5%に抑える基準", "対立仮説が正しい確率が5%という意味", "帰無仮説が正しい確率が5%という意味", "検定が必ず正しくなる確率が95%という意味"], "answer": [0], "explanation": "有意水準αは「H0が本当は正しいのに、誤って棄却してしまう確率の上限」。これを第一種の過誤といいます。α=0.05 は“そのミスを5%まで許す”という事前に決める基準。<br>誤解の排除：αは「仮説が正しい確率」ではありません。仮説（母数）は確率変数ではなく、αは“判定手続きが起こすミスの率”です。<br>合言葉：『α＝正しいH0を誤って棄却する確率（第一種）』。"}, {"id": 79, "domain": "仮説検定", "difficulty": "標準", "type": "single", "q": "p値の意味として最も適切なものはどれか。", "options": ["帰無仮説が正しいと仮定したとき、観測された結果以上に極端な結果が得られる確率", "帰無仮説が正しい確率", "対立仮説が正しい確率", "検定を間違える確率"], "answer": [0], "explanation": "p値は「H0が正しいと仮定した世界で、いま観測したのと同じかそれ以上に極端なデータが出る確率」。<br>判断ルール：p値が有意水準αより小さければ（p<α）、“H0の下ではめったに起きないことが起きた＝H0が疑わしい”として棄却します。<br>重要な誤解：p値は「H0が正しい確率」ではありません。あくまで“H0を仮定したときのデータの珍しさ”を測る数字です。<br>合言葉：『p値＝H0を仮定したときの“データの珍しさ”。p<αで棄却』。"}, {"id": 80, "domain": "仮説検定", "difficulty": "標準", "type": "single", "q": "「新しい方法は従来より平均値を増加させる」と主張したい。このとき適切な検定はどれか。", "options": ["右側の片側検定", "左側の片側検定", "両側検定", "検定は不要"], "answer": [0], "explanation": "片側か両側かは“対立仮説の向き”で決まります。今回は「増加させる（μ>μ0）」という一方向の主張なので、大きい側だけを棄却域にする右側片側検定が適切。<br>使い分け：「変化する（大小どちらでも）」なら両側、「増える」なら右側、「減る」なら左側。<br>注意：データを見てから片側に変えるのは不正。向きは事前に決めます。<br>合言葉：『増えると主張＝右側片側検定』。"}, {"id": 81, "domain": "仮説検定", "difficulty": "応用", "type": "single", "q": "母標準偏差 $\\sigma=10$ が既知。$H_0:\\mu=50$ を検定する。$n=25$ の標本で標本平均 $\\bar{x}=53$ を得たとき、検定統計量 $z$ はいくらか。", "options": ["0.3", "1.5", "3.0", "7.5"], "answer": [1], "explanation": "母分散既知の母平均の検定統計量は z＝(標本平均−μ0)÷(σ÷√n)。これは“標本平均がH0の値から標準誤差いくつ分ずれているか”。<br>①標準誤差＝10÷√25＝10÷5＝2。②z＝(53−50)÷2＝3÷2＝1.5。<br>つまり観測平均はH0より標準誤差1.5個分上。次にこれが棄却するほど極端かを判定します。<br>よくある誤り：分母にσ=10をそのまま使う。割るのは標準誤差(σ÷√n)=2。<br>合言葉：『z＝(標本平均−μ0)÷(σ÷√n)』。"}, {"id": 82, "domain": "仮説検定", "difficulty": "応用", "type": "single", "q": "前問の続き。両側検定・有意水準5%（棄却域は $|z|>1.96$）で、検定統計量が $z=1.5$ だった。結論として正しいものはどれか。", "options": ["帰無仮説は棄却できない（有意でない）", "帰無仮説を棄却する（有意である）", "対立仮説を証明できた", "母平均は必ず50である"], "answer": [0], "explanation": "判定は“検定統計量が棄却域に入るか”。両側5%の棄却域は |z|>1.96。<br>今回 |z|=1.5 で、1.96を超えていない（棄却域の外）。だから帰無仮説は棄却できません。<br>言い回しに注意：このとき「H0を採択した／母平均は50だと証明された」とは言いません。正しくは「H0を棄却するだけの証拠がなかった（有意でない）」。差がないと示したのではなく“差があるとは言えなかった”だけ。<br>図：両側のしっぽ（±1.96の外）が棄却域。z=1.5は中央寄りで“よくある範囲”。<br>合言葉：『|z|が1.96を超えなければ棄却できない』。", "figure": {"type": "normal", "mean": 0, "sd": 1, "tails": [-1.96, 1.96], "marks": [1.5], "xlabel": "Z（棄却域は両裾）"}}, {"id": 83, "domain": "仮説検定", "difficulty": "標準", "type": "single", "q": "第一種の過誤と第二種の過誤の説明の組として正しいものはどれか。", "options": ["第一種：正しい $H_0$ を誤って棄却／第二種：誤った $H_0$ を棄却できない", "第一種：誤った $H_0$ を棄却できない／第二種：正しい $H_0$ を誤って棄却", "第一種：対立仮説を棄却／第二種：帰無仮説を採択", "どちらも同じ意味である"], "answer": [0], "explanation": "2種類の誤りを混同しないよう、対応で覚えます。<br>第一種の過誤（α）：本当はH0が正しいのに棄却＝「ない差を“ある”と誤判定」（あわてんぼう）。<br>第二種の過誤（β）：本当はH0が誤り（差がある）なのに棄却できない＝「ある差を“ない”と見逃す」（ぼんやり）。<br>関係：αを小さくすると第一種は減るがβは増えやすい。1−βを“検出力”といい、差を正しく見つける力。nを増やすと両方を改善できる。<br>合言葉：『第一種＝ないのにある、第二種＝あるのに見逃す』。"}, {"id": 84, "domain": "仮説検定", "difficulty": "標準", "type": "single", "q": "検定の結果『帰無仮説を棄却できなかった』とき、最も適切な解釈はどれか。", "options": ["差がある（効果がある）とは言えなかった、というだけである", "差がないことが証明された", "帰無仮説が正しいと確定した", "対立仮説が正しいと確定した"], "answer": [0], "explanation": "仮説検定は“非対称”な論理です。棄却できたときは「差があると言える」と積極的に主張できますが、棄却できなかったときは「差があるとは言えなかった」に留まります。<br>「棄却できない＝差がないことの証明」ではありません。証拠が足りなかっただけで、本当は差があるのに標本が小さくて見つけられなかった（第二種の過誤）かもしれない。<br>たとえ：“無罪”は“潔白の証明”ではなく“有罪の証拠不十分”。<br>合言葉：『棄却できない＝「差があるとは言えない」だけ』。"}, {"id": 85, "domain": "仮説検定", "difficulty": "応用", "type": "single", "q": "クロス集計表（行数 $r$、列数 $c$）で、2つのカテゴリ変数が独立かどうかを調べるカイ二乗独立性検定の自由度はいくらか。", "options": ["$rc$", "$(r-1)(c-1)$", "$r+c-1$", "$n-1$"], "answer": [1], "explanation": "カイ二乗独立性検定では、各マスの観測度数Oと、独立を仮定したときの期待度数Eのズレを χ²＝Σ(O−E)²÷E で測ります。<br>自由度は (行数−1)×(列数−1)。理由：行合計・列合計を固定すると、各行・各列で最後の1マスは差し引きで決まり自由に動けないから。<br>例：2×2表なら自由度 (2−1)(2−1)=1。<br>合言葉：『独立性の自由度＝(行−1)×(列−1)』。"}, {"id": 86, "domain": "仮説検定", "difficulty": "応用", "type": "single", "q": "母比率の検定を行う。$H_0:p=0.5$ のもとで $n=100$、標本比率 $\\hat{p}=0.6$ を得た。検定統計量 $z$ はいくらか（$H_0$ の比率で標準誤差を計算する）。", "options": ["1.0", "2.0", "6.0", "0.6"], "answer": [1], "explanation": "母比率の検定統計量は z＝(標本比率−p0)÷√(p0(1−p0)÷n)。標準誤差は“帰無仮説の比率 p0”で計算します（検定はH0が正しい世界で考えるため）。<br>①標準誤差＝√(0.5×0.5÷100)＝√(0.25÷100)＝√0.0025＝0.05。②z＝(0.6−0.5)÷0.05＝0.1÷0.05＝2.0。<br>判定：両側5%なら |z|>1.96 で棄却。2.0>1.96 なので有意（H0:p=0.5 を棄却）。<br>注意：信頼区間は標準誤差にp̂を使うが、検定はp0を使う。<br>合言葉：『比率の検定の標準誤差は p0 で計算』。"}, {"id": 87, "domain": "推定", "difficulty": "標準", "type": "single", "q": "母平均 $\\mu$ の95%信頼区間 $\\bar{x}\\pm z\\cdot\\dfrac{\\sigma}{\\sqrt{n}}$ を構成する3つの要素のうち、区間を『狭く』する方向に働くものはどれか。", "options": ["標本サイズ $n$ を大きくする", "信頼水準を高くする", "母標準偏差 $\\sigma$ が大きい", "$z$ の値を大きくする"], "answer": [0], "explanation": "区間の半分の幅は z×(σ÷√n)。各要素の効き方を確認します。<br>・nを大きくする → 分母√nが増えて幅は狭くなる（精度UP）。○<br>・信頼水準を高くする → zが大きくなり幅は広がる。×<br>・σが大きい → 分子が増えて幅は広がる。×<br>σは母集団の性質で普通は変えられず、信頼水準は要求仕様。だから実務で精度を上げる手段は基本“nを増やす”ことです。<br>合言葉：『区間を狭くできるのは n を増やすこと』。"}, {"id": 88, "domain": "標本分布", "difficulty": "応用", "type": "single", "q": "母平均50・母標準偏差10の母集団から $n=100$ の標本をとる。標本平均 $\\bar{X}$ が53以上になる確率に最も近いものはどれか（中心極限定理を用いる）。", "options": ["約0.0013", "約0.023", "約0.16", "約0.38"], "answer": [0], "explanation": "個々のデータではなく“標本平均の分布”で考えます。CLTより X̄ は正規分布に近く、期待値50、標準誤差 σ/√n=10÷√100=10÷10=1。<br>①標準化：z=(53−50)÷1=3。②P(X̄≥53)=P(Z≥3)≈0.0013。<br>標本平均が53以上になるのは約0.13%とごくまれ。個々のデータが53以上の確率（z=(53−50)÷10=0.3で約38%）とは全く違います。割るのは σ/√n=1。<br>合言葉：『平均の分布は標準誤差(σ/√n)で標準化』。"}, {"id": 89, "domain": "仮説検定", "difficulty": "基礎", "type": "single", "q": "両側検定・有意水準5%のとき、標準正規分布を用いた検定での棄却域として正しいものはどれか。", "options": ["$|z|>1.96$", "$z>1.64$", "$|z|>2.58$", "$z>1.96$（右側のみ）"], "answer": [0], "explanation": "両側検定では、有意水準 $\\alpha=0.05$ を両側の裾に半分ずつ（各2.5%）振り分ける。標準正規分布で上側2.5%点が $1.96$ なので、棄却域は $z<-1.96$ または $z>1.96$、まとめて $|z|>1.96$。<br>比較して覚える：片側5%なら $z>1.64$（上側5%点）。両側1%なら $|z|>2.58$。右側だけの $z>1.96$ は片側2.5%に当たり、両側5%とは意味が違う。<br>頻出の対応：両側5%↔1.96、片側5%↔1.64、両側1%↔2.58。この3組を暗記しておくと検定・区間推定が速い。"}, {"id": 90, "domain": "1変数データ", "difficulty": "標準", "type": "single", "q": "次の6個のデータの中央値はいくらか。 $\\{12,\\ 15,\\ 18,\\ 20,\\ 22,\\ 30\\}$", "options": ["18", "19", "20", "21"], "answer": [1], "explanation": "①小さい順に並べる：12,15,18,20,22,30。②6個（偶数）なので、真ん中2つ（3番目18と4番目20）の平均：(18+20)÷2＝19。<br>奇数個なら真ん中の1つ、偶数個なら真ん中2つの平均、と覚えます。<br>よくある誤り：18や20をそのまま選ぶ。偶数個は“2つの平均”を忘れない。<br>合言葉：『偶数個の中央値は、真ん中2つの平均』。"}, {"id": 91, "domain": "2変数データ", "difficulty": "応用", "type": "single", "q": "3組のデータ $(x,y)=(1,3),(2,5),(3,4)$ について、相関係数 $r$ はいくらか。", "options": ["0.25", "0.5", "0.71", "0.87"], "answer": [1], "explanation": "定義 r＝Sxy÷√(Sxx×Syy) を、偏差から計算します。<br>①平均：xの平均＝(1+2+3)÷3＝2、yの平均＝(3+5+4)÷3＝4。②偏差：xは−1,0,1、yは−1,1,0。③偏差積和 Sxy＝(−1)(−1)+(0)(1)+(1)(0)＝1。④Sxx＝1+0+1＝2、Syy＝1+1+0＝2。⑤r＝1÷√(2×2)＝1÷2＝0.5。<br>手順は「平均→偏差→積和と平方和→公式」。偏差を出すところが計算の要です。<br>合言葉：『まず偏差、次に積和、最後に公式』。"}, {"id": 92, "domain": "確率", "difficulty": "標準", "type": "single", "q": "成功確率 $0.5$ の独立な試行を3回行う。少なくとも1回成功する確率はいくらか。", "options": ["$\\frac{1}{8}$", "$\\frac{3}{8}$", "$\\frac{1}{2}$", "$\\frac{7}{8}$"], "answer": [3], "explanation": "「少なくとも1回成功」は余事象（全部失敗）で考えます。<br>①3回とも失敗：各回の失敗0.5、独立なので 0.5³＝1/8。②少なくとも1回成功＝1−1/8＝7/8。<br>「ちょうど1回＋2回＋3回」を足すより、1−(全部ダメ)が速い。<br>合言葉：『「少なくとも1つ」は 1−(全部ダメ)』。"}, {"id": 93, "domain": "確率", "difficulty": "応用", "type": "single", "q": "ある製品は工場Aが60%、工場Bが40%を製造する。不良率はAが2%、Bが5%。取り出した1個が不良品だったとき、それが工場Aの製品である確率に最も近いものはどれか。", "options": ["約0.024", "約0.38", "約0.50", "約0.60"], "answer": [1], "explanation": "ベイズの問題。求めるのは「不良品だったとき工場Aの確率」。<br>①各工場から不良が出る確率：A＝0.6×0.02＝0.012、B＝0.4×0.05＝0.020。②不良全体＝0.012+0.020＝0.032。③A由来の割合＝0.012÷0.032＝0.375≈0.38。<br>Aは生産量が多い（60%）けれど不良率が低いので、不良品のうちAの割合は60%より下がって約38%になります。<br>合言葉：『分子＝注目の経路、分母＝全部の経路の和』。"}, {"id": 94, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "二項分布 $B(4,\\ 0.5)$ に従う $X$ について、$P(X\\ge 1)$ はいくらか。", "options": ["$\\frac{1}{16}$", "$\\frac{4}{16}$", "$\\frac{12}{16}$", "$\\frac{15}{16}$"], "answer": [3], "explanation": "P(X≥1) は余事象 P(X=0) を使うと速い。<br>①P(X=0)=C(4,0)×0.5⁰×0.5⁴=1×1×(1/16)=1/16。②P(X≥1)=1−1/16=15/16。<br>「1回以上」「少なくとも1つ」は二項でも 1−P(0) が定番。1個ずつ足すのは遠回り。<br>合言葉：『「少なくとも1つ」は 1−P(0)』。"}, {"id": 95, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "$X\\sim N(50,\\ 10^2)$ のとき、$P(X>70)$ に最も近いものはどれか。", "options": ["約0.0228", "約0.05", "約0.16", "約0.84"], "answer": [0], "explanation": "標準化します：z=(70−50)÷10=2。求めるのは P(X>70)=P(Z>2)≈0.0228（約2.3%）。<br>確認：68−95−99.7ルールで μ±2σ（=30〜70）に約95%が入り、残り5%が両裾に均等。片側（70より上）は約2.5%。図でも右裾のごく狭い部分とわかります。<br>合言葉：『±2σの外は片側約2.5%』。", "figure": {"type": "normal", "mean": 50, "sd": 10, "shadeFrom": 70, "marks": [70], "xlabel": "X"}}, {"id": 96, "domain": "標本分布", "difficulty": "標準", "type": "single", "q": "母比率が $p=0.5$ の母集団から $n=100$ の標本をとる。標本比率 $\\hat{p}$ の標準誤差はいくらか。", "options": ["0.05", "0.005", "0.25", "0.5"], "answer": [0], "explanation": "標本比率の標準誤差は √(p(1−p)÷n)。<br>①p(1−p)=0.5×0.5=0.25。②0.25÷100=0.0025。③√0.0025=0.05。<br>意味：100人調査では標本比率が真の比率から0.05（5ポイント）ほどばらつく。p=0.5のとき p(1−p) は最大になり、標準誤差・必要標本数も最大（最も保守的）。<br>合言葉：『比率の標準誤差＝√(p(1−p)÷n)』。"}, {"id": 97, "domain": "標本分布", "difficulty": "応用", "type": "single", "q": "母平均100・母標準偏差15の母集団から $n=25$ の標本をとる。標本平均 $\\bar{X}$ が106を超える確率に最も近いものはどれか。", "options": ["約0.0228", "約0.16", "約0.34", "約0.40"], "answer": [0], "explanation": "標本平均の分布で考えます。CLTより X̄ は正規分布に近く、期待値100、標準誤差 σ/√n=15÷√25=15÷5=3。<br>①標準化：z=(106−100)÷3=6÷3=2。②P(X̄>106)=P(Z>2)≈0.0228。<br>個々のデータで考えると z=(106−100)÷15=0.4で約34%になってしまうが、ここは“平均”の分布なので標準誤差3を使う。√nを忘れると大きく外します。<br>合言葉：『平均の確率は標準誤差(σ/√n)で標準化』。"}, {"id": 98, "domain": "推定", "difficulty": "標準", "type": "single", "q": "母標準偏差 $\\sigma=15$ が既知。$n=25$、標本平均 $\\bar{x}=100$ のとき、母平均の99%信頼区間に最も近いものはどれか（$z_{0.005}=2.58$）。", "options": ["[94.1, 105.9]", "[92.3, 107.7]", "[97.0, 103.0]", "[85.0, 115.0]"], "answer": [1], "explanation": "母分散既知の母平均の信頼区間 標本平均 ± z×(σ÷√n)。99%なので z＝2.58。<br>①標準誤差＝15÷√25＝15÷5＝3。②限界誤差＝2.58×3＝7.74。③区間＝100±7.74＝[92.3, 107.7]。<br>比較：95%なら z=1.96 で 1.96×3＝5.88 → [94.1, 105.9]。信頼水準を上げると幅が広がるのが選択肢の違いで分かります。<br>合言葉：『99%は z＝2.58（95%より広い）』。"}, {"id": 99, "domain": "推定", "difficulty": "応用", "type": "single", "q": "母比率を95%信頼区間で推定し、限界誤差を0.05以下にしたい。母比率の見当がつかないとき、必要な最小の標本サイズ $n$ はいくらか（$z=1.96$、最も保守的に見積もる）。", "options": ["97", "271", "385", "1068"], "answer": [2], "explanation": "母比率の限界誤差 E＝1.96×√(p(1−p)÷n) を E≤0.05 にするnを求めます。<br>①見当がつかないときは p(1−p) が最大の p=0.5 を使う（最も保守的＝必要数が最大）。p(1−p)=0.25。②n≥(1.96²×0.25)÷0.05²＝(3.8416×0.25)÷0.0025＝0.9604÷0.0025＝384.16。③切り上げて n＝385。<br>世論調査の「±5%なら約400人」の根拠。p=0.5 を使うのは“最悪でも足りる”安全設計だから。<br>合言葉：『比率の必要数は p=0.5 で最大、±5%≈385人』。"}, {"id": 100, "domain": "仮説検定", "difficulty": "標準", "type": "single", "q": "ある検定で p値が $0.03$ だった。有意水準 $\\alpha=0.05$ のとき、結論はどれか。", "options": ["帰無仮説を棄却する（有意である）", "帰無仮説を棄却できない", "対立仮説を棄却する", "判定できない"], "answer": [0], "explanation": "判定はシンプル：「p値 < 有意水準α なら棄却」。<br>今回 p=0.03 < α=0.05 なので帰無仮説を棄却＝統計的に有意。<br>意味：「H0が正しいと仮定すると、観測したような結果は3%しか起こらない。設定した5%より珍しいので、H0を疑わしいと判断する」。<br>注意：有意でも“効果が大きい”という意味ではない（“偶然とは考えにくい”だけ）。効果の大きさは推定値や信頼区間で別に見ます。<br>合言葉：『p<αなら棄却（有意）』。"}, {"id": 101, "domain": "仮説検定", "difficulty": "応用", "type": "single", "q": "母標準偏差 $\\sigma=10$ 既知。$H_0:\\mu=100$、$H_1:\\mu>100$（右側検定）。$n=25$、$\\bar{x}=104$ を得た。有意水準5%（棄却域 $z>1.64$）での結論はどれか。", "options": ["帰無仮説を棄却する（有意である）", "帰無仮説を棄却できない", "両側検定なので棄却できない", "標本が小さすぎて判定不能"], "answer": [0], "explanation": "片側（右側）検定の手順。<br>①検定統計量：標準誤差＝10÷5＝2、z＝(104−100)÷2＝4÷2＝2.0。②棄却域：右側5%は z>1.64。2.0>1.64 なので棄却域に入る。③結論：帰無仮説を棄却＝「平均は100より大きい」と言える（有意）。<br>補足：両側5%(|z|>1.96)でも 2.0>1.96 で棄却される。片側は境界(1.64)が緩いぶん有意になりやすい。<br>合言葉：『右側5%の棄却域は z>1.64』。"}, {"id": 102, "domain": "回帰分析", "difficulty": "標準", "type": "single", "q": "単回帰における『残差』の定義として正しいものはどれか。", "options": ["観測値 $y$ から予測値 $\\hat{y}$ を引いた値（$y-\\hat{y}$）", "予測値 $\\hat{y}$ から平均 $\\bar{y}$ を引いた値", "$x$ の偏差", "相関係数の2乗"], "answer": [0], "explanation": "残差とは“実際の観測値が、回帰直線の予測からどれだけ外れたか”を表す縦方向のズレ。定義は 残差＝観測値 y − 予測値 ŷ。<br>最小二乗法は、この残差の2乗の合計が最小になるように直線を引く方法です。<br>区別：ŷ−(yの平均) は“回帰で説明された部分”で残差とは別。全体のズレ＝説明された部分＋残差、と分解でき、これが決定係数の基礎になります。<br>合言葉：『残差＝観測値−予測値（y−ŷ）』。"}, {"id": 103, "domain": "回帰分析", "difficulty": "応用", "type": "single", "q": "回帰直線が $\\hat{y}=2+2x$ であるとき、$x=4$ での観測値が $y=12$ だった。この点の残差はいくらか。", "options": ["+2", "-2", "10", "12"], "answer": [0], "explanation": "残差は“観測値−予測値”。<br>①予測値：ŷ＝2+2×4＝2+8＝10。②残差＝12−10＝+2。<br>残差が正なので、この点は回帰直線より上にあります（予測より実際が2だけ大きい）。<br>符号の意味：正なら直線の上、負なら下。最小二乗回帰では残差の合計は必ず0（上下のズレが釣り合う）。<br>合言葉：『残差＝観測−予測。正なら直線の上』。"}, {"id": 104, "domain": "回帰分析", "difficulty": "標準", "type": "single", "q": "ある単回帰で決定係数が $R^2=0.64$ だった。最も適切な解釈はどれか。", "options": ["$y$ の全変動の64%が回帰（$x$）で説明できる", "予測が64%の確率で当たる", "データの64%が回帰直線上にある", "相関係数が0.64である"], "answer": [0], "explanation": "決定係数 R² は“yの全変動のうち、回帰直線で説明できる割合”。R²=0.64 は64%を説明でき、残り36%は説明できない（誤差）という意味。<br>式：R²＝1−(残差変動÷全変動)＝(説明された変動÷全変動)。<br>誤解の排除：「当たる確率」「直線上の点の割合」ではありません。単回帰では R²=r² なので、相関係数は r=±√0.64=±0.8 で、0.64ではありません。<br>合言葉：『R²＝説明できた割合（0〜1）』。"}, {"id": 105, "domain": "回帰分析", "difficulty": "標準", "type": "single", "q": "気温 $x$（℃）から売上 $y$（千円）を予測する回帰式が $\\hat{y}=50+3x$ だった。傾き3の解釈として正しいものはどれか。", "options": ["気温が1℃上がると、売上は平均して3千円増えると予測される", "気温が3℃のとき売上は50千円", "売上が1千円増えると気温が3℃上がる", "気温と売上の相関係数が3である"], "answer": [0], "explanation": "回帰式 ŷ＝a+bx の傾きbは“xが1単位増えたときに ŷ が平均でどれだけ変わるか”。<br>ここでは b=3、xの単位は℃、yの単位は千円なので「気温1℃上昇につき売上は平均3千円増える」と読みます。単位をつけて解釈するのがコツ。<br>切片50は x=0（気温0℃）のときの予測売上。<br>注意：xとyを逆にしない（回帰はyをxで説明する向き）。相関係数とも別物。<br>合言葉：『傾き＝xが1増えたときのyの平均変化（単位つきで読む）』。"}, {"id": 106, "domain": "回帰分析", "difficulty": "応用", "type": "single", "q": "データが $x=10\\sim20$ の範囲でしかない回帰式を使って、$x=100$ での $y$ を予測した。この予測について最も適切な注意はどれか。", "options": ["データ範囲外への外挿であり、信頼性は大きく下がる", "回帰式があるので範囲外でも同じ精度で予測できる", "外挿は内挿より常に正確である", "決定係数が高ければ外挿も問題ない"], "answer": [0], "explanation": "観測データのある範囲内での予測を“内挿”、範囲外での予測を“外挿”といいます。<br>回帰式は観測した範囲で成り立つ関係を表すだけで、その外でも同じ直線が続く保証はありません（途中で曲がったり頭打ちになったり）。だから x=100 のような大きく外れた外挿は信頼性が大きく下がります。<br>注意：R²が高くても、それは観測範囲内での当てはまりの良さで、範囲外の予測の正しさは保証しません。<br>合言葉：『外挿（範囲外の予測）は信頼性が下がる』。"}, {"id": 107, "domain": "回帰分析", "difficulty": "応用", "type": "single", "q": "回帰分析の後、横軸に予測値・縦軸に残差をとった残差プロットを描いたところ、はっきりした曲線（U字）状のパターンが見えた。最も適切な解釈はどれか。", "options": ["直線回帰が不適切で、非線形な関係を考えるべきサイン", "当てはまりが完璧であることを示す", "残差が大きいので相関係数が1に近い", "外れ値が存在しないことを示す"], "answer": [0], "explanation": "残差プロットは、回帰モデルが適切かを診断する図。理想は“残差が0の周りにランダムに散らばり、パターンがない”状態。<br>U字や曲線などの体系的なパターンが見えたら、データの関係が直線ではなく曲線（非線形）の可能性が高い。直線回帰では捉えきれていないサインなので、変数変換や多項式回帰などを検討します。<br>合言葉：『残差にパターン＝直線モデルが不適切のサイン』。"}, {"id": 108, "domain": "回帰分析", "difficulty": "応用", "type": "single", "q": "全変動 $\\mathrm{SST}=100$、残差変動 $\\mathrm{SSE}=36$ のとき、決定係数 $R^2$ はいくらか。", "options": ["0.36", "0.64", "0.6", "1.39"], "answer": [1], "explanation": "決定係数は“説明できた割合”で、R²＝1−(残差変動SSE ÷ 全変動SST)。<br>①残差の割合＝36÷100＝0.36（説明できなかった割合）。②R²＝1−0.36＝0.64。<br>変動の分解：全変動SST＝回帰で説明された変動SSR＋残差変動SSE。ここではSSR＝100−36＝64なので R²＝64÷100＝0.64 としても同じ。残差が小さいほどR²は1に近づく。<br>合言葉：『R²＝1−(SSE÷SST)』。"}, {"id": 109, "domain": "回帰分析", "difficulty": "標準", "type": "single", "q": "単回帰において、回帰係数（傾き）$b$ と相関係数 $r$ の符号の関係として正しいものはどれか。", "options": ["常に同じ符号になる", "常に逆の符号になる", "無関係である", "$b$ は常に正である"], "answer": [0], "explanation": "単回帰の傾きは b＝r×(yの標準偏差÷xの標準偏差)。標準偏差は必ず正なので、bの符号は相関係数rの符号だけで決まります。<br>だからbとrは常に同じ符号：正の相関なら右上がり(b>0)、負の相関なら右下がり(b<0)。<br>共分散の符号とも一致（r・b・共分散はすべて同符号）。大きさは違っても向き（符号）はそろう。<br>合言葉：『傾きbと相関rは必ず同じ符号』。"}, {"id": 110, "domain": "分散分析", "difficulty": "標準", "type": "single", "q": "一元配置分散分析（一元配置ANOVA）の主な目的はどれか。", "options": ["3つ以上の群の母平均がすべて等しいかどうかを同時に検定する", "2変数の相関を調べる", "1つの母平均を区間推定する", "データの正規性を検定する"], "answer": [0], "explanation": "分散分析（ANOVA）は、3つ以上のグループの母平均に差があるかを、一度の検定でまとめて調べる手法。<br>帰無仮説は「すべての群の母平均が等しい（μ1=μ2=…）」、対立仮説は「少なくとも1つの群が他と異なる」。<br>名前は“分散”分析ですが、目的は“平均”の差の検定です（群間と群内のばらつきを比べて判断）。相関や正規性検定とは別。<br>合言葉：『ANOVA＝3群以上の平均差をまとめて検定』。"}, {"id": 111, "domain": "分散分析", "difficulty": "標準", "type": "single", "q": "3群の平均を比べるのに、2群ずつのt検定を3回繰り返すのが望ましくない主な理由はどれか。", "options": ["検定を繰り返すと、全体として第一種の過誤（偶然有意になる）確率が増えてしまうから", "t検定は平均の比較に使えないから", "標本サイズが必ず不足するから", "分散が計算できないから"], "answer": [0], "explanation": "各t検定で第一種の過誤を5%に抑えても、検定を何度もくり返すと“どれかが偶然有意になる”確率が積み上がって全体では5%を超えます（多重比較の問題）。<br>例：独立な検定を3回やると、少なくとも1回誤って有意になる確率は 1−0.95³≈0.14 と5%を大きく超える。<br>分散分析は全群を1回の検定でまとめて調べるので、この全体の過誤率を5%に保てます。<br>合言葉：『t検定の繰り返しは過誤が増える→ANOVAでまとめる』。"}, {"id": 112, "domain": "分散分析", "difficulty": "標準", "type": "single", "q": "分散分析で用いるF統計量の基本的な考え方として正しいものはどれか。", "options": ["群間のばらつき（群間分散）を群内のばらつき（群内分散）で割った比", "群内分散を群間分散で割った比", "全データの平均を標準偏差で割った値", "残差の合計"], "answer": [0], "explanation": "F統計量は F＝(群間分散)÷(群内分散)。<br>群間分散は“グループの平均同士がどれだけ離れているか”、群内分散は“各グループ内のばらつき（誤差）”。<br>もし平均に本当に差があれば、群間が群内（誤差）に比べて大きくなり、Fは大きくなる。差がなければF≈1。<br>つまりFは“平均差の大きさを、誤差を基準にして測った比”。Fが十分大きければ帰無仮説を棄却します。<br>合言葉：『F＝群間÷群内（差を誤差で測る）』。"}, {"id": 113, "domain": "分散分析", "difficulty": "応用", "type": "single", "q": "一元配置分散分析で、群間平均平方 $\\mathrm{MSB}=24$、群内平均平方 $\\mathrm{MSW}=6$ であった。F統計量はいくらか。", "options": ["4", "18", "30", "0.25"], "answer": [0], "explanation": "F統計量は平均平方の比：F＝MSB÷MSW＝24÷6＝4。<br>解釈：群間のばらつきが群内（誤差）の4倍ある。これが十分大きい（F分布の臨界値を超える）かで平均差が有意かを判定します。<br>注意：割る向きは“群間÷群内”。逆にすると 6÷24=0.25（選択肢の罠）。分子が群間（説明したいばらつき）、分母が群内（誤差）。<br>合言葉：『F＝MSB÷MSW（群間÷群内）』。"}, {"id": 114, "domain": "分散分析", "difficulty": "応用", "type": "single", "q": "3つの群（各群10人、合計30人）で一元配置分散分析を行う。群間と群内の自由度の組はどれか。", "options": ["群間2・群内27", "群間3・群内30", "群間2・群内28", "群間29・群内2"], "answer": [0], "explanation": "群数 k=3、全体のデータ数 N=30。<br>群間自由度＝k−1＝3−1＝2（群の数−1）。群内自由度＝N−k＝30−3＝27（全体−群の数）。<br>確認：全体の自由度 N−1=29 は 群間2＋群内27 に分かれる（2+27=29）。F検定はこの2つの自由度(2, 27)を持つF分布で臨界値を読みます。<br>合言葉：『群間＝k−1、群内＝N−k』。"}, {"id": 115, "domain": "分散分析", "difficulty": "標準", "type": "single", "q": "一元配置分散分析の帰無仮説と、F値が大きいときの結論として正しい組はどれか。", "options": ["帰無仮説『すべての群の母平均は等しい』。F値が大きいとこれを棄却し『少なくとも1群が異なる』とする", "帰無仮説『すべての群の母分散は等しい』。F値が大きいと分散が等しいといえる", "帰無仮説『群に差がある』。F値が大きいとこれを棄却する", "F値が大きいほど帰無仮説は支持される"], "answer": [0], "explanation": "分散分析の帰無仮説は「すべての群の母平均が等しい（μ1=μ2=…）」、対立仮説は「少なくとも1つの群が他と異なる」。<br>F値が大きい＝群間のばらつきが群内の誤差に比べて大きい＝平均が偶然では説明しにくいほど離れている、ということ。だからF値が臨界値を超えれば帰無仮説を棄却します。<br>注意：分散分析が示すのは「どこかに差がある」までで、「どの群とどの群が違うか」は別途、多重比較（事後検定）で調べます。<br>合言葉：『H0＝全群の平均が等しい。F大→棄却（どこかに差）』。"}, {"id": 116, "domain": "指数・変化率", "difficulty": "応用", "type": "single", "q": "ある投資の価値が2年間で1.44倍になった。1年あたりの平均成長率はいくらか。", "options": ["20%", "22%", "44%", "72%"], "answer": [0], "explanation": "まず言葉から。『1年あたりの平均成長率』とは、毎年同じ割合で増えたと考えたときの1年分の倍率のこと。<br>ここで注意。倍率（かけ算で効く数）の平均は、足して割る平均ではなく『かけて累乗根をとる平均（幾何平均）』を使う。<br>考え方：2年で1.44倍ということは、毎年同じ倍率 $r$ を2回かけて1.44になる、つまり $r\\times r=r^2=1.44$。<br>これを解くと $r=\\sqrt{1.44}=1.2$。倍率1.2＝20%増。<br>確認：1年目 $1\\to1.2$、2年目 $1.2\\to1.2\\times1.2=1.44$。ちゃんと合う。<br>よくある誤り：$44\\%\\div2=22\\%$ と単純に半分にする。かけ算の世界では足し算の平均は使えない。<br>合言葉：『倍率の平均はルート（かけ算→累乗根）』。"}, {"id": 117, "domain": "指数・変化率", "difficulty": "応用", "type": "single", "q": "2品目について、基準年の価格(100,200)・数量(10,5)、比較年の価格(120,260)である。基準年の数量で重みづけするラスパイレス物価指数はいくらか。", "options": ["115", "120", "125", "130"], "answer": [2], "explanation": "ラスパイレス指数とは『買う量は基準年のまま固定して、値段だけ変わったら家計の支払いは何倍になるか』を見る物価の指数。重み（数量）に基準年の値を使うのがポイント。<br>式（基準年価格を $p_0$、比較年価格を $p_1$、基準年数量を $q_0$ とする）：$\\dfrac{\\sum p_1 q_0}{\\sum p_0 q_0}\\times100$。<br>①分子（比較年の値段で、基準年の量を買ったら）：$120\\times10+260\\times5=1200+1300=2500$。<br>②分母（基準年の値段で、基準年の量を買ったら）：$100\\times10+200\\times5=1000+1000=2000$。<br>③割って100倍：$\\dfrac{2500}{2000}\\times100=125$。<br>意味：同じ買い物カゴ（基準年の量）が、値段の変化で1.25倍＝25%高くなった、ということ。<br>合言葉：『ラスパイレスは“昔の買い方”で重みづけ（基準年の数量）』。"}, {"id": 118, "domain": "指数・変化率", "difficulty": "標準", "type": "single", "q": "ラスパイレス指数とパーシェ指数の違いとして正しいものはどれか。", "options": ["ラスパイレスは基準年の数量で、パーシェは比較年の数量で重みづけする", "ラスパイレスは比較年の数量で、パーシェは基準年の数量で重みづけする", "どちらも基準年の数量で重みづけする", "両者は常に同じ値になる"], "answer": [0], "explanation": "どちらも『物価が何倍になったか』を測る指数で、違いは“どの時点の買う量（数量）を重みに使うか”だけ。<br>ラスパイレス：基準年（昔）の数量で固定。データが集めやすく、消費者物価指数などで使われる。<br>パーシェ：比較年（今）の数量で重みづけ。今の買い方を反映するが、毎回その年の数量が必要。<br>覚え方：ラ（La）は前（基準年）、パ（Pa）は今（比較年）…と語呂で区別する人も。両者は普通は少しズレた値になる（同じにはならない）。<br>合言葉：『ラスパイレス＝基準年の量、パーシェ＝比較年の量』。"}, {"id": 119, "domain": "標本調査・実験計画", "difficulty": "基礎", "type": "single", "q": "単純無作為抽出（単純ランダムサンプリング）の説明として正しいものはどれか。", "options": ["母集団のどの個体も等しい確率で選ばれるように、くじ引きのように無作為に選ぶ", "選びやすい人から順に選ぶ", "調査者が代表的だと思う人を選ぶ", "グループに分けてから各グループの平均だけ使う"], "answer": [0], "explanation": "標本調査とは、全部（母集団）を調べる代わりに一部（標本）を調べて全体を推測すること。その『一部の選び方』が結果の信頼性を左右する。<br>単純無作為抽出は、母集団の全員に同じ当選確率を与えてくじ引きのように選ぶ方法。偏り（特定の人ばかり選ばれる）を防げるのが利点。<br>ダメな例：選びやすい人だけ（②）、調査者の主観で代表を選ぶ（③）といった方法は『偏った標本』になり、全体を正しく映さない。<br>合言葉：『無作為＝全員に平等なくじ引き』。これが推測統計の出発点。"}, {"id": 120, "domain": "標本調査・実験計画", "difficulty": "標準", "type": "single", "q": "層化抽出（層別抽出）の主な利点はどれか。", "options": ["あらかじめ似た者どうしのグループ（層）に分け、各層から抽出することで、各層の割合を反映した偏りの少ない標本が得られる", "調査の手間が単純無作為抽出よりいつも少ない", "母集団リストがなくても実施できる", "標本サイズを小さくしても誤差がゼロになる"], "answer": [0], "explanation": "層化抽出は、母集団を性質の似たグループ（層。例：年代別・地域別・男女別）に分け、各層からそれぞれ無作為に抜き出す方法。<br>利点：各層が標本にきちんと含まれるので、特定の層が偶然抜け落ちる事故を防げ、全体の縮図に近い標本になる（推定の精度が上がりやすい）。<br>たとえ：クラス全体の意見を聞くのに、男女の比率を保って両方から選ぶイメージ。男子だけに偏らない。<br>注意：層に分けるには各個体がどの層かの情報が必要。誤差がゼロになるわけではない（④は誤り）。<br>合言葉：『層化＝似た者で組分けして各組から取る→縮図になる』。"}, {"id": 121, "domain": "標本調査・実験計画", "difficulty": "標準", "type": "single", "q": "集落抽出（クラスター抽出）の説明として正しいものはどれか。", "options": ["母集団をいくつかの集団（集落）に分け、いくつかの集落を無作為に選んでその中を全数または多数調べる", "全個体を1人ずつ無作為に選ぶ", "似た者どうしに分けて各グループから少しずつ選ぶ", "調査者が代表を指名する"], "answer": [0], "explanation": "集落（クラスター）抽出は、母集団を地域・学校・班などの『かたまり（集落）』に分け、その集落をいくつか丸ごと無作為に選んで調べる方法。<br>層化との違いが重要：層化は『すべての層から少しずつ』選ぶ（縮図づくり）。集落は『いくつかの集落だけを選び、その中はまとめて』調べる（手間とコスト削減が目的）。<br>たとえ：全国調査で、全市から少し→層化、いくつかの市を選んでその市民を全部→集落。<br>利点と注意：移動・名簿の手間が減るが、選ばれた集落に偏りがあると誤差が大きくなりやすい。<br>合言葉：『集落＝かたまりごと選ぶ（手間減）／層化＝全部の組から取る（縮図）』。"}, {"id": 122, "domain": "標本調査・実験計画", "difficulty": "標準", "type": "multi", "q": "実験計画における「フィッシャーの3原則」に含まれるものをすべて選べ。", "options": ["反復（繰り返し）", "無作為化（ランダム化）", "局所管理（ブロック化）", "標準化（平均0・分散1への変換）"], "answer": [0, 1, 2], "explanation": "実験計画とは『原因と結果を正しく比べるための実験の組み方』。フィッシャーの3原則はその基本ルール。<br>①反復：同じ条件を複数回試す。1回だけだと偶然か本物の効果か分からないため、繰り返して誤差の大きさをつかむ。<br>②無作為化：どの個体にどの処理を割り当てるかをくじ引きで決める。これで未知の要因（交絡）が特定の処理に偏るのを防ぐ。<br>③局所管理（ブロック化）：似た条件のまとまり（ブロック）の中で処理を比べ、邪魔な変動を抑える。<br>『標準化』はデータを平均0・分散1に直す別の操作で、3原則とは無関係（④は誤り）。<br>合言葉：『反復・無作為化・局所管理＝フィッシャーの3点セット』。"}, {"id": 123, "domain": "標本調査・実験計画", "difficulty": "標準", "type": "single", "q": "実験で処理（例：新薬と偽薬）を対象に「無作為に」割り当てる主な理由はどれか。", "options": ["年齢や体質など測っていない要因（交絡）が、特定のグループに偏るのを防ぐため", "計算を簡単にするため", "標本サイズを小さくできるため", "必ず有意差が出るようにするため"], "answer": [0], "explanation": "無作為割り当て（ランダム化）は実験のキモ。なぜ大事かを押さえる。<br>もし新薬グループに若い人ばかり、偽薬グループに高齢者ばかり…と偏ると、効果の差が『薬のおかげ』なのか『年齢のせい』なのか区別できない。この“紛れ込む別の原因”が交絡。<br>くじ引きで割り当てれば、年齢・体質・生活習慣など測っていない要因まで、平均的に両グループへ均等にばらける。だから残った差を『処理の効果』とみなせる。<br>これが、相関ではなく因果を言うために実験（ランダム化比較試験）が強い理由。<br>合言葉：『ランダム化＝隠れた原因を両グループに平等にばらまく』。"}, {"id": 124, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "2つの変数の相関係数が0（無相関）だった。このことから言えるものはどれか。", "options": ["直線的な関係はないが、独立とは限らない（曲線の関係はあり得る）", "2変数は必ず独立である", "2変数には何の関係もない", "必ず因果関係がない"], "answer": [0], "explanation": "ここは間違えやすい超重要ポイント。相関係数が測れるのは『直線的な（まっすぐな）関係』だけ。<br>相関0は『まっすぐな関係がない』という意味であって、『何の関係もない＝独立』という意味ではない。<br>例：放物線 $y=x^2$ で $x$ が $-2,-1,0,1,2$ のとき、$x$ と $y$ ははっきり関係している（$y$ は $x$ で決まる）のに、左右対称なので相関係数は0になる。これは“曲がった関係”だから直線指標では捉えられない。<br>つまり『独立 → 無相関』は正しいが、逆の『無相関 → 独立』は成り立たない。<br>合言葉：『相関0は“まっすぐな関係なし”。独立とは限らない（曲線はあり得る）』。"}, {"id": 125, "domain": "標本分布", "difficulty": "応用", "type": "single", "q": "チェビシェフの不等式によると、どんな分布でも、平均から標準偏差の2倍以上離れる確率は最大でいくらか。", "options": ["0.05", "0.25", "0.32", "0.50"], "answer": [1], "explanation": "チェビシェフの不等式は『分布の形が分からなくても使える、ばらつきの保証』。<br>主張：平均 $\\mu$、標準偏差 $\\sigma$ のどんな分布でも、平均から $k\\sigma$ 以上離れる確率は $\\dfrac{1}{k^2}$ 以下。式で $P(|X-\\mu|\\ge k\\sigma)\\le\\dfrac{1}{k^2}$。<br>今回は $k=2$ なので $\\dfrac{1}{2^2}=\\dfrac{1}{4}=0.25$。つまり平均±2標準偏差の外に出る確率はどんな分布でも最大25%。<br>言いかえると、平均±2標準偏差の中に少なくとも75%が入る。<br>正規分布だと±2σの外は約5%ともっと小さいが、チェビシェフは“最悪でもこれ以下”という、形を問わない大ざっぱで安全な保証である点がポイント。<br>合言葉：『チェビシェフ＝形を問わず、外れる確率は $1/k^2$ 以下』。"}, {"id": 126, "domain": "標本分布", "difficulty": "標準", "type": "single", "q": "大数の法則（たいすうのほうそく）の説明として最も適切なものはどれか。", "options": ["標本サイズを大きくすると、標本平均は母平均に近づいていく", "標本サイズを大きくすると、データのばらつき（標準偏差）が0になる", "何回試行しても結果は変わらない", "標本平均は必ず母平均と一致する"], "answer": [0], "explanation": "大数の法則は『たくさん集めれば平均は安定して真の値に近づく』という直感を保証する定理。<br>例：コインを10回投げると表の割合は0.3や0.7とブレるが、1万回投げれば0.5にぐっと近づく。<br>理由は標準誤差 $\\sigma/\\sqrt{n}$ が $n$ とともに小さくなるから（標本平均のばらつきが縮む）。<br>区別：①が大数の法則。②は誤り——小さくなるのは“平均のばらつき(標準誤差)”であって、個々のデータのばらつき $\\sigma$ ではない。④も誤りで『近づく』であって『必ず一致』ではない。<br>関連：中心極限定理は“どんな形に近づくか（正規分布）”、大数の法則は“どこに近づくか（母平均）”を述べる。<br>合言葉：『大数の法則＝数を増やすと平均は真の値へ近づく』。"}, {"id": 127, "domain": "推定", "difficulty": "標準", "type": "single", "q": "推定量の良さを表す「不偏性・一致性・有効性」の説明の組として正しいものはどれか。", "options": ["不偏性＝平均的に母数に当たる／一致性＝nを増やすと真値に近づく／有効性＝分散が小さい", "不偏性＝分散が小さい／一致性＝平均的に当たる／有効性＝nで真値に近づく", "3つとも同じ意味", "不偏性＝必ず一致する／一致性＝必ず不偏／有効性＝必ず最小"], "answer": [0], "explanation": "推定量（母数を当てるための計算式）の『良さ』には3つの観点がある。混同しやすいので1つずつ。<br>不偏性：期待値が母数に等しい＝『何度もやれば平均的に的の中心に当たる』（ねらいのズレがない）。<br>一致性：標本サイズ $n$ を大きくすると、推定量が真の値に近づいていく＝『たくさん集めれば当たる』。<br>有効性：（不偏な推定量どうしを比べて）分散が小さい＝『毎回のブレが小さい』。<br>たとえ（ダーツ）：不偏＝平均すると中心、一致＝投げる回数を増やすほど中心、有効＝1投ごとのまとまりが良い。<br>合言葉：『不偏＝平均で当たる／一致＝数で当たる／有効＝ブレが小さい』。"}, {"id": 128, "domain": "推定", "difficulty": "応用", "type": "single", "q": "母平均の不偏推定量が複数あるとき、どれを使うのが良いか。その判断基準はどれか。", "options": ["分散が最も小さいもの（有効なもの）を選ぶ", "分散が最も大きいものを選ぶ", "値が最も大きいものを選ぶ", "どれでも同じなので何でもよい"], "answer": [0], "explanation": "『不偏』なものが複数あると、どれも平均的には母数に当たる（ねらいは正しい）。では何で優劣をつけるか——それが有効性、すなわち分散（ブレの小ささ）。<br>分散が小さいほど、1回の推定が真の値の近くに来やすい＝信頼できる。だから不偏な候補の中では分散が最小のものが最良（最良不偏推定量）。<br>例：母平均の推定に『標本平均』と『最初の1個の値』はどちらも不偏だが、標本平均のほうが分散が小さく（$\\sigma^2/n$ 対 $\\sigma^2$）、ずっと有効。<br>合言葉：『不偏で並んだら、分散が小さい方が勝ち（有効性）』。"}, {"id": 129, "domain": "仮説検定", "difficulty": "応用", "type": "single", "q": "2つの独立な群（大きさ $m,\\ n$）の母平均の差を、母分散が等しく未知として検定する。プールした分散を使うt検定の自由度はいくらか。", "options": ["$m+n-2$", "$m+n-1$", "$m+n$", "$\\min(m,n)-1$"], "answer": [0], "explanation": "2群の平均差の検定で、母分散が不明だが2群で等しいと仮定できる場合、両群のばらつき情報を1つにまとめた『プールした分散（合併分散）』を使う。<br>このときの t統計量の自由度は $m+n-2$。<br>なぜ $-2$ か：各群でそれぞれ平均を1個ずつ推定する（自由度を1ずつ消費する）ため、合計2つ分減る。1群のt検定で自由度が $n-1$（平均1個ぶん減）だったのと同じ考え方の拡張。<br>使う場面：母分散未知・等分散仮定の2標本t検定。等分散を仮定しない場合はウェルチの方法で自由度が変わる。<br>合言葉：『2群のt検定は平均を2つ推定→自由度は $m+n-2$』。"}, {"id": 130, "domain": "仮説検定", "difficulty": "応用", "type": "single", "q": "3つの群すべての対（3通り）を、それぞれt検定で比較する。全体の第一種の過誤を5%に抑えたい。ボンフェローニ補正で各検定に使う有意水準はおよそいくらか。", "options": ["約1.7%", "5%", "15%", "約2.5%"], "answer": [0], "explanation": "検定を何回も繰り返すと『どれかが偶然有意になる』確率が積み上がって、全体では5%を超えてしまう（多重比較の問題）。<br>ボンフェローニ補正は単純で安全な対処法：全体で許したい有意水準 $\\alpha$ を、検定の回数 $k$ で割り、各検定はその厳しい基準で判定する。<br>3群の対は $_3C_2=3$ 通りなので、各検定の有意水準は $\\dfrac{0.05}{3}\\approx0.0167$（約1.7%）。<br>こうすれば全体の過誤は $3\\times1.7\\%\\approx5\\%$ 以下に抑えられる。<br>注意：基準を厳しくするぶん『本当の差を見逃す』可能性は上がる（保守的）。<br>合言葉：『回数で割って各検定を厳しく＝ボンフェローニ（$\\alpha/k$）』。"}, {"id": 131, "domain": "回帰分析", "difficulty": "応用", "type": "single", "q": "重回帰（説明変数が複数）で、ある説明変数の係数が2.0だった。この係数の正しい解釈はどれか。", "options": ["他の説明変数の値を一定に保ったとき、その変数が1増えると予測値が平均2.0増える", "その変数が1増えると、他の変数も含めて必ず2.0増える", "その変数だけで結果の2.0倍を説明する", "相関係数が2.0である"], "answer": [0], "explanation": "重回帰は、複数の原因（説明変数）で同時に結果を説明するモデル。各係数の読み方が単回帰と少し違う。<br>重回帰の係数は『他の説明変数を一定に保ったまま（その影響を取り除いたうえで）、その変数だけが1増えたときの予測値の平均変化』。これを“他の条件が同じなら（ceteris paribus）”の効果という。<br>なぜ大事か：他の変数の影響を調整した“その変数だけの正味の効果”を見られるのが重回帰の強み。<br>注意：相関係数は $-1$〜$1$ なので2.0にはならない（④は誤り）。<br>合言葉：『重回帰の係数＝“他を一定にしたとき”の1単位あたりの効果』。"}, {"id": 132, "domain": "回帰分析", "difficulty": "標準", "type": "single", "q": "重回帰でモデルを比較するとき、決定係数 $R^2$ ではなく「自由度調整済み決定係数」を使う主な理由はどれか。", "options": ["$R^2$ は説明変数を増やすだけで必ず上がってしまうため、無駄な変数の追加にペナルティをかけて公平に比較できるから", "計算が簡単だから", "調整済みの方が必ず大きい値になるから", "説明変数の数に関係なく常に1になるから"], "answer": [0], "explanation": "ふつうの決定係数 $R^2$ には弱点がある。役に立たない変数でも、説明変数を追加しさえすれば $R^2$ は（少なくとも下がらず）必ず上がってしまう。だから $R^2$ だけで『変数が多いモデルほど良い』と判断すると、無駄な変数だらけになる。<br>自由度調整済み $R^2$ は、変数を増やしたことに対してペナルティを加える指標。本当に説明力が増したときだけ上がり、無意味な変数を足すと下がることもある。<br>だからモデル選択（どの変数を残すか）には調整済みの方を使う。<br>合言葉：『変数を足すと $R^2$ は必ず上がる→公平に比べるなら自由度調整済み $R^2$』。"}, {"id": 133, "domain": "回帰分析", "difficulty": "標準", "type": "single", "q": "回帰分析の出力で、ある係数の推定値が9.6、標準誤差が3.2だった。この係数のt値はいくらか。", "options": ["3.0", "6.4", "0.33", "12.8"], "answer": [0], "explanation": "回帰の出力表にある t値は『係数がゼロ（＝その変数は効果なし）といえるか』を調べるための値。<br>計算は単純で、$t=\\dfrac{b}{\\mathrm{SE}}$（推定値 $b$ を標準誤差 $\\mathrm{SE}$ で割る）。推定値が標準誤差の何個分かを表す。<br>代入：$t=\\dfrac{9.6}{3.2}=3.0$。<br>読み方：$|t|$ がだいたい2を超えると、係数はゼロとは言いにくい＝統計的に有意（その変数は効いている）と判断されることが多い。$t=3.0$ は2より大きいので有意の可能性が高い。<br>関連：表のp値はこのt値から計算され、$p<0.05$ なら有意。<br>合言葉：『t値＝推定値÷標準誤差。2を超えたら効いてそう』。"}, {"id": 134, "domain": "確率", "difficulty": "応用", "type": "single", "q": "箱Aには赤玉2個・白玉2個、箱Bには赤玉1個・白玉3個が入っている。サイコロを1回投げ、2以下なら箱Aから、3以上なら箱Bから、玉を2回取り出す（毎回元に戻す）。取り出される赤玉の回数Xの期待値はいくらか。", "options": ["1/2", "2/3", "5/6", "1"], "answer": [1], "explanation": "2段階の問題は『場合分け（全確率）×各段階の計算』で解きます。<br>各箱から2回（毎回戻す）取り出すので、赤玉の回数は二項分布。二項の期待値は (回数)×(1回の赤確率)。<br>箱A：赤 2÷(2+2)=1/2、2回なので平均 2×1/2=1。箱B：赤 1÷(1+3)=1/4、平均 2×1/4=1/2。<br>箱が選ばれる確率：2以下=1/3、3以上=2/3。<br>全体の期待値＝(1/3)×1+(2/3)×(1/2)=1/3+1/3=2/3。<br>合言葉：『2段階は 各場合の(確率×その場合の期待値) を足す』。"}, {"id": 135, "domain": "確率", "difficulty": "標準", "type": "single", "q": "ある製品を機械Aが70%、機械Bが30%生産する。不良率は機械Aが3%、機械Bが7%である。製品を1個無作為に選ぶとき、不良品である確率はいくらか。", "options": ["0.021", "0.042", "0.050", "0.100"], "answer": [1], "explanation": "「不良品である確率」は全確率の定理：原因（どの機械か）で場合分けして足します。<br>P(不良)=P(A)×(Aの不良率)+P(B)×(Bの不良率)=0.7×0.03+0.3×0.07=0.021+0.021=0.042。<br>つまり全体の不良率は約4.2%。次の問題でこの0.042が分母になります。<br>合言葉：『全確率＝(機械の割合×その不良率)を全部足す』。"}, {"id": 136, "domain": "確率", "difficulty": "応用", "type": "single", "q": "前問と同じ設定で、取り出した製品が不良品だった。これが機械Bで作られた確率はいくらか。", "options": ["0.30", "0.42", "0.50", "0.70"], "answer": [2], "explanation": "ベイズの定理。求めるのは「不良品だったとき機械Bの確率」。<br>①各機械から不良が出る確率：A=0.7×0.03=0.021、B=0.3×0.07=0.021。②不良全体=0.021+0.021=0.042（＝前問）。③B由来の割合＝0.021÷0.042=0.5。<br>Bは生産が少ない(30%)けれど不良率が高い(7%)ので、不良品の半分はBから、という結果になります。<br>合言葉：『分子＝注目の経路、分母＝全部の経路の和』。"}, {"id": 137, "domain": "確率", "difficulty": "標準", "type": "single", "q": "P(A)=0.5、P(B)=0.4、P(A∪B)=0.7 のとき、事象AとBの関係として正しいものはどれか。", "options": ["独立であり、かつ排反でもある", "独立だが排反ではない", "排反だが独立ではない", "排反でも独立でもない"], "answer": [1], "explanation": "排反と独立は別物なので、両方を別々にチェックします。<br>①まず共通部分：加法定理 P(A∪B)=P(A)+P(B)−P(A∩B) を変形して P(A∩B)=0.5+0.4−0.7=0.2。<br>②排反か？ 排反なら P(A∩B)=0 のはず。今回は0.2なので排反ではない。<br>③独立か？ 独立なら P(A∩B)=P(A)×P(B)=0.5×0.4=0.2。実際0.2と一致 → 独立。<br>よって「独立だが排反ではない」。<br>合言葉：『まず P(A∩B) を出す→0なら排反／P(A)×P(B)と等しいなら独立』。"}, {"id": 138, "domain": "確率", "difficulty": "標準", "type": "single", "q": "P(A)=0.3、P(B)=0.5、P(A∪B)=0.8 のとき、事象AとBの関係として正しいものはどれか。", "options": ["独立であり、かつ排反でもある", "独立だが排反ではない", "排反だが独立ではない", "排反でも独立でもない"], "answer": [2], "explanation": "同じ手順でチェックします。<br>①P(A∩B)=P(A)+P(B)−P(A∪B)=0.3+0.5−0.8=0。<br>②排反か？ P(A∩B)=0 なので排反（同時に起きない）。<br>③独立か？ 独立なら P(A)×P(B)=0.3×0.5=0.15 のはず。実際は0で一致しない → 独立ではない。<br>よって「排反だが独立ではない」。確率が正の事象では、排反と独立は両立しません。<br>合言葉：『P(A∩B)=0→排反。でも P(A)×P(B)≠0 なら独立ではない』。"}, {"id": 139, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "E[X]=1、E[Y]=2、E[XY]=4 のとき、XとYの共分散 Cov[X,Y] はいくらか。", "options": ["1", "2", "4", "8"], "answer": [1], "explanation": "共分散は「2つが一緒に動く度合い」で、公式は Cov[X,Y]=E[XY]−E[X]×E[Y]。<br>代入：4−1×2=4−2=2。<br>プラスなので、XとYは同じ向きに動く傾向。E[XY]（積の期待値）から E[X]×E[Y]（期待値の積）を引くのがポイントです。<br>合言葉：『共分散＝E[XY]−E[X]×E[Y]』。"}, {"id": 140, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "V[X]=4、V[Y]=9、Cov[X,Y]=2 のとき、V[X+Y] はいくらか。", "options": ["13", "17", "9", "26"], "answer": [1], "explanation": "和の分散は、共分散も足します：V[X+Y]=V[X]+V[Y]+2×Cov[X,Y]。<br>代入：4+9+2×2=4+9+4=17。<br>注意：XとYが独立ならCov=0で V[X]+V[Y]=13 だけになりますが、今回はCov=2があるので +2×2 を忘れずに。<br>合言葉：『V[X+Y]＝V[X]+V[Y]+2Cov』。"}, {"id": 141, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "V[X]=4、V[Y]=9、Cov[X,Y]=2 のとき、V[X−Y] はいくらか。", "options": ["13", "17", "9", "5"], "answer": [2], "explanation": "差の分散は、共分散を引きます：V[X−Y]=V[X]+V[Y]−2×Cov[X,Y]。<br>代入：4+9−2×2=4+9−4=9。<br>注意：分散は引き算でも“足す”（V[Y]はそのまま足す）。変わるのは共分散の符号だけ（+2Cov → −2Cov）。<br>合言葉：『V[X−Y]＝V[X]+V[Y]−2Cov（分散は足す、Covだけ引く）』。"}, {"id": 142, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "連続型確率変数Xの確率密度関数が f(x)=a(1−x/20)（0≤x≤20、それ以外は0）で与えられる。定数aの値はいくらか。", "options": ["1/20", "1/10", "1/5", "1/2"], "answer": [1], "explanation": "連続分布では「全区間の面積＝1」になるように定数を決めます。<br>この密度は x=0で高さa、x=20で0 の直角三角形。三角形の面積＝(1/2)×底辺×高さ＝(1/2)×20×a＝10a。<br>これが1になるので 10a=1 → a=1/10。<br>合言葉：『密度は全部の面積が1。図形の面積で定数を決める』。"}, {"id": 143, "domain": "確率分布", "difficulty": "応用", "type": "single", "q": "前問の密度 f(x)=(1/10)(1−x/20)（0≤x≤20）について、Xの期待値 E[X] はいくらか。", "options": ["20/3", "10/3", "10", "40/3"], "answer": [0], "explanation": "期待値は E[X]=∫ x×f(x) dx（連続版の“値×確率”の合計）。<br>f(x)=(1/10)(1−x/20) を 0〜20で積分すると E[X]=20/3≈6.67。<br>イメージで確認：この密度は小さいxほど高い（右下がりの三角形）ので、平均は真ん中(10)より小さめの 20/3 になる、と納得できます。一様分布なら平均は真ん中の10ですが、左に偏った密度なので平均も左寄りです。<br>合言葉：『連続の期待値＝∫ x×f(x) dx（密度の重心）』。"}, {"id": 144, "domain": "確率分布", "difficulty": "標準", "type": "single", "q": "Xが区間[0,10]の一様分布に従うとき、P(2<X<5) はいくらか。", "options": ["1/10", "3/10", "1/2", "2/5"], "answer": [1], "explanation": "一様分布は「どこも同じ高さ」の密度なので、確率＝幅の割合で出せます。<br>区間[0,10]の全体の幅は10。求める 2〜5 の幅は 5−2=3。<br>よって P(2<X<5)=3÷10=3/10。<br>合言葉：『一様分布の確率＝(その幅)÷(全体の幅)』。"}, {"id": 145, "domain": "確率", "difficulty": "応用", "type": "single", "q": "箱Aには赤玉2個・白玉2個、箱Bには赤玉1個・白玉3個。サイコロを投げ、2以下なら箱A、3以上なら箱Bから2回取り出す（毎回元に戻す）。赤玉がちょうど1回出る確率はいくらか。", "options": ["1/4", "5/12", "1/2", "7/12"], "answer": [1], "explanation": "「ちょうど1回」は二項分布の P(X=1) を、箱で場合分けして足します。1回だけ赤＝C(2,1)×(赤)×(白)。<br>箱A（赤1/2・白1/2）：C(2,1)×(1/2)×(1/2)=2×1/4=1/2。箱B（赤1/4・白3/4）：C(2,1)×(1/4)×(3/4)=2×3/16=3/8。<br>箱の確率（2以下=1/3、3以上=2/3）で重みづけ：(1/3)×(1/2)+(2/3)×(3/8)=1/6+1/4=2/12+3/12=5/12。<br>合言葉：『2段階のちょうど1回＝各箱で C(2,1)×赤×白 を確率で重みづけ』。"}];
</script>
<script>
"use strict";
(function(){
  const LS = "toukei2_stats_v1";
  const $ = id => document.getElementById(id);

  function loadStats(){
    let s; try{ s = JSON.parse(localStorage.getItem(LS)); }catch(e){ s=null; }
    if(!s) s = {};
    s.sessions = s.sessions||0; s.answered=s.answered||0; s.correct=s.correct||0;
    s.best = s.best||0; s.history=s.history||[]; s.domains=s.domains||{}; s.review=s.review||[];
    return s;
  }
  function saveStats(s){ try{ localStorage.setItem(LS, JSON.stringify(s)); }catch(e){} }
  let stats = loadStats();

  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function arrEq(a,b){ if(a.length!==b.length) return false; const x=[...a].sort(),y=[...b].sort(); return x.every((v,i)=>v===y[i]); }
  function domains(){ return [...new Set(QUESTIONS.map(q=>q.domain))]; }

  // ---- SVG 図描画 ----
  function svgWrap(inner,w,h){ return '<svg viewBox="0 0 '+w+' '+h+'" width="'+w+'" role="img">'+inner+'</svg>'; }
  function txt(x,y,s,opt){ opt=opt||{}; return '<text x="'+x+'" y="'+y+'" font-size="'+(opt.fs||10)+'" text-anchor="'+(opt.a||'middle')+'" fill="'+(opt.c||'#5d6471')+'">'+s+'</text>'; }
  function line(x1,y1,x2,y2,c){ return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#c7ccd6')+'" stroke-width="1"/>'; }

  function drawHistogram(f){
    const W=360,H=240,L=42,R=12,T=12,B=34;
    const n=f.freqs.length, maxf=Math.max(...f.freqs);
    const pw=W-L-R, ph=H-T-B, bw=pw/n;
    let s="";
    s+=line(L,T+ph,W-R,T+ph); s+=line(L,T,L,T+ph);
    const ticks=4;
    for(let t=0;t<=ticks;t++){ const v=Math.round(maxf*t/ticks); const y=T+ph-(ph*t/ticks);
      s+=line(L,y,W-R,y,'#eef0f4'); s+=txt(L-5,y+3,v,{a:'end',fs:9}); }
    for(let i=0;i<n;i++){ const h=ph*(f.freqs[i]/maxf); const x=L+i*bw, y=T+ph-h;
      s+='<rect x="'+(x+1)+'" y="'+y+'" width="'+(bw-2)+'" height="'+h+'" fill="#7f77dd" stroke="#534ab7" stroke-width="0.5"/>'; }
    for(let i=0;i<=n;i++){ const x=L+i*bw; s+=txt(x,T+ph+14,f.edges[i],{fs:9}); }
    s+=txt((L+W-R)/2,H-4,f.xlabel||"",{c:'#5d6471'});
    if(f.ylabel) s+='<text x="12" y="'+(T+ph/2)+'" font-size="10" fill="#5d6471" transform="rotate(-90 12 '+(T+ph/2)+')" text-anchor="middle">'+f.ylabel+'</text>';
    return svgWrap(s,W,H);
  }

  function drawBoxplot(f){
    const W=360,H=140,L=20,R=20,T=30,B=40;
    const vals=[f.min,f.q1,f.med,f.q3,f.max];
    const lo=Math.min(...vals), hi=Math.max(...vals), pad=(hi-lo)*0.08||1;
    const a=lo-pad, b=hi+pad, pw=W-L-R;
    const X=v=>L+pw*(v-a)/(b-a);
    const cy=T+20, bh=34;
    let s="";
    s+=line(X(f.min),cy,X(f.q1),cy,'#888'); s+=line(X(f.q3),cy,X(f.max),cy,'#888');
    s+=line(X(f.min),cy-9,X(f.min),cy+9,'#888'); s+=line(X(f.max),cy-9,X(f.max),cy+9,'#888');
    s+='<rect x="'+X(f.q1)+'" y="'+(cy-bh/2)+'" width="'+(X(f.q3)-X(f.q1))+'" height="'+bh+'" fill="#eef0fb" stroke="#534ab7" stroke-width="1"/>';
    s+=line(X(f.med),cy-bh/2,X(f.med),cy+bh/2,'#534ab7');
    // 軸
    const ay=cy+bh/2+18; s+=line(L,ay,W-R,ay,'#c7ccd6');
    vals.forEach(v=>{ s+=line(X(v),ay-3,X(v),ay+3,'#c7ccd6'); s+=txt(X(v),ay+15,v,{fs:9}); });
    s+=txt((L+W-R)/2,H-4,f.xlabel||"",{});
    return svgWrap(s,W,H);
  }

  function drawScatter(f){
    const W=360,H=240,L=42,R=14,T=14,B=34;
    const xs=f.points.map(p=>p[0]), ys=f.points.map(p=>p[1]);
    let xlo=Math.min(...xs),xhi=Math.max(...xs),ylo=Math.min(...ys),yhi=Math.max(...ys);
    const xpad=(xhi-xlo)*0.1||1, ypad=(yhi-ylo)*0.1||1;
    xlo-=xpad;xhi+=xpad;ylo-=ypad;yhi+=ypad; if(ylo>0)ylo=0;
    const pw=W-L-R, ph=H-T-B;
    const X=v=>L+pw*(v-xlo)/(xhi-xlo), Y=v=>T+ph-ph*(v-ylo)/(yhi-ylo);
    let s="";
    s+=line(L,T+ph,W-R,T+ph); s+=line(L,T,L,T+ph);
    for(let t=0;t<=4;t++){ const yv=ylo+(yhi-ylo)*t/4, y=Y(yv); s+=line(L,y,W-R,y,'#eef0f4'); s+=txt(L-5,y+3,Math.round(yv*10)/10,{a:'end',fs:9}); }
    for(let t=0;t<=4;t++){ const xv=xlo+(xhi-xlo)*t/4; s+=txt(X(xv),T+ph+14,Math.round(xv*10)/10,{fs:9}); }
    if(f.line){ const a=f.line.a,b=f.line.b; const x1=xlo,x2=xhi; s+='<line x1="'+X(x1)+'" y1="'+Y(a+b*x1)+'" x2="'+X(x2)+'" y2="'+Y(a+b*x2)+'" stroke="#d85a30" stroke-width="1.5"/>'; }
    f.points.forEach(p=>{ s+='<circle cx="'+X(p[0])+'" cy="'+Y(p[1])+'" r="3.4" fill="#37419b"/>'; });
    s+=txt((L+W-R)/2,H-4,f.xlabel||"",{});
    if(f.ylabel) s+='<text x="12" y="'+(T+ph/2)+'" font-size="10" fill="#5d6471" transform="rotate(-90 12 '+(T+ph/2)+')" text-anchor="middle">'+f.ylabel+'</text>';
    return svgWrap(s,W,H);
  }

  function drawBar(f){
    const W=360,H=220,L=44,R=12,T=14,B=34;
    const n=f.values.length, maxv=Math.max(...f.values);
    const pw=W-L-R, ph=H-T-B, bw=pw/n;
    let s="";
    s+=line(L,T+ph,W-R,T+ph); s+=line(L,T,L,T+ph);
    for(let t=0;t<=4;t++){ const v=maxv*t/4, y=T+ph-ph*t/4; s+=line(L,y,W-R,y,'#eef0f4'); s+=txt(L-5,y+3,Math.round(v*100)/100,{a:'end',fs:9}); }
    for(let i=0;i<n;i++){ const h=ph*(f.values[i]/maxv); const x=L+i*bw, y=T+ph-h;
      s+='<rect x="'+(x+bw*0.22)+'" y="'+y+'" width="'+(bw*0.56)+'" height="'+h+'" fill="#7f77dd" stroke="#534ab7" stroke-width="0.5"/>';
      s+=txt(x+bw/2,T+ph+14,f.labels[i],{fs:10}); }
    s+=txt((L+W-R)/2,H-4,f.xlabel||"",{});
    if(f.ylabel) s+='<text x="12" y="'+(T+ph/2)+'" font-size="10" fill="#5d6471" transform="rotate(-90 12 '+(T+ph/2)+')" text-anchor="middle">'+f.ylabel+'</text>';
    return svgWrap(s,W,H);
  }

  function drawNormal(f){
    const W=360,H=200,L=20,R=20,T=14,B=30;
    const m=f.mean, sd=f.sd, lo=m-4*sd, hi=m+4*sd, pw=W-L-R, ph=H-T-B;
    const X=v=>L+pw*(v-lo)/(hi-lo), pdf=x=>Math.exp(-0.5*Math.pow((x-m)/sd,2)), Y=p=>T+ph-ph*p;
    const N=120; let s="";
    let ranges, fillCol;
    if(f.tails){ ranges=[[lo,f.tails[0]],[f.tails[1],hi]]; fillCol="#f0997b"; }
    else { ranges=[[(f.shadeFrom!=null?f.shadeFrom:lo),(f.shadeTo!=null?f.shadeTo:hi)]]; fillCol="#cecbf6"; }
    ranges.forEach(rg=>{ const a=rg[0],b=rg[1]; if(b<=a)return;
      let poly="M "+X(a)+" "+(T+ph);
      for(let i=0;i<=N;i++){ const x=lo+(hi-lo)*i/N; if(x<a||x>b)continue; poly+=" L "+X(x)+" "+Y(pdf(x)); }
      poly+=" L "+X(b)+" "+(T+ph)+" Z";
      s+='<path d="'+poly+'" fill="'+fillCol+'"/>'; });
    s+=line(L,T+ph,W-R,T+ph);
    let pts=[]; for(let i=0;i<=N;i++){ const x=lo+(hi-lo)*i/N; pts.push(X(x)+','+Y(pdf(x))); }
    s+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="#534ab7" stroke-width="1.5"/>';
