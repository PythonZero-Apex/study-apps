    const xs=f.points.map(p=>p[0]), ys=f.points.map(p=>p[1]);
    let xlo=Math.min(...xs),xhi=Math.max(...xs),ylo=Math.min(...ys),yhi=Math.max(...ys);
    const xpad=(xhi-xlo)*0.1||1, ypad=(yhi-ylo)*0.1||1;
    xlo-=xpad;xhi+=xpad;ylo-=ypad;yhi+=ypad; if(ylo>0)ylo=0;
    const pw=W-L-R, ph=H-T-B;
    const X=v=>L+pw*(v-xlo)/(xhi-xlo), Y=v=>T+ph-ph*(v-ylo)/(yhi-ylo);
    let s="";
    s+=line(L,T+ph,W-R,T+ph); s+=line(L,T,L,T+ph);
    for(let t=0;t<=4;t++){ const yv=ylo+(yhi-ylo)*t/4, y=Y(yv); s+=line(L,y,W-R,y,'#eef0f4'); s+=txt(L-5,y+3,Math.round(yv*10)/10,{a:'end',fs:9}); }
    for(let t=0;t<=4;t++){ const xv=xlo+(xhi-xlo)*t/4; s+=txt(X(xv),T+ph+14,Math.round(xv*10)/10,{fs:9}); }
    if(f.line){ const a=f.line.a,b=f.line.b; const x1=xlo,x2=xhi; s+='<line x1="'+X(x1)+'" y1="'+Y(a+b*x1)+'" x2="'+X(x2)+'" y2="'+Y(a+b*x2)+'" stroke="#d85a30" stroke-width="1.5"/>'; }
    f.points.forEach(p=>{ s+='<circle cx="'+X(p[0])+'" cy="'+Y(p[1])+'" r="3.4" fill="#37419b"/>'; });
    s+=txt((L+W-R)/2,H-4,f.xlabel||"",{});
    if(f.ylabel) s+='<text x="12" y="'+(T+ph/2)+'" font-size="10" fill="#5d6471" transform="rotate(-90 12 '+(T+ph/2)+')" text-anchor="middle">'+f.ylabel+'</text>';
    return svgWrap(s,W,H);
  }

  function drawBar(f){
    const W=360,H=220,L=44,R=12,T=14,B=34;
    const n=f.values.length, maxv=Math.max(...f.values);
    const pw=W-L-R, ph=H-T-B, bw=pw/n;
    let s="";
    s+=line(L,T+ph,W-R,T+ph); s+=line(L,T,L,T+ph);
    for(let t=0;t<=4;t++){ const v=maxv*t/4, y=T+ph-ph*t/4; s+=line(L,y,W-R,y,'#eef0f4'); s+=txt(L-5,y+3,Math.round(v*100)/100,{a:'end',fs:9}); }
    for(let i=0;i<n;i++){ const h=ph*(f.values[i]/maxv); const x=L+i*bw, y=T+ph-h;
      s+='<rect x="'+(x+bw*0.22)+'" y="'+y+'" width="'+(bw*0.56)+'" height="'+h+'" fill="#7f77dd" stroke="#534ab7" stroke-width="0.5"/>';
      s+=txt(x+bw/2,T+ph+14,f.labels[i],{fs:10}); }
    s+=txt((L+W-R)/2,H-4,f.xlabel||"",{});
    if(f.ylabel) s+='<text x="12" y="'+(T+ph/2)+'" font-size="10" fill="#5d6471" transform="rotate(-90 12 '+(T+ph/2)+')" text-anchor="middle">'+f.ylabel+'</text>';
    return svgWrap(s,W,H);
  }

  function drawNormal(f){
    const W=360,H=200,L=20,R=20,T=14,B=30;
    const m=f.mean, sd=f.sd, lo=m-4*sd, hi=m+4*sd, pw=W-L-R, ph=H-T-B;
    const X=v=>L+pw*(v-lo)/(hi-lo), pdf=x=>Math.exp(-0.5*Math.pow((x-m)/sd,2)), Y=p=>T+ph-ph*p;
    const N=120; let s="";
    let ranges, fillCol;
    if(f.tails){ ranges=[[lo,f.tails[0]],[f.tails[1],hi]]; fillCol="#f0997b"; }
    else { ranges=[[(f.shadeFrom!=null?f.shadeFrom:lo),(f.shadeTo!=null?f.shadeTo:hi)]]; fillCol="#cecbf6"; }
    ranges.forEach(rg=>{ const a=rg[0],b=rg[1]; if(b<=a)return;
      let poly="M "+X(a)+" "+(T+ph);
      for(let i=0;i<=N;i++){ const x=lo+(hi-lo)*i/N; if(x<a||x>b)continue; poly+=" L "+X(x)+" "+Y(pdf(x)); }
      poly+=" L "+X(b)+" "+(T+ph)+" Z";
      s+='<path d="'+poly+'" fill="'+fillCol+'"/>'; });
    s+=line(L,T+ph,W-R,T+ph);
    let pts=[]; for(let i=0;i<=N;i++){ const x=lo+(hi-lo)*i/N; pts.push(X(x)+','+Y(pdf(x))); }
    s+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="#534ab7" stroke-width="1.5"/>';
    (f.marks||[]).forEach(v=>{ s+=line(X(v),T,X(v),T+ph,'#d85a30'); });
    [m-2*sd,m-sd,m,m+sd,m+2*sd].forEach(v=>{ s+=txt(X(v),T+ph+14,Math.round(v*100)/100,{fs:9}); });
    s+=txt((L+W-R)/2,H-2,f.xlabel||"",{});
    return svgWrap(s,W,H);
  }

  function renderFigure(f){ if(!f) return ""; if(f.type==="histogram")return drawHistogram(f); if(f.type==="boxplot")return drawBoxplot(f); if(f.type==="scatter")return drawScatter(f); if(f.type==="bar")return drawBar(f); if(f.type==="normal")return drawNormal(f); return ""; }

  function typeset(el){ if(window.renderMathInElement){ try{ renderMathInElement(el,{delimiters:[{left:"$",right:"$",display:false}]}); }catch(e){} } }

  // ---- クイズ状態 ----
  let session=null;

  function buildSession(list,opt){
    let qs=list.slice();
    if(opt.order==="random") qs=shuffle(qs);
    if(opt.count>0) qs=qs.slice(0,opt.count);
    session={ items:qs.map(q=>{ const order=shuffle(q.options.map((_,i)=>i)); return {q, order}; }), idx:0, sel:[], done:false, correctCount:0, wrongIds:[] };
  }

  function show(view){ ["home","quiz","result"].forEach(v=>$(v).classList.toggle("hide",v!==view)); window.scrollTo(0,0); }

  function renderDash(){
    const acc = stats.answered? Math.round(100*stats.correct/stats.answered):0;
    const recent = stats.history.slice(-12);
    let trend="";
    if(recent.length){ trend='<div class="sptrend">'+recent.map(v=>'<i style="height:'+Math.max(2,v)+'%" title="'+v+'%"></i>').join("")+'</div>'; }
    let doms="";
    domains().forEach(d=>{ const ds=stats.domains[d]; if(!ds||!ds.answered){ doms+='<div class="dom"><span class="nm">'+d+'</span><span class="pc muted">—</span></div>'; return; }
      const pc=Math.round(100*ds.correct/ds.answered); const col= pc<70?'#d8453f': pc<85?'#e0a020':'#1d9e75';
      doms+='<div class="dom"><span class="nm">'+d+'</span><span class="tr"><i style="width:'+pc+'%;background:'+col+'"></i></span><span class="pc">'+pc+'%</span></div>'; });
    $("dash").innerHTML =
      '<div class="stat-grid">'
      +'<div class="stat"><div class="n">'+stats.sessions+'</div><div class="l">セッション数</div></div>'
      +'<div class="stat"><div class="n">'+acc+'%</div><div class="l">累計正答率</div></div>'
      +'<div class="stat"><div class="n">'+stats.best+'%</div><div class="l">ベスト正答率</div></div>'
      +'<div class="stat"><div class="n">'+stats.answered+'</div><div class="l">累計回答数</div></div>'
      +'</div>'
      +(trend?'<div class="l muted" style="font-size:12px;margin-top:12px">直近の正答率の推移</div>'+trend:'')
      +'<div class="l muted" style="font-size:12px;margin-top:14px">分野別の正答率（弱い順・70%未満は赤）</div>'
      + sortDomHtml();
  }
  function sortDomHtml(){
    const arr=domains().map(d=>{ const ds=stats.domains[d]; const pc=ds&&ds.answered?Math.round(100*ds.correct/ds.answered):null; return {d,pc,answered:ds?ds.answered:0}; });
    arr.sort((a,b)=>{ if(a.pc===null)return 1; if(b.pc===null)return -1; return a.pc-b.pc; });
    return arr.map(o=>{ if(o.pc===null) return '<div class="dom"><span class="nm">'+o.d+'</span><span class="tr"><i style="width:0%"></i></span><span class="pc muted">—</span></div>';
      const col= o.pc<70?'#d8453f': o.pc<85?'#e0a020':'#1d9e75';
      return '<div class="dom"><span class="nm">'+o.d+'</span><span class="tr"><i style="width:'+o.pc+'%;background:'+col+'"></i></span><span class="pc">'+o.pc+'%</span></div>'; }).join("");
  }

  function renderQuestion(){
    const it=session.items[session.idx]; const q=it.q;
    $("prog").style.width = Math.round(100*session.idx/session.items.length)+"%";
    $("qpos").textContent = "問 "+(session.idx+1)+" / "+session.items.length;
    $("qdom").textContent = q.domain;
    $("qdiff").textContent = q.difficulty||"";
    $("qdiff").style.display = q.difficulty?"":"none";
    $("qfig").innerHTML = renderFigure(q.figure);
    $("qtext").innerHTML = q.q + (q.type==="multi"?' <span class="muted">（複数選択）</span>':'');
    session.sel=[]; session.answered=false;
    const opts=$("opts"); opts.innerHTML="";
    const marks=["①","②","③","④","⑤","⑥"];
    it.order.forEach((origIdx,pos)=>{
      const b=document.createElement("button"); b.className="opt"; b.dataset.orig=origIdx;
      b.innerHTML='<span class="mk">'+marks[pos]+'</span>'+q.options[origIdx];
      b.onclick=()=>toggle(b,origIdx);
      opts.appendChild(b);
    });
    $("expl").className="expl"; $("expl").innerHTML="";
    $("btnCheck").classList.remove("hide"); $("btnNext").classList.add("hide");
    typeset($("qtext")); typeset(opts);
  }

  function toggle(b,origIdx){
    if(session.answered) return;
    const q=session.items[session.idx].q;
    if(q.type==="multi"){
      const i=session.sel.indexOf(origIdx);
      if(i>=0){session.sel.splice(i,1);b.classList.remove("sel");}
      else{session.sel.push(origIdx);b.classList.add("sel");}
    }else{
      session.sel=[origIdx];
      [...$("opts").children].forEach(c=>c.classList.toggle("sel",+c.dataset.orig===origIdx));
    }
  }

  function check(){
    if(session.answered) return;
    if(session.sel.length===0) return;
    const q=session.items[session.idx].q;
    const ok=arrEq(session.sel,q.answer);
    session.answered=true;
    [...$("opts").children].forEach(c=>{ const oi=+c.dataset.orig; c.onclick=null;
      if(q.answer.includes(oi)) c.classList.add("correct");
      else if(session.sel.includes(oi)) c.classList.add("wrong");
      c.classList.remove("sel");
    });
    const e=$("expl");
    e.innerHTML='<span class="tag '+(ok?'ok':'ng')+'">'+(ok?'正解':'不正解')+'</span><br>'+q.explanation;
    e.classList.add("show"); typeset(e);
    if(ok){ session.correctCount++; } else { session.wrongIds.push(q.id); }
    // 統計更新（1問ごと）
    stats.answered++; if(ok)stats.correct++;
    stats.domains[q.domain]=stats.domains[q.domain]||{answered:0,correct:0};
    stats.domains[q.domain].answered++; if(ok)stats.domains[q.domain].correct++;
    // 復習プール
    const ri=stats.review.indexOf(q.id);
    if(ok){ if(ri>=0)stats.review.splice(ri,1); } else { if(ri<0)stats.review.push(q.id); }
    saveStats(stats);
    $("btnCheck").classList.add("hide"); $("btnNext").classList.remove("hide");
    $("btnNext").textContent = (session.idx+1<session.items.length)?"次へ":"結果を見る";
  }

  function next(){
    if(session.idx+1<session.items.length){ session.idx++; renderQuestion(); }
    else finish();
  }

  function finish(){
    const total=session.items.length, c=session.correctCount;
    const pc=total?Math.round(100*c/total):0;
    stats.sessions++; stats.history.push(pc); if(stats.history.length>50)stats.history=stats.history.slice(-50);
    if(pc>stats.best)stats.best=pc; saveStats(stats);
    $("rScore").textContent=c+" / "+total+"（"+pc+"%）";
    $("rDetail").textContent= session.wrongIds.length? ("間違い "+session.wrongIds.length+" 問は復習プールに追加されました"):"全問正解！";
    lastWrong=session.wrongIds.slice();
    $("btnReviewWrong").classList.toggle("hide", lastWrong.length===0);
    show("result");
  }
  let lastWrong=[];

  // ---- イベント ----
  function fillDomainSelect(){ const sel=$("selDomain"); sel.innerHTML='<option value="__all">すべての分野</option>'+domains().map(d=>'<option value="'+d+'">'+d+'</option>').join(""); }
  function updateReviewBtn(){ $("reviewCount").textContent = stats.review.length? "（"+stats.review.length+"問）":"（0問）"; $("btnReview").disabled = stats.review.length===0; $("btnReview").style.opacity = stats.review.length?1:.5; }

  $("btnStart").onclick=()=>{
    const d=$("selDomain").value, diff=$("selDiff").value;
    let list = QUESTIONS.slice();
    if(d!=="__all") list=list.filter(q=>q.domain===d);
    if(diff!=="__all") list=list.filter(q=>(q.difficulty||"")===diff);
    if(!list.length){ alert("この条件に合う問題がありません。条件を変えてください。"); return; }
    buildSession(list,{count:+$("selCount").value, order:$("selOrder").value});
    show("quiz"); renderQuestion();
  };
  $("btnReview").onclick=()=>{
    const list=QUESTIONS.filter(q=>stats.review.includes(q.id)); if(!list.length)return;
    buildSession(list,{count:0, order:"random"}); show("quiz"); renderQuestion();
  };
  $("btnCheck").onclick=check;
  $("btnNext").onclick=next;
  $("btnQuit").onclick=()=>{ refreshHome(); show("home"); };
  $("btnAgain").onclick=()=>{ $("btnStart").onclick(); };
  $("btnReviewWrong").onclick=()=>{ const list=QUESTIONS.filter(q=>lastWrong.includes(q.id)); if(!list.length)return; buildSession(list,{count:0,order:"random"}); show("quiz"); renderQuestion(); };
  $("btnHome").onclick=()=>{ refreshHome(); show("home"); };
  $("btnReset").onclick=()=>{ if(confirm("学習記録（正答率・復習プールなど）をすべて消去します。よろしいですか？")){ stats={}; stats=loadStats(); localStorage.removeItem(LS); stats=loadStats(); refreshHome(); } };

  function refreshHome(){ stats=loadStats(); renderDash(); updateReviewBtn(); }

  // 初期化
  fillDomainSelect(); refreshHome();
})();
</script>
